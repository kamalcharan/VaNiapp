<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="300" height="350">
  <!-- Support beam -->
  <rect x="100" y="20" width="100" height="10" fill="#8B7355" stroke="#333" stroke-width="1"/>
  <!-- Pulley -->
  <circle cx="150" cy="55" r="25" fill="#DDD" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="55" r="5" fill="#333"/>
  <!-- Left string -->
  <line x1="125" y1="55" x2="125" y2="200" stroke="#333" stroke-width="2"/>
  <!-- Right string -->
  <line x1="175" y1="55" x2="175" y2="220" stroke="#333" stroke-width="2"/>
  <!-- Left mass (m1 = 2 kg) -->
  <rect x="100" y="200" width="50" height="50" fill="#4A90D9" stroke="#333" stroke-width="2" rx="3"/>
  <text x="125" y="222" text-anchor="middle" fill="white" font-size="11" font-weight="bold">m₁</text>
  <text x="125" y="240" text-anchor="middle" fill="white" font-size="11">2 kg</text>
  <!-- Right mass (m2 = 3 kg) -->
  <rect x="150" y="220" width="50" height="60" fill="#E74C3C" stroke="#333" stroke-width="2" rx="3"/>
  <text x="175" y="247" text-anchor="middle" fill="white" font-size="11" font-weight="bold">m₂</text>
  <text x="175" y="265" text-anchor="middle" fill="white" font-size="11">3 kg</text>
  <!-- g arrow -->
  <line x1="260" y1="120" x2="260" y2="180" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="260" y="200" text-anchor="middle" fill="#27AE60" font-size="12" font-weight="bold">g = 10 m/s²</text>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
  </defs>
  <text x="150" y="330" text-anchor="middle" fill="#333" font-size="13">Atwood Machine</text>
</svg>
