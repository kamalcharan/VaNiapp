<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <!-- Cell wall -->
  <rect x="30" y="30" width="340" height="280" rx="30" ry="30" fill="none" stroke="#2E7D32" stroke-width="6"/>
  <!-- Cell membrane -->
  <rect x="40" y="40" width="320" height="260" rx="25" ry="25" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Central vacuole (X) -->
  <ellipse cx="200" cy="175" rx="110" ry="80" fill="#BBDEFB" stroke="#1976D2" stroke-width="2"/>
  <text x="200" y="170" text-anchor="middle" fill="#1565C0" font-size="28" font-weight="bold">X</text>
  <text x="200" y="195" text-anchor="middle" fill="#1565C0" font-size="11">?</text>
  <!-- Nucleus -->
  <circle cx="100" cy="100" r="28" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#F57F17"/>
  <text x="100" y="145" text-anchor="middle" fill="#333" font-size="10">Nucleus</text>
  <!-- Chloroplasts -->
  <ellipse cx="300" cy="90" rx="18" ry="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="320" cy="120" rx="18" ry="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="80" cy="250" rx="18" ry="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Mitochondria -->
  <ellipse cx="310" cy="260" rx="16" ry="9" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5"/>
  <ellipse cx="130" cy="270" rx="16" ry="9" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="200" y="25" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">Plant Cell</text>
  <text x="30" y="325" fill="#2E7D32" font-size="10">Cell wall</text>
  <text x="300" cy="90" y="75" text-anchor="middle" fill="#333" font-size="10">Chloroplast</text>
  <text x="310" y="285" text-anchor="middle" fill="#333" font-size="10">Mitochondria</text>
</svg>
