<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350">
  <rect x="0" y="0" width="400" height="350" fill="#f8f9fa"/>

  <!-- Cell wall (outer rectangle) -->
  <rect x="40" y="40" width="320" height="260" rx="30" ry="30" fill="none" stroke="#2ECC71" stroke-width="4"/>

  <!-- Cell membrane -->
  <rect x="50" y="50" width="300" height="240" rx="25" ry="25" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Central Vacuole (large) - labeled X -->
  <ellipse cx="200" cy="170" rx="100" ry="80" fill="#AED6F1" stroke="#2980B9" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2980B9">X</text>

  <!-- Nucleus -->
  <circle cx="120" cy="100" r="30" fill="#F9E79F" stroke="#F39C12" stroke-width="2"/>
  <circle cx="120" cy="100" r="10" fill="#E67E22"/>
  <text x="120" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Nucleus</text>

  <!-- Chloroplasts -->
  <ellipse cx="300" cy="100" rx="20" ry="12" fill="#82E0AA" stroke="#27AE60" stroke-width="1.5"/>
  <ellipse cx="320" cy="130" rx="20" ry="12" fill="#82E0AA" stroke="#27AE60" stroke-width="1.5"/>
  <ellipse cx="80" cy="230" rx="20" ry="12" fill="#82E0AA" stroke="#27AE60" stroke-width="1.5"/>

  <!-- Mitochondria -->
  <ellipse cx="300" cy="250" rx="22" ry="10" fill="#F5B7B1" stroke="#E74C3C" stroke-width="1.5"/>
  <ellipse cx="85" cy="270" rx="22" ry="10" fill="#F5B7B1" stroke="#E74C3C" stroke-width="1.5"/>

  <!-- Arrow pointing to X -->
  <line x1="340" y1="170" x2="305" y2="170" stroke="#E74C3C" stroke-width="2"/>
  <polygon points="305,170 312,165 312,175" fill="#E74C3C"/>
  <text x="360" y="175" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#E74C3C">X</text>

  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Plant Cell — Identify Part X</text>
</svg>
