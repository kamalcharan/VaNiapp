<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#f8f9fa"/>

  <!-- Ground -->
  <line x1="50" y1="220" x2="350" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="220" x2="60" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="220" x2="90" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="110" y1="220" x2="120" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="140" y1="220" x2="150" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="170" y1="220" x2="180" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="220" x2="210" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="230" y1="220" x2="240" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="220" x2="270" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="220" x2="300" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="320" y1="220" x2="330" y2="230" stroke="#333" stroke-width="1"/>

  <!-- Block -->
  <rect x="150" y="160" width="80" height="60" fill="#4A90D9" stroke="#333" stroke-width="2" rx="4"/>
  <text x="190" y="197" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="white">5 kg</text>

  <!-- Force arrow (right) - 10N -->
  <line x1="230" y1="190" x2="330" y2="190" stroke="#E74C3C" stroke-width="3"/>
  <polygon points="330,190 318,183 318,197" fill="#E74C3C"/>
  <text x="280" y="180" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#E74C3C">F = 10 N</text>

  <!-- Normal force (up) -->
  <line x1="190" y1="160" x2="190" y2="80" stroke="#27AE60" stroke-width="3"/>
  <polygon points="190,80 183,92 197,92" fill="#27AE60"/>
  <text x="190" y="70" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#27AE60">N</text>

  <!-- Weight (down) -->
  <line x1="190" y1="220" x2="190" y2="280" stroke="#8E44AD" stroke-width="3"/>
  <polygon points="190,280 183,268 197,268" fill="#8E44AD"/>
  <text x="190" y="295" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#8E44AD">W = mg</text>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">Free Body Diagram</text>
</svg>
