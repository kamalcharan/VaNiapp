<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="500" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">Lessons from Development Experience</text>
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#555">Comparative data: India vs China vs Pakistan (2010–2020 avg.)</text>

  <!-- Table -->
  <rect x="30" y="58" width="760" height="250" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="30" y="58" width="760" height="36" rx="8" fill="#4a148c"/>
  <text x="190" y="81" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Development Indicator</text>
  <text x="430" y="81" text-anchor="middle" font-size="12" fill="#42a5f5" font-weight="bold">China</text>
  <text x="570" y="81" text-anchor="middle" font-size="12" fill="#ffa726" font-weight="bold">India</text>
  <text x="710" y="81" text-anchor="middle" font-size="12" fill="#81c784" font-weight="bold">Pakistan</text>

  <line x1="350" y1="58" x2="350" y2="308" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="510" y1="58" x2="510" y2="308" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="650" y1="58" x2="650" y2="308" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Data rows -->
  <line x1="30" y1="94" x2="790" y2="94" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="94" width="760" height="34" fill="#f5f5f5"/>
  <text x="190" y="116" text-anchor="middle" font-size="12" fill="#333">GDP Growth (avg.)</text>
  <text x="430" y="116" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">7.7% ★</text>
  <text x="570" y="116" text-anchor="middle" font-size="12" fill="#555">6.6%</text>
  <text x="710" y="116" text-anchor="middle" font-size="12" fill="#555">4.1%</text>

  <line x1="30" y1="128" x2="790" y2="128" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="150" text-anchor="middle" font-size="12" fill="#333">HDI Rank (out of 191)</text>
  <text x="430" y="150" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">79 ★</text>
  <text x="570" y="150" text-anchor="middle" font-size="12" fill="#555">132</text>
  <text x="710" y="150" text-anchor="middle" font-size="12" fill="#c62828">161</text>

  <line x1="30" y1="162" x2="790" y2="162" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="162" width="760" height="34" fill="#f5f5f5"/>
  <text x="190" y="184" text-anchor="middle" font-size="12" fill="#333">Literacy Rate (%)</text>
  <text x="430" y="184" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">96.8 ★</text>
  <text x="570" y="184" text-anchor="middle" font-size="12" fill="#555">74.4</text>
  <text x="710" y="184" text-anchor="middle" font-size="12" fill="#c62828">59.1</text>

  <line x1="30" y1="196" x2="790" y2="196" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="218" text-anchor="middle" font-size="12" fill="#333">Life Expectancy (years)</text>
  <text x="430" y="218" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">78.2 ★</text>
  <text x="570" y="218" text-anchor="middle" font-size="12" fill="#555">69.7</text>
  <text x="710" y="218" text-anchor="middle" font-size="12" fill="#c62828">66.5</text>

  <line x1="30" y1="230" x2="790" y2="230" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="230" width="760" height="34" fill="#f5f5f5"/>
  <text x="190" y="252" text-anchor="middle" font-size="12" fill="#333">Population Below Poverty Line</text>
  <text x="430" y="252" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">0.6% ★</text>
  <text x="570" y="252" text-anchor="middle" font-size="12" fill="#555">21.9%</text>
  <text x="710" y="252" text-anchor="middle" font-size="12" fill="#c62828">39.3%</text>

  <line x1="30" y1="264" x2="790" y2="264" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="286" text-anchor="middle" font-size="12" fill="#333">Reform Start / Strategy</text>
  <text x="430" y="286" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">1978, Mfg + SEZs ★</text>
  <text x="570" y="286" text-anchor="middle" font-size="12" fill="#555">1991, Services + IT</text>
  <text x="710" y="286" text-anchor="middle" font-size="12" fill="#555">Textiles + Remittances</text>

  <!-- Lessons boxes -->
  <rect x="30" y="325" width="240" height="80" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="150" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">Lesson from China:</text>
  <text x="150" y="362" text-anchor="middle" font-size="11" fill="#1565c0">• Early reforms = head start</text>
  <text x="150" y="378" text-anchor="middle" font-size="11" fill="#1565c0">• Invest in infrastructure</text>
  <text x="150" y="394" text-anchor="middle" font-size="11" fill="#1565c0">• SEZs attract FDI</text>

  <rect x="285" y="325" width="250" height="80" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="410" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Lesson from India:</text>
  <text x="410" y="362" text-anchor="middle" font-size="11" fill="#bf360c">• Democracy = stable institutions</text>
  <text x="410" y="378" text-anchor="middle" font-size="11" fill="#bf360c">• IT + services = growth path</text>
  <text x="410" y="394" text-anchor="middle" font-size="11" fill="#bf360c">• Demographic dividend: convert</text>

  <rect x="550" y="325" width="240" height="80" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="670" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Lesson from Pakistan:</text>
  <text x="670" y="362" text-anchor="middle" font-size="11" fill="#c62828">• Excess military = crowd out</text>
  <text x="670" y="378" text-anchor="middle" font-size="11" fill="#c62828">• Narrow exports = vulnerable</text>
  <text x="670" y="394" text-anchor="middle" font-size="11" fill="#c62828">• Instability = low growth</text>

  <rect x="30" y="420" width="760" height="35" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="410" y="442" text-anchor="middle" font-size="12" fill="#1b5e20" font-weight="bold">All three began around 1947–1949 at similar levels; divergent strategies produced vastly different outcomes</text>
</svg>
