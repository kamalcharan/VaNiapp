<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f9fa"/>
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">India vs China — Comparative Development Indicators</text>

  <!-- Table -->
  <rect x="40" y="50" width="740" height="340" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Header row -->
  <rect x="40" y="50" width="740" height="38" rx="8" fill="#1a3c5e"/>
  <text x="220" y="74" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Indicator</text>
  <text x="530" y="74" text-anchor="middle" font-size="13" fill="#ff8f00" font-weight="bold">India</text>
  <text x="700" y="74" text-anchor="middle" font-size="13" fill="#42a5f5" font-weight="bold">China</text>

  <!-- Column dividers -->
  <line x1="400" y1="50" x2="400" y2="390" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="625" y1="50" x2="625" y2="390" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Row data -->
  <line x1="40" y1="88" x2="780" y2="88" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="88" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="111" text-anchor="middle" font-size="12" fill="#333">Reform Start Year</text>
  <text x="530" y="111" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">1991 (LPG Reforms)</text>
  <text x="700" y="111" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">1978 (Deng Xiaoping)</text>

  <line x1="40" y1="125" x2="780" y2="125" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="148" text-anchor="middle" font-size="12" fill="#333">GDP Growth Rate (avg. 2000–2020)</text>
  <text x="530" y="148" text-anchor="middle" font-size="12" fill="#555">6.5%</text>
  <text x="700" y="148" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">8.9% ✓</text>

  <line x1="40" y1="162" x2="780" y2="162" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="162" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="185" text-anchor="middle" font-size="12" fill="#333">HDI Rank (out of 191)</text>
  <text x="530" y="185" text-anchor="middle" font-size="12" fill="#555">132</text>
  <text x="700" y="185" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">79 ✓</text>

  <line x1="40" y1="199" x2="780" y2="199" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="222" text-anchor="middle" font-size="12" fill="#333">Literacy Rate</text>
  <text x="530" y="222" text-anchor="middle" font-size="12" fill="#555">74.4%</text>
  <text x="700" y="222" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">96.8% ✓</text>

  <line x1="40" y1="236" x2="780" y2="236" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="236" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="259" text-anchor="middle" font-size="12" fill="#333">Life Expectancy at Birth</text>
  <text x="530" y="259" text-anchor="middle" font-size="12" fill="#555">69.7 years</text>
  <text x="700" y="259" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">78.2 years ✓</text>

  <line x1="40" y1="273" x2="780" y2="273" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="296" text-anchor="middle" font-size="12" fill="#333">Population Below Poverty Line</text>
  <text x="530" y="296" text-anchor="middle" font-size="12" fill="#555">21.9%</text>
  <text x="700" y="296" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">0.6% ✓</text>

  <line x1="40" y1="310" x2="780" y2="310" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="310" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="333" text-anchor="middle" font-size="12" fill="#333">Agricultural Workforce Share</text>
  <text x="530" y="333" text-anchor="middle" font-size="12" fill="#555">43%</text>
  <text x="700" y="333" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">26% ✓</text>

  <line x1="40" y1="347" x2="780" y2="347" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="374" text-anchor="middle" font-size="12" fill="#333">Press Freedom / Democracy</text>
  <text x="530" y="374" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">Multi-party democracy ✓</text>
  <text x="700" y="374" text-anchor="middle" font-size="12" fill="#555">Single-party state</text>

  <!-- India advantage box -->
  <rect x="40" y="400" width="355" height="50" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="218" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">India's Advantage:</text>
  <text x="218" y="440" text-anchor="middle" font-size="11" fill="#2e7d32">Political freedom, democracy, civil liberties</text>

  <!-- China advantage box -->
  <rect x="420" y="400" width="360" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="600" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">China's Advantage:</text>
  <text x="600" y="440" text-anchor="middle" font-size="11" fill="#1565c0">GDP, HDI, Literacy, Life Expectancy, Poverty</text>

  <!-- Key lesson -->
  <rect x="40" y="462" width="740" height="40" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="410" y="487" text-anchor="middle" font-size="12" fill="#e65100">Key Lesson: Development must be assessed across MULTIPLE dimensions — neither country leads on all indicators</text>
</svg>
