<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="480" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">Population Breakdown: Employment Concepts</text>

  <!-- Total Population -->
  <rect x="310" y="50" width="200" height="44" rx="8" fill="#1a3c5e"/>
  <text x="410" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Total Population</text>
  <line x1="410" y1="94" x2="410" y2="120" stroke="#555" stroke-width="2"/>

  <!-- Level 1 split -->
  <line x1="200" y1="120" x2="610" y2="120" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="120" x2="200" y2="145" stroke="#555" stroke-width="2"/>
  <line x1="610" y1="120" x2="610" y2="145" stroke="#555" stroke-width="2"/>

  <rect x="110" y="145" width="180" height="44" rx="8" fill="#546e7a"/>
  <text x="200" y="165" text-anchor="middle" font-size="12" fill="#fff">Below Working Age</text>
  <text x="200" y="181" text-anchor="middle" font-size="11" fill="#b0bec5">(Children)</text>

  <rect x="520" y="145" width="180" height="44" rx="8" fill="#1565c0"/>
  <text x="610" y="165" text-anchor="middle" font-size="12" fill="#fff">Working-Age</text>
  <text x="610" y="181" text-anchor="middle" font-size="11" fill="#bbdefb">Population</text>

  <!-- Working age splits -->
  <line x1="610" y1="189" x2="610" y2="215" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="215" x2="760" y2="215" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="215" x2="450" y2="240" stroke="#555" stroke-width="2"/>
  <line x1="760" y1="215" x2="760" y2="240" stroke="#555" stroke-width="2"/>

  <!-- Labour Force -->
  <rect x="360" y="240" width="180" height="44" rx="8" fill="#1976d2"/>
  <text x="450" y="262" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Labour Force</text>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="#bbdefb">(Employed + Seeking Work)</text>

  <!-- Not in Labour Force -->
  <rect x="665" y="240" width="190" height="44" rx="8" fill="#78909c"/>
  <text x="760" y="258" text-anchor="middle" font-size="12" fill="#fff">Not in Labour Force</text>
  <text x="760" y="276" text-anchor="middle" font-size="10" fill="#eceff1">Students, Retirees, Homemakers</text>

  <!-- Labour Force splits -->
  <line x1="450" y1="284" x2="450" y2="310" stroke="#555" stroke-width="2"/>
  <line x1="310" y1="310" x2="590" y2="310" stroke="#555" stroke-width="2"/>
  <line x1="310" y1="310" x2="310" y2="335" stroke="#555" stroke-width="2"/>
  <line x1="590" y1="310" x2="590" y2="335" stroke="#555" stroke-width="2"/>

  <!-- Employed (Workforce) -->
  <rect x="215" y="335" width="190" height="55" rx="8" fill="#2e7d32"/>
  <text x="310" y="357" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Workforce / Employed</text>
  <text x="310" y="374" text-anchor="middle" font-size="11" fill="#c8e6c9">Self-employed +</text>
  <text x="310" y="388" text-anchor="middle" font-size="11" fill="#c8e6c9">Salaried + Casual labour</text>

  <!-- Unemployed -->
  <rect x="495" y="335" width="190" height="55" rx="8" fill="#c62828"/>
  <text x="590" y="357" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Unemployed</text>
  <text x="590" y="374" text-anchor="middle" font-size="11" fill="#ffcdd2">Willing to work but</text>
  <text x="590" y="388" text-anchor="middle" font-size="11" fill="#ffcdd2">cannot find employment</text>

  <!-- Formulas -->
  <rect x="50" y="415" width="720" height="55" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="410" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Key Formulas:</text>
  <text x="225" y="455" text-anchor="middle" font-size="12" fill="#6d4c41">WPR = (Workforce / Total Population) × 100</text>
  <text x="590" y="455" text-anchor="middle" font-size="12" fill="#6d4c41">Unemployment Rate = (Unemployed / Labour Force) × 100</text>
</svg>
