<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">India's Workforce Composition</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#555">GDP vs Employment share by sector | Formal vs Informal employment</text>

  <!-- LEFT CHART: GDP vs Employment by Sector -->
  <text x="200" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">GDP vs Employment Share (%)</text>

  <!-- Bar chart -->
  <!-- Primary Sector -->
  <rect x="80" y="95" width="50" height="14" fill="#1565c0"/>
  <rect x="80" y="112" width="230" height="14" fill="#4caf50"/>
  <text x="75" y="107" text-anchor="end" font-size="11" fill="#333">Primary</text>

  <!-- Secondary Sector -->
  <rect x="80" y="135" width="130" height="14" fill="#1565c0"/>
  <rect x="80" y="152" width="125" height="14" fill="#4caf50"/>
  <text x="75" y="147" text-anchor="end" font-size="11" fill="#333">Secondary</text>

  <!-- Tertiary Sector -->
  <rect x="80" y="175" width="300" height="14" fill="#1565c0"/>
  <rect x="80" y="192" width="160" height="14" fill="#4caf50"/>
  <text x="75" y="187" text-anchor="end" font-size="11" fill="#333">Tertiary</text>

  <!-- Labels on bars -->
  <text x="135" y="106" font-size="11" fill="#1565c0">GDP: 14%</text>
  <text x="315" y="124" font-size="11" fill="#2e7d32">Employment: 43%</text>

  <text x="215" y="148" font-size="11" fill="#1565c0">GDP: 26%</text>
  <text x="210" y="164" font-size="11" fill="#2e7d32">Employment: 25%</text>

  <text x="385" y="188" font-size="11" fill="#1565c0">GDP: 60%</text>
  <text x="245" y="204" font-size="11" fill="#2e7d32">Employment: 32%</text>

  <!-- Legend bars -->
  <rect x="80" y="220" width="20" height="12" fill="#1565c0"/>
  <text x="106" y="231" font-size="11" fill="#333">GDP share</text>
  <rect x="175" y="220" width="20" height="12" fill="#4caf50"/>
  <text x="201" y="231" font-size="11" fill="#333">Employment share</text>

  <!-- Key Insight -->
  <rect x="58" y="244" width="300" height="42" rx="6" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="208" y="261" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Key: Agriculture employs 43% but</text>
  <text x="208" y="278" text-anchor="middle" font-size="11" fill="#bf360c">contributes only 14% to GDP → Disguised unemployment</text>

  <!-- RIGHT CHART: Formal vs Informal Pie -->
  <text x="580" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">Formal vs Informal Workforce</text>

  <!-- Pie chart — large informal slice (90%) -->
  <!-- Circle center at 580, 230, r=130 -->
  <!-- Informal 90%: from top, sweeping clockwise to 10% before full -->
  <!-- Formal 10%: small slice -->

  <!-- Informal slice (324 degrees arc = 90%) -->
  <path d="M 580,230 L 580,100 A 130,130 0 1,1 453.5,165 Z"
    fill="#ef9a9a" stroke="#c62828" stroke-width="2"/>
  <text x="590" y="200" font-size="13" fill="#b71c1c" font-weight="bold">90%</text>
  <text x="590" y="216" font-size="11" fill="#c62828">Informal/</text>
  <text x="590" y="230" font-size="11" fill="#c62828">Unorganised</text>

  <!-- Formal slice (36 degrees = 10%) -->
  <path d="M 580,230 L 453.5,165 A 130,130 0 0,1 580,100 Z"
    fill="#81c784" stroke="#2e7d32" stroke-width="2"/>
  <text x="510" y="170" font-size="12" fill="#1b5e20" font-weight="bold">10%</text>
  <text x="510" y="185" font-size="11" fill="#2e7d32">Formal</text>

  <!-- Within informal: sub-sectors -->
  <rect x="415" y="330" width="340" height="130" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="585" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Informal Workers Include:</text>
  <text x="430" y="370" font-size="11" fill="#555">• Agricultural labourers (seasonal + casual)</text>
  <text x="430" y="387" font-size="11" fill="#555">• Construction workers</text>
  <text x="430" y="404" font-size="11" fill="#555">• Street vendors, domestic workers</text>
  <text x="430" y="421" font-size="11" fill="#555">• Small workshop employees (no contracts)</text>
  <text x="430" y="440" font-size="11" fill="#555">• Self-employed artisans</text>

  <!-- Bottom note -->
  <rect x="58" y="300" width="300" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="208" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">WPR = Workers / Total Population × 100</text>
  <text x="208" y="338" text-anchor="middle" font-size="11" fill="#1565c0">Male WPR ≈ 55% | Female WPR ≈ 20-25%</text>
  <text x="208" y="354" text-anchor="middle" font-size="11" fill="#1565c0">Large gender gap → social + structural barriers</text>
</svg>
