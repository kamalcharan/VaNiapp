<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="720" height="480" fill="#f8f9fa"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Demand Curve Shift: D₁ → D₂ (Increase in Demand)</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#555">Caused by: ↑ Income (normal good), ↑ Price of substitute, ↑ Population, ↑ Tastes</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="410" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="410" x2="650" y2="410" stroke="#333" stroke-width="2.5"/>
  <polygon points="100,65 95,78 105,78" fill="#333"/>
  <polygon points="655,410 642,405 642,415" fill="#333"/>

  <text x="52" y="245" text-anchor="middle" font-size="13" fill="#333" transform="rotate(-90,52,245)">Price (P)</text>
  <text x="375" y="448" text-anchor="middle" font-size="13" fill="#333">Quantity Demanded (Q)</text>

  <!-- Old Demand Curve D₁ -->
  <line x1="200" y1="90" x2="480" y2="400" stroke="#1565c0" stroke-width="3"/>
  <text x="495" y="400" font-size="15" fill="#1565c0" font-weight="bold">D₁</text>

  <!-- New Demand Curve D₂ (shifted right) -->
  <line x1="380" y1="90" x2="640" y2="390" stroke="#c62828" stroke-width="3"/>
  <text x="655" y="390" font-size="15" fill="#c62828" font-weight="bold">D₂</text>

  <!-- Supply curve (for context — horizontal) -->
  <!-- Market price P₁ -->
  <line x1="100" y1="240" x2="640" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="90" y="244" text-anchor="end" font-size="12" fill="#555">P₁</text>

  <!-- Old equilibrium at intersection with P₁ and D₁ -->
  <circle cx="296" cy="240" r="7" fill="#1565c0"/>
  <text x="310" y="238" font-size="12" fill="#1565c0">E₁ (Q₁)</text>
  <line x1="296" y1="240" x2="296" y2="410" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="296" y="424" text-anchor="middle" font-size="12" fill="#1565c0">Q₁</text>

  <!-- New equilibrium at intersection with P₁ and D₂ -->
  <circle cx="486" cy="240" r="7" fill="#c62828"/>
  <text x="500" y="238" font-size="12" fill="#c62828">E₂ (Q₂)</text>
  <line x1="486" y1="240" x2="486" y2="410" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="486" y="424" text-anchor="middle" font-size="12" fill="#c62828">Q₂</text>

  <!-- Shift arrow -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <path d="M 370,170 L 500,170" stroke="#555" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="435" y="162" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">Rightward Shift</text>

  <!-- Increase annotation -->
  <rect x="108" y="448" width="500" height="25" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="358" y="466" text-anchor="middle" font-size="12" fill="#1b5e20">At same price P₁: Quantity demanded increases from Q₁ to Q₂ (D₁→D₂)</text>

  <!-- Note about decrease -->
  <rect x="400" y="305" width="200" height="60" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="500" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Decrease in Demand:</text>
  <text x="500" y="340" text-anchor="middle" font-size="11" fill="#bf360c">Opposite shift (D₂→D₁)</text>
  <text x="500" y="357" text-anchor="middle" font-size="11" fill="#bf360c">Leftward movement</text>
</svg>
