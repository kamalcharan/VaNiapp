<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="480" fill="#f8f9fa"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Sectoral Distribution: GDP Share vs Employment Share (India)</text>

  <!-- DATA TABLE -->
  <rect x="30" y="45" width="720" height="145" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="30" y="45" width="720" height="36" rx="8" fill="#37474f"/>
  <text x="175" y="68" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Sector</text>
  <text x="430" y="68" text-anchor="middle" font-size="13" fill="#42a5f5" font-weight="bold">GDP Share (%)</text>
  <text x="640" y="68" text-anchor="middle" font-size="13" fill="#ffa726" font-weight="bold">Employment Share (%)</text>
  <line x1="330" y1="45" x2="330" y2="190" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="530" y1="45" x2="530" y2="190" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Row 1: Primary -->
  <line x1="30" y1="81" x2="750" y2="81" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="81" width="720" height="36" fill="#fce4ec"/>
  <text x="175" y="103" text-anchor="middle" font-size="13" fill="#b71c1c" font-weight="bold">Primary (Agriculture)</text>
  <text x="430" y="103" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">14</text>
  <text x="640" y="103" text-anchor="middle" font-size="13" fill="#c62828" font-weight="bold">43  ← Large gap!</text>

  <!-- Row 2: Secondary -->
  <line x1="30" y1="117" x2="750" y2="117" stroke="#eceff1" stroke-width="1"/>
  <text x="175" y="139" text-anchor="middle" font-size="13" fill="#333">Secondary (Industry)</text>
  <text x="430" y="139" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">26</text>
  <text x="640" y="139" text-anchor="middle" font-size="13" fill="#555">25  ≈ Balanced</text>

  <!-- Row 3: Tertiary -->
  <line x1="30" y1="153" x2="750" y2="153" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="153" width="720" height="36" fill="#e8f5e9"/>
  <text x="175" y="175" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="bold">Tertiary (Services)</text>
  <text x="430" y="175" text-anchor="middle" font-size="13" fill="#1565c0" font-weight="bold">60  ← Highest</text>
  <text x="640" y="175" text-anchor="middle" font-size="13" fill="#555">32</text>

  <!-- BAR CHART below -->
  <text x="390" y="212" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">Visual: GDP Share vs Employment Share per Sector</text>

  <!-- Axes -->
  <line x1="80" y1="225" x2="80" y2="380" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="380" x2="720" y2="380" stroke="#333" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="72" y="380" text-anchor="end" font-size="10" fill="#555">0</text>
  <text x="72" y="355" text-anchor="end" font-size="10" fill="#555">10</text>
  <text x="72" y="330" text-anchor="end" font-size="10" fill="#555">20</text>
  <text x="72" y="305" text-anchor="end" font-size="10" fill="#555">30</text>
  <text x="72" y="280" text-anchor="end" font-size="10" fill="#555">40</text>
  <text x="72" y="255" text-anchor="end" font-size="10" fill="#555">50</text>
  <text x="72" y="230" text-anchor="end" font-size="10" fill="#555">60</text>

  <!-- Grid lines -->
  <line x1="80" y1="355" x2="720" y2="355" stroke="#eeeeee" stroke-width="1"/>
  <line x1="80" y1="330" x2="720" y2="330" stroke="#eeeeee" stroke-width="1"/>
  <line x1="80" y1="305" x2="720" y2="305" stroke="#eeeeee" stroke-width="1"/>
  <line x1="80" y1="280" x2="720" y2="280" stroke="#eeeeee" stroke-width="1"/>
  <line x1="80" y1="255" x2="720" y2="255" stroke="#eeeeee" stroke-width="1"/>

  <!-- Scale: 1% = 1.5px height; 0% = y380; 60% = y290 -->

  <!-- PRIMARY: GDP 14% (bar h=21, y=359), Employment 43% (bar h=64.5, y=315) -->
  <rect x="110" y="359" width="60" height="21" fill="#1565c0"/>
  <text x="140" y="354" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">14%</text>

  <rect x="180" y="315" width="60" height="65" fill="#c62828"/>
  <text x="210" y="310" text-anchor="middle" font-size="10" fill="#c62828" font-weight="bold">43%</text>

  <text x="175" y="400" text-anchor="middle" font-size="11" fill="#b71c1c" font-weight="bold">Primary</text>

  <!-- SECONDARY: GDP 26% (h=39, y=341), Employment 25% (h=37.5, y=342) -->
  <rect x="330" y="341" width="60" height="39" fill="#1565c0"/>
  <text x="360" y="336" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">26%</text>

  <rect x="400" y="342" width="60" height="38" fill="#ff8f00"/>
  <text x="430" y="337" text-anchor="middle" font-size="10" fill="#ff8f00" font-weight="bold">25%</text>

  <text x="395" y="400" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Secondary</text>

  <!-- TERTIARY: GDP 60% (h=90, y=290), Employment 32% (h=48, y=332) -->
  <rect x="560" y="290" width="60" height="90" fill="#1565c0"/>
  <text x="590" y="285" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">60%</text>

  <rect x="630" y="332" width="60" height="48" fill="#2e7d32"/>
  <text x="660" y="327" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">32%</text>

  <text x="625" y="400" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold">Tertiary</text>

  <!-- Legend -->
  <rect x="200" y="415" width="18" height="12" fill="#1565c0"/>
  <text x="224" y="426" font-size="11" fill="#333">GDP Share</text>
  <rect x="330" y="415" width="18" height="12" fill="#c62828"/>
  <text x="354" y="426" font-size="11" fill="#333">Employment Share (Primary)</text>
  <rect x="540" y="415" width="18" height="12" fill="#2e7d32"/>
  <text x="564" y="426" font-size="11" fill="#333">Employment Share (others)</text>

  <!-- Key insight -->
  <rect x="30" y="440" width="720" height="32" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="390" y="461" text-anchor="middle" font-size="12" fill="#e65100">Agriculture: 14% GDP but 43% employment → Lowest labour productivity → Disguised unemployment prevalent</text>
</svg>
