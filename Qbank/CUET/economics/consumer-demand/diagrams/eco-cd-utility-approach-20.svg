<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="520" fill="#f8f9fa"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Total Utility (TU) and Marginal Utility (MU) — Schedule and Graphs</text>

  <!-- TABLE -->
  <rect x="50" y="50" width="300" height="220" rx="6" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="50" y="50" width="300" height="34" rx="6" fill="#1565c0"/>
  <text x="110" y="72" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Units</text>
  <text x="230" y="72" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">TU (utils)</text>
  <text x="340" y="72" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">MU (utils)</text>
  <!-- Rows -->
  <line x1="50" y1="84" x2="350" y2="84" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="100" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="230" y="100" text-anchor="middle" font-size="12" fill="#333">8</text>
  <text x="340" y="100" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">8</text>
  <line x1="50" y1="108" x2="350" y2="108" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="124" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="230" y="124" text-anchor="middle" font-size="12" fill="#333">14</text>
  <text x="340" y="124" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">6</text>
  <line x1="50" y1="132" x2="350" y2="132" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="148" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="230" y="148" text-anchor="middle" font-size="12" fill="#333">18</text>
  <text x="340" y="148" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">4</text>
  <line x1="50" y1="156" x2="350" y2="156" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="172" text-anchor="middle" font-size="12" fill="#333">4</text>
  <text x="230" y="172" text-anchor="middle" font-size="12" fill="#333">20</text>
  <text x="340" y="172" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">2</text>
  <line x1="50" y1="180" x2="350" y2="180" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="196" text-anchor="middle" font-size="12" fill="#333">5</text>
  <text x="230" y="196" text-anchor="middle" font-size="12" fill="#ff6f00" font-weight="bold">20 (max)</text>
  <text x="340" y="196" text-anchor="middle" font-size="12" fill="#ff6f00" font-weight="bold">0 (Satiation)</text>
  <line x1="50" y1="204" x2="350" y2="204" stroke="#cfd8dc" stroke-width="1"/>
  <text x="110" y="220" text-anchor="middle" font-size="12" fill="#333">6</text>
  <text x="230" y="220" text-anchor="middle" font-size="12" fill="#333">18</text>
  <text x="340" y="220" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">−2 (Disutility)</text>
  <line x1="50" y1="228" x2="350" y2="228" stroke="#cfd8dc" stroke-width="1"/>
  <!-- Vertical dividers in table -->
  <line x1="160" y1="50" x2="160" y2="270" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="280" y1="50" x2="280" y2="270" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Vertical line dividers for table -->
  <line x1="50" y1="84" x2="350" y2="84" stroke="#cfd8dc" stroke-width="1"/>

  <!-- GRAPH -->
  <!-- Axes for TU -->
  <line x1="430" y1="60" x2="430" y2="310" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="310" x2="760" y2="310" stroke="#333" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-size="11" fill="#1565c0" transform="rotate(-90,400,190)">TU (utils)</text>
  <text x="595" y="330" text-anchor="middle" font-size="11" fill="#333">Units consumed</text>

  <!-- TU Curve -->
  <!-- Scale: y maps 0-22 utils to y 310-80, x maps units 0-7 to x 430-760 -->
  <!-- Unit spacing 47px, util spacing ~10px/util -->
  <!-- Points: (1,8) (2,14) (3,18) (4,20) (5,20) (6,18) -->
  <polyline points="430,310 477,230 524,170 571,110 618,90 665,90 712,110"
    stroke="#1565c0" stroke-width="3" fill="none"/>
  <!-- dots -->
  <circle cx="477" cy="230" r="5" fill="#1565c0"/>
  <circle cx="524" cy="170" r="5" fill="#1565c0"/>
  <circle cx="571" cy="110" r="5" fill="#1565c0"/>
  <circle cx="618" cy="90" r="5" fill="#ff6f00"/>
  <circle cx="665" cy="90" r="5" fill="#ff6f00"/>
  <circle cx="712" cy="110" r="5" fill="#c62828"/>
  <text x="770" y="90" font-size="13" fill="#1565c0" font-weight="bold">TU</text>
  <!-- Max TU annotation -->
  <text x="618" y="78" text-anchor="middle" font-size="10" fill="#ff6f00">Max TU</text>

  <!-- Y axis labels TU -->
  <text x="425" y="314" text-anchor="end" font-size="10" fill="#555">0</text>
  <text x="425" y="90" text-anchor="end" font-size="10" fill="#555">20</text>
  <text x="425" y="170" text-anchor="end" font-size="10" fill="#555">14</text>

  <!-- Axes for MU -->
  <line x1="430" y1="340" x2="430" y2="500" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="440" x2="760" y2="440" stroke="#333" stroke-width="2"/>
  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#2e7d32" transform="rotate(-90,400,420)">MU (utils)</text>
  <text x="595" y="515" text-anchor="middle" font-size="11" fill="#333">Units consumed</text>

  <!-- MU Curve (straight line diminishing) -->
  <!-- MU: 8,6,4,2,0,-2 at units 1,2,3,4,5,6 -->
  <!-- Scale: 0 utils = y 440; 8 utils = y 360 (10px/util); -2 utils = y 460 -->
  <polyline points="430,440 477,360 524,380 571,400 618,420 665,440 712,460"
    stroke="#2e7d32" stroke-width="3" fill="none"/>
  <circle cx="477" cy="360" r="5" fill="#2e7d32"/>
  <circle cx="524" cy="380" r="5" fill="#2e7d32"/>
  <circle cx="571" cy="400" r="5" fill="#2e7d32"/>
  <circle cx="618" cy="420" r="5" fill="#2e7d32"/>
  <circle cx="665" cy="440" r="5" fill="#ff6f00"/>
  <circle cx="712" cy="460" r="5" fill="#c62828"/>
  <text x="770" y="360" font-size="13" fill="#2e7d32" font-weight="bold">MU</text>

  <!-- MU zero label -->
  <text x="665" y="435" text-anchor="middle" font-size="10" fill="#ff6f00">MU=0</text>
  <text x="712" y="475" text-anchor="middle" font-size="10" fill="#c62828">MU&lt;0</text>

  <!-- X-axis units labels (shared) -->
  <text x="477" y="320" text-anchor="middle" font-size="10" fill="#555">1</text>
  <text x="524" y="320" text-anchor="middle" font-size="10" fill="#555">2</text>
  <text x="571" y="320" text-anchor="middle" font-size="10" fill="#555">3</text>
  <text x="618" y="320" text-anchor="middle" font-size="10" fill="#555">4</text>
  <text x="665" y="320" text-anchor="middle" font-size="10" fill="#555">5</text>
  <text x="712" y="320" text-anchor="middle" font-size="10" fill="#555">6</text>

  <!-- Key insight -->
  <rect x="50" y="290" width="300" height="60" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="200" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Key Relationships:</text>
  <text x="200" y="328" text-anchor="middle" font-size="11" fill="#2e7d32">TU rises when MU &gt; 0 (units 1–4)</text>
  <text x="200" y="344" text-anchor="middle" font-size="11" fill="#2e7d32">TU max when MU = 0 (unit 5)</text>
</svg>
