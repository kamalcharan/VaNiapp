<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="500" fill="#f8f9fa"/>
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Linear Demand Curve: Varying Price Elasticity</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#555">Points A (100,0), B (50,50), C (0,100) on a straight-line demand curve</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="420" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="420" x2="630" y2="420" stroke="#333" stroke-width="2.5"/>
  <polygon points="100,65 95,78 105,78" fill="#333"/>
  <polygon points="635,420 622,415 622,425" fill="#333"/>

  <text x="52" y="250" text-anchor="middle" font-size="13" fill="#333" transform="rotate(-90,52,250)">Price (₹)</text>
  <text x="365" y="455" text-anchor="middle" font-size="13" fill="#333">Quantity Demanded</text>

  <!-- Y-axis ticks -->
  <line x1="96" y1="100" x2="104" y2="100" stroke="#555" stroke-width="1.5"/>
  <text x="88" y="104" text-anchor="end" font-size="12" fill="#333">100</text>
  <line x1="96" y1="260" x2="104" y2="260" stroke="#555" stroke-width="1.5"/>
  <text x="88" y="264" text-anchor="end" font-size="12" fill="#333">50</text>

  <!-- X-axis ticks -->
  <line x1="360" y1="416" x2="360" y2="424" stroke="#555" stroke-width="1.5"/>
  <text x="360" y="440" text-anchor="middle" font-size="12" fill="#333">50</text>
  <line x1="620" y1="416" x2="620" y2="424" stroke="#555" stroke-width="1.5"/>
  <text x="620" y="440" text-anchor="middle" font-size="12" fill="#333">100</text>

  <!-- Demand curve -->
  <line x1="100" y1="100" x2="620" y2="420" stroke="#1565c0" stroke-width="3"/>

  <!-- Key points -->
  <!-- A: top (price=100, Q=0) -->
  <circle cx="100" cy="100" r="7" fill="#c62828"/>
  <text x="115" y="98" font-size="12" fill="#c62828" font-weight="bold">A (P=100, Q=0)</text>
  <text x="115" y="114" font-size="11" fill="#c62828">Ed = ∞ (Perfectly Elastic)</text>

  <!-- B: midpoint (price=50, Q=50) -->
  <circle cx="360" cy="260" r="7" fill="#ff6f00"/>
  <text x="375" y="255" font-size="12" fill="#ff6f00" font-weight="bold">B — Midpoint</text>
  <text x="375" y="270" font-size="11" fill="#ff6f00">Ed = 1 (Unitary Elastic)</text>

  <!-- C: bottom (price=0, Q=100) -->
  <circle cx="620" cy="420" r="7" fill="#2e7d32"/>
  <text x="540" y="415" font-size="12" fill="#2e7d32" font-weight="bold">C (P=0, Q=100)</text>
  <text x="540" y="430" font-size="11" fill="#2e7d32">Ed = 0 (Perfectly Inelastic)</text>

  <!-- Shading elastic half -->
  <path d="M 100,100 L 360,260 L 100,260 Z" fill="#bbdefb" opacity="0.5"/>
  <text x="195" y="195" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">ELASTIC</text>
  <text x="195" y="213" text-anchor="middle" font-size="12" fill="#1565c0">Ed &gt; 1</text>
  <text x="195" y="228" text-anchor="middle" font-size="11" fill="#1565c0">(Upper half)</text>

  <!-- Shading inelastic half -->
  <path d="M 360,260 L 620,420 L 360,420 Z" fill="#ffcdd2" opacity="0.5"/>
  <text x="520" y="345" text-anchor="middle" font-size="13" fill="#b71c1c" font-weight="bold">INELASTIC</text>
  <text x="520" y="363" text-anchor="middle" font-size="12" fill="#c62828">Ed &lt; 1</text>
  <text x="520" y="378" text-anchor="middle" font-size="11" fill="#c62828">(Lower half)</text>

  <!-- Key note -->
  <rect x="108" y="468" width="490" height="24" rx="5" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="353" y="485" text-anchor="middle" font-size="12" fill="#e65100">Slope is constant; Elasticity varies because P/Q changes at every point</text>
</svg>
