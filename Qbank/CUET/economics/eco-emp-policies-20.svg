<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="480" fill="#f8f9fa"/>
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Education → Skills → Enterprise → Employment: The Policy Pipeline</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Key Problem: Disconnect between Level 1 and Level 2 causes "educated unemployment + skill shortage" paradox</text>

  <!-- LEVEL 1 -->
  <rect x="50" y="65" width="680" height="70" rx="10" fill="#1565c0"/>
  <text x="390" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Level 1: Education System</text>
  <text x="390" y="108" text-anchor="middle" font-size="12" fill="#bbdefb">Schools | Colleges | Universities | IITs | IIMs</text>
  <text x="390" y="124" text-anchor="middle" font-size="11" fill="#90caf9">Produces graduates — but often without industry-relevant practical skills</text>

  <!-- Arrow 1 + Problem -->
  <line x1="390" y1="135" x2="390" y2="165" stroke="#c62828" stroke-width="3"/>
  <polygon points="390,168 383,155 397,155" fill="#c62828"/>
  <rect x="410" y="140" width="200" height="22" rx="5" fill="#ffcdd2" stroke="#c62828"/>
  <text x="510" y="156" text-anchor="middle" font-size="11" fill="#b71c1c">⚠ Gap: Theory ≠ Industry needs</text>

  <!-- LEVEL 2 -->
  <rect x="50" y="170" width="680" height="70" rx="10" fill="#00838f"/>
  <text x="390" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Level 2: Skill Development Programmes</text>
  <text x="390" y="213" text-anchor="middle" font-size="12" fill="#b2ebf2">Skill India Mission | PMKVY | ITIs | Polytechnics | Apprenticeships</text>
  <text x="390" y="229" text-anchor="middle" font-size="11" fill="#80deea">Bridges gap by training in industry-relevant, hands-on vocational skills</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="240" x2="390" y2="268" stroke="#555" stroke-width="3"/>
  <polygon points="390,271 383,258 397,258" fill="#555"/>

  <!-- LEVEL 3 -->
  <rect x="50" y="273" width="680" height="70" rx="10" fill="#e65100"/>
  <text x="390" y="298" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Level 3: Enterprise Support</text>
  <text x="390" y="316" text-anchor="middle" font-size="12" fill="#ffe0b2">MUDRA (collateral-free loans) | PMEGP (credit subsidy) | Start-up India (tax breaks)</text>
  <text x="390" y="332" text-anchor="middle" font-size="11" fill="#ffcc80">Converts skilled individuals into entrepreneurs and job creators</text>

  <!-- Arrow 3 -->
  <line x1="390" y1="343" x2="390" y2="371" stroke="#555" stroke-width="3"/>
  <polygon points="390,374 383,361 397,361" fill="#555"/>

  <!-- LEVEL 4 -->
  <rect x="50" y="376" width="680" height="65" rx="10" fill="#1b5e20"/>
  <text x="390" y="401" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Level 4: Employment Outcomes</text>
  <text x="390" y="420" text-anchor="middle" font-size="12" fill="#c8e6c9">Formal Employment | Self-Employment (MSME) | Wage Employment (MGNREGA)</text>
  <text x="390" y="436" text-anchor="middle" font-size="11" fill="#a5d6a7">Productive, income-generating work — formal or informal</text>

  <!-- LEFT SIDE: Success path -->
  <rect x="0" y="65" width="45" height="376" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="22" y="253" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="bold" transform="rotate(-90,22,253)">Ideal Path: Education → Skills → Jobs</text>

  <!-- RIGHT SIDE: Failure path annotation -->
  <rect x="735" y="65" width="45" height="376" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="757" y="253" text-anchor="middle" font-size="11" fill="#b71c1c" font-weight="bold" transform="rotate(90,757,253)">Failure: L1↛L2 → Educated Unemployed + Skill Gap</text>
</svg>
