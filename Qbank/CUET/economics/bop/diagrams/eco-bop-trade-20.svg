<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">Current Account — Components and Calculation</text>

  <!-- Main Box -->
  <rect x="290" y="55" width="220" height="50" rx="8" fill="#1a3c5e"/>
  <text x="400" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Current Account</text>
  <text x="400" y="97" text-anchor="middle" font-size="11" fill="#90caf9">Balance = Sum of all components</text>

  <!-- Connector lines -->
  <line x1="400" y1="105" x2="400" y2="140" stroke="#555" stroke-width="2"/>
  <line x1="140" y1="140" x2="660" y2="140" stroke="#555" stroke-width="2"/>
  <line x1="140" y1="140" x2="140" y2="165" stroke="#555" stroke-width="2"/>
  <line x1="310" y1="140" x2="310" y2="165" stroke="#555" stroke-width="2"/>
  <line x1="490" y1="140" x2="490" y2="165" stroke="#555" stroke-width="2"/>
  <line x1="660" y1="140" x2="660" y2="165" stroke="#555" stroke-width="2"/>

  <!-- Box 1: Visible Trade -->
  <rect x="60" y="165" width="160" height="70" rx="8" fill="#1565c0"/>
  <text x="140" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">① Visible Trade</text>
  <text x="140" y="207" text-anchor="middle" font-size="11" fill="#bbdefb">(Balance of Trade)</text>
  <text x="140" y="223" text-anchor="middle" font-size="11" fill="#fff">Exports − Imports</text>

  <!-- Box 2: Invisible Trade - Services -->
  <rect x="232" y="165" width="156" height="70" rx="8" fill="#00838f"/>
  <text x="310" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">② Services</text>
  <text x="310" y="207" text-anchor="middle" font-size="11" fill="#b2ebf2">(Invisible Exports)</text>
  <text x="310" y="223" text-anchor="middle" font-size="11" fill="#fff">IT, Tourism, Banking</text>

  <!-- Box 3: Income -->
  <rect x="412" y="165" width="156" height="70" rx="8" fill="#4527a0"/>
  <text x="490" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">③ Income</text>
  <text x="490" y="207" text-anchor="middle" font-size="11" fill="#d1c4e9">(Factor Income)</text>
  <text x="490" y="223" text-anchor="middle" font-size="11" fill="#fff">Wages, Profits, Interest</text>

  <!-- Box 4: Transfers -->
  <rect x="580" y="165" width="160" height="70" rx="8" fill="#2e7d32"/>
  <text x="660" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">④ Transfers</text>
  <text x="660" y="207" text-anchor="middle" font-size="11" fill="#c8e6c9">(Unilateral)</text>
  <text x="660" y="223" text-anchor="middle" font-size="11" fill="#fff">Remittances, Aid</text>

  <!-- Formula Section -->
  <rect x="80" y="260" width="640" height="60" rx="10" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Current Account Balance = ① + ② + ③ + ④</text>
  <text x="400" y="307" text-anchor="middle" font-size="12" fill="#6d4c41">Surplus (+) = Receipts &gt; Payments | Deficit (−) = Payments &gt; Receipts</text>

  <!-- India Example -->
  <rect x="80" y="340" width="640" height="130" rx="10" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5"/>
  <text x="400" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">India's Typical Current Account Position</text>
  <text x="140" y="386" font-size="12" fill="#283593">• Visible Trade: Large DEFICIT (Imports &gt; Exports — oil, gold)</text>
  <text x="140" y="403" font-size="12" fill="#283593">• Services: SURPLUS (IT, software exports)</text>
  <text x="140" y="420" font-size="12" fill="#283593">• Income: Small DEFICIT (profit repatriation by MNCs)</text>
  <text x="140" y="437" font-size="12" fill="#283593">• Transfers: SURPLUS (Remittances from NRIs — largest in world)</text>
  <text x="140" y="457" font-size="12" fill="#7b1fa2" font-weight="bold">Net Result: Current Account DEFICIT (visible deficit dominates)</text>
</svg>
