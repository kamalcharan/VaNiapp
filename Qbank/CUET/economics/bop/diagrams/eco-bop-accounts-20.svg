<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="520" fill="#f8f9fa"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Balance of Payments (BOP) — Account Structure</text>

  <!-- Root -->
  <rect x="300" y="60" width="200" height="44" rx="8" fill="#1a3c5e"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Balance of Payments</text>
  <line x1="400" y1="104" x2="400" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Level 1 branches -->
  <line x1="400" y1="130" x2="170" y2="130" stroke="#555" stroke-width="2"/>
  <line x1="400" y1="130" x2="630" y2="130" stroke="#555" stroke-width="2"/>
  <line x1="170" y1="130" x2="170" y2="155" stroke="#555" stroke-width="2"/>
  <line x1="630" y1="130" x2="630" y2="155" stroke="#555" stroke-width="2"/>

  <rect x="80" y="155" width="180" height="44" rx="8" fill="#2e7d32"/>
  <text x="170" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Current Account</text>

  <rect x="540" y="155" width="180" height="44" rx="8" fill="#1565c0"/>
  <text x="630" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Capital Account</text>

  <!-- Current Account children -->
  <line x1="170" y1="199" x2="170" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="170" y1="225" x2="60" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="170" y1="225" x2="280" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="225" x2="60" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="225" x2="280" y2="250" stroke="#555" stroke-width="1.5"/>

  <rect x="5" y="250" width="110" height="50" rx="6" fill="#43a047"/>
  <text x="60" y="272" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Visible Trade</text>
  <text x="60" y="288" text-anchor="middle" font-size="10" fill="#c8e6c9">(Goods/Merchandise)</text>

  <rect x="225" y="250" width="110" height="50" rx="6" fill="#43a047"/>
  <text x="280" y="272" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Invisible Trade</text>
  <text x="280" y="288" text-anchor="middle" font-size="10" fill="#c8e6c9">(Services + Transfers)</text>

  <!-- Current account sub-boxes for invisibles -->
  <line x1="280" y1="300" x2="280" y2="320" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="320" x2="195" y2="320" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="320" x2="365" y2="320" stroke="#555" stroke-width="1.5"/>
  <line x1="195" y1="320" x2="195" y2="340" stroke="#555" stroke-width="1.5"/>
  <line x1="365" y1="320" x2="365" y2="340" stroke="#555" stroke-width="1.5"/>

  <rect x="150" y="340" width="90" height="40" rx="5" fill="#66bb6a"/>
  <text x="195" y="357" text-anchor="middle" font-size="10" fill="#fff">Services</text>
  <text x="195" y="372" text-anchor="middle" font-size="9" fill="#e8f5e9">(IT, Tourism…)</text>

  <rect x="320" y="340" width="90" height="40" rx="5" fill="#66bb6a"/>
  <text x="365" y="357" text-anchor="middle" font-size="10" fill="#fff">Transfers</text>
  <text x="365" y="372" text-anchor="middle" font-size="9" fill="#e8f5e9">(Remittances…)</text>

  <!-- Capital Account children -->
  <line x1="630" y1="199" x2="630" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="630" y1="225" x2="530" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="630" y1="225" x2="730" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="530" y1="225" x2="530" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="730" y1="225" x2="730" y2="250" stroke="#555" stroke-width="1.5"/>

  <rect x="475" y="250" width="110" height="50" rx="6" fill="#1976d2"/>
  <text x="530" y="272" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Portfolio</text>
  <text x="530" y="288" text-anchor="middle" font-size="10" fill="#bbdefb">Investment (FII)</text>

  <rect x="675" y="250" width="110" height="50" rx="6" fill="#1976d2"/>
  <text x="730" y="272" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Direct</text>
  <text x="730" y="288" text-anchor="middle" font-size="10" fill="#bbdefb">Investment (FDI)</text>

  <!-- Official Reserve Transactions -->
  <line x1="400" y1="104" x2="400" y2="420" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="300" y="420" width="200" height="50" rx="8" fill="#6a1b9a"/>
  <text x="400" y="441" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Official Reserve</text>
  <text x="400" y="458" text-anchor="middle" font-size="11" fill="#e1bee7">Transactions</text>

  <!-- BOP Identity -->
  <rect x="180" y="490" width="440" height="22" rx="5" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="400" y="506" text-anchor="middle" font-size="12" fill="#e65100">Key Identity: Current Account + Capital Account + Official Reserves = 0</text>
</svg>
