<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="480" fill="#f8f9fa"/>
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Foreign Exchange Market: Demand and Supply</text>
  <text x="350" y="50" text-anchor="middle" font-size="12" fill="#555">(Exchange Rate of Dollar in Rupees vs Quantity of Foreign Exchange)</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="400" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="400" x2="640" y2="400" stroke="#333" stroke-width="2"/>
  <text x="45" y="240" text-anchor="middle" font-size="13" fill="#333" transform="rotate(-90,45,240)">Exchange Rate (₹ per $)</text>
  <text x="370" y="440" text-anchor="middle" font-size="13" fill="#333">Quantity of Foreign Exchange (Dollars)</text>

  <!-- Y-axis ticks -->
  <line x1="96" y1="130" x2="104" y2="130" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="134" text-anchor="end" font-size="11" fill="#555">R₃</text>
  <line x1="96" y1="220" x2="104" y2="220" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="224" text-anchor="end" font-size="11" fill="#555">R₂*</text>
  <line x1="96" y1="310" x2="104" y2="310" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="314" text-anchor="end" font-size="11" fill="#555">R₁</text>

  <!-- X-axis ticks -->
  <line x1="240" y1="396" x2="240" y2="404" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="418" text-anchor="middle" font-size="11" fill="#555">Q₁</text>
  <line x1="370" y1="396" x2="370" y2="404" stroke="#555" stroke-width="1.5"/>
  <text x="370" y="418" text-anchor="middle" font-size="11" fill="#555">Q*</text>
  <line x1="500" y1="396" x2="500" y2="404" stroke="#555" stroke-width="1.5"/>
  <text x="500" y="418" text-anchor="middle" font-size="11" fill="#555">Q₂</text>

  <!-- Demand curve (downward sloping) -->
  <path d="M 150,100 L 580,390" stroke="#c62828" stroke-width="3" fill="none"/>
  <text x="600" y="395" font-size="14" fill="#c62828" font-weight="bold">D</text>
  <text x="155" y="95" font-size="11" fill="#c62828">(Imports/FDI outflows)</text>

  <!-- Supply curve (upward sloping) -->
  <path d="M 150,390 L 580,100" stroke="#1b5e20" stroke-width="3" fill="none"/>
  <text x="600" y="98" font-size="14" fill="#1b5e20" font-weight="bold">S</text>
  <text x="155" y="405" font-size="11" fill="#1b5e20">(Exports/FDI inflows)</text>

  <!-- Equilibrium point -->
  <circle cx="370" cy="220" r="7" fill="#ff6f00"/>
  <text x="385" y="215" font-size="12" fill="#ff6f00" font-weight="bold">E (Equilibrium)</text>

  <!-- Dashed lines to axes -->
  <line x1="100" y1="220" x2="370" y2="220" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="370" y1="220" x2="370" y2="400" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Explanations -->
  <rect x="108" y="450" width="480" height="24" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="348" y="467" text-anchor="middle" font-size="12" fill="#0d47a1">D slopes ↓: Lower rate → cheaper imports → more forex demanded</text>
</svg>
