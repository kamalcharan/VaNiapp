<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="480" fill="#f8f9fa"/>
  <text x="380" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">The J-Curve Effect: Impact of Devaluation on Trade Balance</text>

  <!-- Axes -->
  <line x1="100" y1="50" x2="100" y2="400" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="230" x2="700" y2="230" stroke="#333" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="50" y="55" text-anchor="middle" font-size="12" fill="#333">Trade</text>
  <text x="50" y="70" text-anchor="middle" font-size="12" fill="#333">Balance</text>
  <text x="400" y="430" text-anchor="middle" font-size="12" fill="#333">Time (after devaluation)</text>

  <!-- Surplus / Deficit labels -->
  <text x="92" y="180" text-anchor="end" font-size="11" fill="#2e7d32">Surplus (+)</text>
  <text x="92" y="285" text-anchor="end" font-size="11" fill="#c62828">Deficit (−)</text>

  <!-- Zero line label -->
  <text x="92" y="234" text-anchor="end" font-size="11" fill="#555">0</text>

  <!-- Devaluation point -->
  <line x1="200" y1="50" x2="200" y2="400" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="200" y="410" text-anchor="middle" font-size="11" fill="#555">Devaluation</text>
  <text x="200" y="422" text-anchor="middle" font-size="11" fill="#555">Occurs</text>

  <!-- J-Curve path -->
  <!-- Before devaluation: flat line at zero (slight deficit) -->
  <path d="M 100,230 L 200,240" stroke="#1565c0" stroke-width="3" fill="none"/>

  <!-- After devaluation: initial dip (J-curve bottom), then recovery and surplus -->
  <path d="M 200,240 C 230,300 280,360 340,350 C 400,340 440,280 500,180 C 560,100 620,120 680,130"
        stroke="#1565c0" stroke-width="3" fill="none"/>

  <!-- Shaded area below zero (deficit zone) -->
  <path d="M 200,240 C 230,300 280,360 340,350 L 340,230 Z"
        fill="#ffcdd2" opacity="0.5"/>

  <!-- Shaded area above zero (surplus zone) -->
  <path d="M 370,230 C 400,210 440,170 500,180 C 560,100 620,120 680,130 L 680,230 Z"
        fill="#c8e6c9" opacity="0.5"/>

  <!-- Labels -->
  <text x="280" y="365" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">Initial Worsening</text>
  <text x="280" y="378" text-anchor="middle" font-size="11" fill="#c62828">(Contracts still in old prices)</text>

  <text x="570" y="145" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">Long-run</text>
  <text x="570" y="158" text-anchor="middle" font-size="11" fill="#2e7d32">Improvement</text>

  <!-- Arrow for J shape -->
  <text x="420" y="95" text-anchor="middle" font-size="22" fill="#1565c0">↑ Improvement in</text>
  <text x="420" y="112" text-anchor="middle" font-size="12" fill="#1565c0">Trade Balance (Long-run)</text>

  <!-- J label on the curve -->
  <text x="530" y="165" font-size="28" fill="#1565c0" font-weight="bold">J</text>

  <!-- Phases annotation -->
  <rect x="108" y="440" width="230" height="30" rx="4" fill="#ffcdd2" stroke="#e57373"/>
  <text x="223" y="460" text-anchor="middle" font-size="11" fill="#b71c1c">Short-run: Contracts + J-lag → Deficit Worsens</text>

  <rect x="360" y="440" width="230" height="30" rx="4" fill="#c8e6c9" stroke="#81c784"/>
  <text x="475" y="460" text-anchor="middle" font-size="11" fill="#1b5e20">Long-run: Exports↑, Imports↓ → Deficit Improves</text>

  <!-- Tick marks -->
  <line x1="96" y1="150" x2="104" y2="150" stroke="#555" stroke-width="1.5"/>
  <line x1="96" y1="310" x2="104" y2="310" stroke="#555" stroke-width="1.5"/>
</svg>
