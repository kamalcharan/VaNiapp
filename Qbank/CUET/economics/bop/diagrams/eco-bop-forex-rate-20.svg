<svg viewBox="0 0 740 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="480" fill="#f8f9fa"/>
  <text x="370" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3c5e">Forex Market: Demand Curve Shift (D₀ → D₁)</text>
  <text x="370" y="48" text-anchor="middle" font-size="12" fill="#777">Effect of Reduced Import Demand (e.g., higher tariffs)</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="400" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="400" x2="660" y2="400" stroke="#333" stroke-width="2"/>
  <text x="40" y="240" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90,40,240)">Exchange Rate (₹ per $)</text>
  <text x="380" y="430" text-anchor="middle" font-size="12" fill="#333">Quantity of Foreign Exchange ($)</text>

  <!-- Y-axis ticks/labels -->
  <line x1="96" y1="180" x2="104" y2="180" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="184" text-anchor="end" font-size="11" fill="#555">R₀</text>
  <line x1="96" y1="250" x2="104" y2="250" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="254" text-anchor="end" font-size="11" fill="#555">R₁</text>

  <!-- X-axis ticks -->
  <line x1="300" y1="396" x2="300" y2="404" stroke="#555" stroke-width="1.5"/>
  <text x="300" y="418" text-anchor="middle" font-size="11" fill="#555">Q₁</text>
  <line x1="420" y1="396" x2="420" y2="404" stroke="#555" stroke-width="1.5"/>
  <text x="420" y="418" text-anchor="middle" font-size="11" fill="#555">Q₀</text>

  <!-- Supply curve S (unchanged) -->
  <path d="M 140,390 L 580,90" stroke="#1b5e20" stroke-width="3" fill="none"/>
  <text x="592" y="88" font-size="14" fill="#1b5e20" font-weight="bold">S</text>

  <!-- Original Demand D₀ -->
  <path d="M 150,90 L 590,390" stroke="#c62828" stroke-width="2.5" stroke-dasharray="8,4" fill="none"/>
  <text x="600" y="393" font-size="14" fill="#c62828" font-weight="bold">D₀</text>

  <!-- New Demand D₁ (shifted left — less demand for forex) -->
  <path d="M 110,110 L 480,390" stroke="#e57373" stroke-width="3" fill="none"/>
  <text x="492" y="392" font-size="14" fill="#c62828" font-weight="bold">D₁</text>

  <!-- Shift arrow -->
  <path d="M 450,200 L 360,200" stroke="#c62828" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <text x="400" y="192" text-anchor="middle" font-size="11" fill="#c62828">Shift Left</text>

  <!-- Old equilibrium E₀ -->
  <circle cx="420" cy="180" r="6" fill="#ff6f00"/>
  <text x="435" y="178" font-size="11" fill="#ff6f00">E₀</text>

  <!-- New equilibrium E₁ -->
  <circle cx="300" cy="250" r="6" fill="#7b1fa2"/>
  <text x="314" y="248" font-size="11" fill="#7b1fa2">E₁</text>

  <!-- Dashed lines for equilibria -->
  <line x1="100" y1="180" x2="420" y2="180" stroke="#ff6f00" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="420" y1="180" x2="420" y2="400" stroke="#ff6f00" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="100" y1="250" x2="300" y2="250" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="300" y1="250" x2="300" y2="400" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Annotation -->
  <rect x="108" y="448" width="520" height="24" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="368" y="465" text-anchor="middle" font-size="12" fill="#1b5e20">D₀→D₁: Less import demand → Rupee appreciates (rate falls from R₀ to R₁)</text>
</svg>
