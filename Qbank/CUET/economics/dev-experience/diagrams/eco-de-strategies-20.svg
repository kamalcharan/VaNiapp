<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">Development Strategies: India vs China vs Pakistan</text>

  <!-- Table -->
  <rect x="25" y="48" width="770" height="310" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="25" y="48" width="770" height="36" rx="8" fill="#1a3c5e"/>
  <text x="165" y="71" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Strategy / Feature</text>
  <text x="415" y="71" text-anchor="middle" font-size="12" fill="#ffa726" font-weight="bold">India</text>
  <text x="570" y="71" text-anchor="middle" font-size="12" fill="#42a5f5" font-weight="bold">China</text>
  <text x="725" y="71" text-anchor="middle" font-size="12" fill="#81c784" font-weight="bold">Pakistan</text>

  <line x1="315" y1="48" x2="315" y2="358" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="505" y1="48" x2="505" y2="358" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="640" y1="48" x2="640" y2="358" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Row 1 -->
  <line x1="25" y1="84" x2="795" y2="84" stroke="#eceff1" stroke-width="1"/>
  <rect x="25" y="84" width="770" height="35" fill="#f5f5f5"/>
  <text x="165" y="106" text-anchor="middle" font-size="11" fill="#333">Development Model</text>
  <text x="415" y="106" text-anchor="middle" font-size="11" fill="#555">Mixed Economy → Market</text>
  <text x="570" y="106" text-anchor="middle" font-size="11" fill="#555">Socialist Market Economy</text>
  <text x="725" y="106" text-anchor="middle" font-size="11" fill="#555">Mixed + Aid Dependent</text>

  <!-- Row 2 -->
  <line x1="25" y1="119" x2="795" y2="119" stroke="#eceff1" stroke-width="1"/>
  <text x="165" y="141" text-anchor="middle" font-size="11" fill="#333">Reform / Opening Year</text>
  <text x="415" y="141" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">1991 (LPG Reforms)</text>
  <text x="570" y="141" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">1978 (Deng Reforms)</text>
  <text x="725" y="141" text-anchor="middle" font-size="11" fill="#555">Gradual / Partial</text>

  <!-- Row 3 -->
  <line x1="25" y1="154" x2="795" y2="154" stroke="#eceff1" stroke-width="1"/>
  <rect x="25" y="154" width="770" height="35" fill="#f5f5f5"/>
  <text x="165" y="176" text-anchor="middle" font-size="11" fill="#333">Growth Driver</text>
  <text x="415" y="176" text-anchor="middle" font-size="11" fill="#555">Services (IT, BPO)</text>
  <text x="570" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Manufacturing + Exports</text>
  <text x="725" y="176" text-anchor="middle" font-size="11" fill="#555">Textiles + Remittances</text>

  <!-- Row 4 -->
  <line x1="25" y1="189" x2="795" y2="189" stroke="#eceff1" stroke-width="1"/>
  <text x="165" y="211" text-anchor="middle" font-size="11" fill="#333">Agricultural Reform</text>
  <text x="415" y="211" text-anchor="middle" font-size="11" fill="#555">Zamindari abolition (partial)</text>
  <text x="570" y="211" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Household Responsibility System</text>
  <text x="725" y="211" text-anchor="middle" font-size="11" fill="#c62828">Feudal system persists</text>

  <!-- Row 5 -->
  <line x1="25" y1="224" x2="795" y2="224" stroke="#eceff1" stroke-width="1"/>
  <rect x="25" y="224" width="770" height="35" fill="#f5f5f5"/>
  <text x="165" y="246" text-anchor="middle" font-size="11" fill="#333">Trade Strategy</text>
  <text x="415" y="246" text-anchor="middle" font-size="11" fill="#555">Import Sub → Liberalisation</text>
  <text x="570" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Export-led + SEZs</text>
  <text x="725" y="246" text-anchor="middle" font-size="11" fill="#555">Narrow export basket</text>

  <!-- Row 6 -->
  <line x1="25" y1="259" x2="795" y2="259" stroke="#eceff1" stroke-width="1"/>
  <text x="165" y="281" text-anchor="middle" font-size="11" fill="#333">Population Policy</text>
  <text x="415" y="281" text-anchor="middle" font-size="11" fill="#555">Voluntary Family Planning</text>
  <text x="570" y="281" text-anchor="middle" font-size="11" fill="#555">One-Child Policy (1979–2015)</text>
  <text x="725" y="281" text-anchor="middle" font-size="11" fill="#c62828">High growth — no firm policy</text>

  <!-- Row 7 -->
  <line x1="25" y1="294" x2="795" y2="294" stroke="#eceff1" stroke-width="1"/>
  <rect x="25" y="294" width="770" height="35" fill="#f5f5f5"/>
  <text x="165" y="316" text-anchor="middle" font-size="11" fill="#333">Industrial Policy</text>
  <text x="415" y="316" text-anchor="middle" font-size="11" fill="#555">Licence Raj → MSME focus</text>
  <text x="570" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">SEZs + TVEs + FDI</text>
  <text x="725" y="316" text-anchor="middle" font-size="11" fill="#555">Nationalisation → Privatisation</text>

  <line x1="25" y1="329" x2="795" y2="329" stroke="#eceff1" stroke-width="1"/>
  <text x="165" y="351" text-anchor="middle" font-size="11" fill="#333">Political Governance</text>
  <text x="415" y="351" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Stable Democracy ✓</text>
  <text x="570" y="351" text-anchor="middle" font-size="11" fill="#555">Single-party (CPC)</text>
  <text x="725" y="351" text-anchor="middle" font-size="11" fill="#c62828">4 Military coups</text>

  <!-- Bottom insight boxes -->
  <rect x="25" y="370" width="250" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="150" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">Licence Raj Abolished:</text>
  <text x="150" y="407" text-anchor="middle" font-size="11" fill="#1565c0">India (1991) dismantled complex</text>
  <text x="150" y="422" text-anchor="middle" font-size="11" fill="#1565c0">licensing rules → market opening</text>

  <rect x="285" y="370" width="250" height="60" rx="6" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="410" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Great Leap Forward:</text>
  <text x="410" y="407" text-anchor="middle" font-size="11" fill="#2e7d32">China (1958–1961) — forced</text>
  <text x="410" y="422" text-anchor="middle" font-size="11" fill="#2e7d32">collectivisation → massive failure</text>

  <rect x="545" y="370" width="250" height="60" rx="6" fill="#fce4ec" stroke="#c62828"/>
  <text x="670" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Pakistan's Bhutto Era:</text>
  <text x="670" y="407" text-anchor="middle" font-size="11" fill="#c62828">1970s nationalisation of banks</text>
  <text x="670" y="422" text-anchor="middle" font-size="11" fill="#c62828">and industry → inefficiency</text>

  <rect x="25" y="444" width="770" height="38" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="410" y="462" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">All three started at similar levels in 1947–49; strategy differences explain divergent outcomes over 70 years</text>
  <text x="410" y="477" text-anchor="middle" font-size="11" fill="#6d4c41">China's early SEZs + manufacturing focus = fastest growth | India's democracy = sustainable | Pakistan's military bias = structural weakness</text>
</svg>
