<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="500" fill="#f8f9fa"/>
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">Development Indicators: India, China and Pakistan</text>
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#555">Country A = China | Country B = India | Country C = Pakistan (Approx. 2020 data)</text>

  <!-- Table -->
  <rect x="30" y="58" width="760" height="290" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="30" y="58" width="760" height="38" rx="8" fill="#37474f"/>
  <text x="200" y="82" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Indicator</text>
  <text x="430" y="82" text-anchor="middle" font-size="12" fill="#42a5f5" font-weight="bold">China (A)</text>
  <text x="570" y="82" text-anchor="middle" font-size="12" fill="#ffa726" font-weight="bold">India (B)</text>
  <text x="710" y="82" text-anchor="middle" font-size="12" fill="#81c784" font-weight="bold">Pakistan (C)</text>

  <line x1="350" y1="58" x2="350" y2="348" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="510" y1="58" x2="510" y2="348" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="650" y1="58" x2="650" y2="348" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Row 1 -->
  <line x1="30" y1="96" x2="790" y2="96" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="96" width="760" height="37" fill="#f5f5f5"/>
  <text x="190" y="119" text-anchor="middle" font-size="12" fill="#333">Per Capita Income (PPP $)</text>
  <text x="430" y="119" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">16,057 ✓</text>
  <text x="570" y="119" text-anchor="middle" font-size="12" fill="#555">6,454</text>
  <text x="710" y="119" text-anchor="middle" font-size="12" fill="#555">4,624</text>

  <!-- Row 2 -->
  <line x1="30" y1="133" x2="790" y2="133" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="156" text-anchor="middle" font-size="12" fill="#333">Life Expectancy (years)</text>
  <text x="430" y="156" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">77.4 ✓</text>
  <text x="570" y="156" text-anchor="middle" font-size="12" fill="#555">69.7</text>
  <text x="710" y="156" text-anchor="middle" font-size="12" fill="#555">67.3</text>

  <!-- Row 3 -->
  <line x1="30" y1="170" x2="790" y2="170" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="170" width="760" height="37" fill="#f5f5f5"/>
  <text x="190" y="193" text-anchor="middle" font-size="12" fill="#333">Literacy Rate (%)</text>
  <text x="430" y="193" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">96.8 ✓</text>
  <text x="570" y="193" text-anchor="middle" font-size="12" fill="#555">74.4</text>
  <text x="710" y="193" text-anchor="middle" font-size="12" fill="#555">59.1</text>

  <!-- Row 4 -->
  <line x1="30" y1="207" x2="790" y2="207" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="230" text-anchor="middle" font-size="12" fill="#333">IMR (per 1,000 live births)</text>
  <text x="430" y="230" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">7 ✓ (lowest)</text>
  <text x="570" y="230" text-anchor="middle" font-size="12" fill="#555">30</text>
  <text x="710" y="230" text-anchor="middle" font-size="12" fill="#c62828">57 (highest)</text>

  <!-- Row 5 -->
  <line x1="30" y1="244" x2="790" y2="244" stroke="#eceff1" stroke-width="1"/>
  <rect x="30" y="244" width="760" height="37" fill="#f5f5f5"/>
  <text x="190" y="267" text-anchor="middle" font-size="12" fill="#333">HDI Value</text>
  <text x="430" y="267" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">0.768 ✓</text>
  <text x="570" y="267" text-anchor="middle" font-size="12" fill="#555">0.645</text>
  <text x="710" y="267" text-anchor="middle" font-size="12" fill="#555">0.544</text>

  <!-- Row 6 -->
  <line x1="30" y1="281" x2="790" y2="281" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="304" text-anchor="middle" font-size="12" fill="#333">Press Freedom Ranking</text>
  <text x="430" y="304" text-anchor="middle" font-size="12" fill="#c62828">Very Low</text>
  <text x="570" y="304" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">Higher ✓ (Free press)</text>
  <text x="710" y="304" text-anchor="middle" font-size="12" fill="#555">Moderate</text>

  <line x1="30" y1="318" x2="790" y2="318" stroke="#eceff1" stroke-width="1"/>
  <text x="190" y="341" text-anchor="middle" font-size="12" fill="#333">Labour Productivity</text>
  <text x="430" y="341" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="bold">Highest (16057/PPP) ✓</text>
  <text x="570" y="341" text-anchor="middle" font-size="12" fill="#555">Medium</text>
  <text x="710" y="341" text-anchor="middle" font-size="12" fill="#555">Lowest</text>

  <!-- Key indicators diagram -->
  <rect x="30" y="360" width="250" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="155" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">China leads on:</text>
  <text x="155" y="397" text-anchor="middle" font-size="11" fill="#1565c0">Income, Health, Education, HDI</text>
  <text x="155" y="412" text-anchor="middle" font-size="11" fill="#1565c0">(All economic indicators)</text>

  <rect x="295" y="360" width="240" height="55" rx="6" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="415" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">India leads on:</text>
  <text x="415" y="397" text-anchor="middle" font-size="11" fill="#bf360c">Political freedom, Democracy,</text>
  <text x="415" y="412" text-anchor="middle" font-size="11" fill="#bf360c">Press freedom, Civil liberties</text>

  <rect x="550" y="360" width="240" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="670" y="380" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Pakistan trails on:</text>
  <text x="670" y="397" text-anchor="middle" font-size="11" fill="#c62828">All indicators — lowest literacy,</text>
  <text x="670" y="412" text-anchor="middle" font-size="11" fill="#c62828">highest IMR, lowest HDI</text>

  <rect x="30" y="428" width="760" height="35" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="410" y="450" text-anchor="middle" font-size="12" fill="#1b5e20">Conclusion: China leads economically; India leads in democracy; Pakistan struggles across all dimensions</text>
</svg>
