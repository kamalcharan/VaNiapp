<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="520" fill="#f8f9fa"/>
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3c5e">India vs Pakistan — Comparative Development Indicators</text>

  <!-- Table -->
  <rect x="40" y="50" width="740" height="360" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="40" y="50" width="740" height="38" rx="8" fill="#1a3c5e"/>
  <text x="220" y="74" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Indicator</text>
  <text x="530" y="74" text-anchor="middle" font-size="13" fill="#ff8f00" font-weight="bold">India</text>
  <text x="700" y="74" text-anchor="middle" font-size="13" fill="#81c784" font-weight="bold">Pakistan</text>

  <line x1="400" y1="50" x2="400" y2="410" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="625" y1="50" x2="625" y2="410" stroke="#cfd8dc" stroke-width="1"/>

  <!-- Rows -->
  <line x1="40" y1="88" x2="780" y2="88" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="88" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="111" text-anchor="middle" font-size="12" fill="#333">GDP (Nominal, approx.)</text>
  <text x="530" y="111" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">~$3.5 trillion ✓</text>
  <text x="700" y="111" text-anchor="middle" font-size="12" fill="#555">~$350 billion</text>

  <line x1="40" y1="125" x2="780" y2="125" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="148" text-anchor="middle" font-size="12" fill="#333">GDP Growth Rate (recent avg.)</text>
  <text x="530" y="148" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">6–7% ✓</text>
  <text x="700" y="148" text-anchor="middle" font-size="12" fill="#555">2–4%</text>

  <line x1="40" y1="162" x2="780" y2="162" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="162" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="185" text-anchor="middle" font-size="12" fill="#333">Literacy Rate</text>
  <text x="530" y="185" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">~77% ✓</text>
  <text x="700" y="185" text-anchor="middle" font-size="12" fill="#555">~58%</text>

  <line x1="40" y1="199" x2="780" y2="199" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="222" text-anchor="middle" font-size="12" fill="#333">Services Sector (% GDP)</text>
  <text x="530" y="222" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">~60% — IT leader ✓</text>
  <text x="700" y="222" text-anchor="middle" font-size="12" fill="#555">~58% — less diversified</text>

  <line x1="40" y1="236" x2="780" y2="236" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="236" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="259" text-anchor="middle" font-size="12" fill="#333">Exports Composition</text>
  <text x="530" y="259" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Diversified (IT, pharma, auto) ✓</text>
  <text x="700" y="259" text-anchor="middle" font-size="12" fill="#555">Concentrated (textiles, cotton)</text>

  <line x1="40" y1="273" x2="780" y2="273" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="296" text-anchor="middle" font-size="12" fill="#333">Military Spending (% GDP)</text>
  <text x="530" y="296" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">~2.4% (lower) ✓</text>
  <text x="700" y="296" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">~4% (higher burden)</text>

  <line x1="40" y1="310" x2="780" y2="310" stroke="#eceff1" stroke-width="1"/>
  <rect x="40" y="310" width="740" height="37" fill="#f5f5f5"/>
  <text x="220" y="333" text-anchor="middle" font-size="12" fill="#333">IMF Programmes (since 1958)</text>
  <text x="530" y="333" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">~6 times ✓</text>
  <text x="700" y="333" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">~22 times (frequent borrower)</text>

  <line x1="40" y1="347" x2="780" y2="347" stroke="#eceff1" stroke-width="1"/>
  <text x="220" y="374" text-anchor="middle" font-size="12" fill="#333">Political System</text>
  <text x="530" y="374" text-anchor="middle" font-size="12" fill="#e65100" font-weight="bold">Continuous democracy ✓</text>
  <text x="700" y="374" text-anchor="middle" font-size="12" fill="#c62828">4 military coups</text>

  <line x1="40" y1="384" x2="780" y2="384" stroke="#eceff1" stroke-width="1"/>

  <!-- Summary boxes -->
  <rect x="40" y="420" width="350" height="42" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="215" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d47a1">Common Origin:</text>
  <text x="215" y="455" text-anchor="middle" font-size="11" fill="#1565c0">Both part of British India till 1947 — similar start</text>

  <rect x="420" y="420" width="360" height="42" rx="6" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="600" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">Key Divergence:</text>
  <text x="600" y="455" text-anchor="middle" font-size="11" fill="#bf360c">India: democracy + IT | Pakistan: military + narrow exports</text>

  <rect x="40" y="474" width="740" height="38" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="410" y="498" text-anchor="middle" font-size="12" fill="#e65100">India leads across most economic and political indicators — Pakistan faces structural fiscal challenges and political instability</text>
</svg>
