<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="750" height="600" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Structure of the Indian Constitution</text>
  <text x="375" y="46" text-anchor="middle" font-size="11" fill="#666">How do the parts work together for democratic governance and social transformation?</text>

  <!-- FLAG at top: WE, THE PEOPLE OF INDIA -->
  <!-- Flagpole -->
  <line x1="375" y1="58" x2="375" y2="80" stroke="#666" stroke-width="3"/>
  <!-- Flag -->
  <rect x="378" y="58" width="110" height="10" fill="#FF9933"/>
  <rect x="378" y="68" width="110" height="10" fill="#fff"/>
  <rect x="378" y="78" width="110" height="10" fill="#138808"/>
  <circle cx="433" cy="73" r="4" fill="none" stroke="#000080" stroke-width="0.8"/>
  <text x="375" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">"WE, THE PEOPLE OF INDIA"</text>

  <!-- FEDERAL STRUCTURE — above roof -->
  <rect x="120" y="115" width="510" height="38" fill="#7A5AAA" stroke="#5A3A8A" stroke-width="2" rx="6"/>
  <text x="375" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">FEDERAL STRUCTURE</text>
  <text x="375" y="148" text-anchor="middle" font-size="9" fill="#D8C8F0">Union List  |  State List  |  Concurrent List</text>

  <!-- ROOF — Three organs of government -->
  <!-- Triangular roof shape -->
  <polygon points="100,158 375,130 650,158 650,168 100,168" fill="#E8D8C0" stroke="#8B7355" stroke-width="2"/>
  
  <!-- Three sections of roof -->
  <rect x="110" y="170" width="170" height="50" fill="#D4716A" stroke="#B04040" stroke-width="1.5" rx="4"/>
  <text x="195" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">LEGISLATURE</text>
  <text x="195" y="205" text-anchor="middle" font-size="8" fill="#F8D0D0">Parliament: Lok Sabha</text>
  <text x="195" y="215" text-anchor="middle" font-size="8" fill="#F8D0D0">+ Rajya Sabha</text>

  <rect x="290" y="170" width="170" height="50" fill="#4A7A9B" stroke="#2B5A7B" stroke-width="1.5" rx="4"/>
  <text x="375" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">EXECUTIVE</text>
  <text x="375" y="205" text-anchor="middle" font-size="8" fill="#C8E0F0">President, PM, Council</text>
  <text x="375" y="215" text-anchor="middle" font-size="8" fill="#C8E0F0">of Ministers</text>

  <rect x="470" y="170" width="170" height="50" fill="#5A8A3A" stroke="#3A6A1A" stroke-width="1.5" rx="4"/>
  <text x="555" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">JUDICIARY</text>
  <text x="555" y="205" text-anchor="middle" font-size="8" fill="#D0F0D0">Supreme Court,</text>
  <text x="555" y="215" text-anchor="middle" font-size="8" fill="#D0F0D0">High Courts</text>

  <!-- CONNECTING BEAM — Fundamental Duties -->
  <rect x="110" y="225" width="530" height="28" fill="#E8D8B0" stroke="#A09060" stroke-width="2" rx="4"/>
  <text x="375" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="#5A4A2A">FUNDAMENTAL DUTIES (Part IV-A)</text>
  <text x="600" y="243" font-size="7" fill="#888" font-style="italic">Added: 42nd Amendment</text>

  <!-- PILLAR A (Left) — Fundamental Rights -->
  <rect x="120" y="258" width="240" height="220" fill="#4A7A9B" stroke="#2B5A7B" stroke-width="2.5" rx="6"/>
  <text x="240" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PILLAR A</text>
  <text x="240" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#C8E0F0">FUNDAMENTAL RIGHTS</text>
  <text x="240" y="313" text-anchor="middle" font-size="9" fill="#A0C8E0">(Part III)</text>
  
  <rect x="135" y="322" width="210" height="145" fill="#D8EAF4" stroke="#4A7A9B" stroke-width="1" rx="4"/>
  <text x="240" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#2B5A7B">Justiciable — enforceable in courts</text>
  <line x1="145" y1="348" x2="335" y2="348" stroke="#4A7A9B" stroke-width="0.5"/>
  <text x="145" y="364" font-size="9" fill="#333">• Right to Equality</text>
  <text x="145" y="380" font-size="9" fill="#333">• Right to Freedom</text>
  <text x="145" y="396" font-size="9" fill="#333">• Right Against Exploitation</text>
  <text x="145" y="412" font-size="9" fill="#333">• Right to Religious Freedom</text>
  <text x="145" y="428" font-size="9" fill="#333">• Cultural &amp; Educational Rights</text>
  <text x="145" y="444" font-size="9" fill="#333">• Right to Constitutional</text>
  <text x="152" y="458" font-size="9" fill="#333">  Remedies (Art. 32)</text>

  <!-- PILLAR B (Right) — Directive Principles -->
  <rect x="390" y="258" width="240" height="220" fill="#B07830" stroke="#8B5A18" stroke-width="2.5" rx="6"/>
  <text x="510" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">PILLAR B</text>
  <text x="510" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#F0DCC0">DIRECTIVE PRINCIPLES</text>
  <text x="510" y="313" text-anchor="middle" font-size="9" fill="#E0C8A0">(Part IV)</text>
  
  <rect x="405" y="322" width="210" height="145" fill="#F4E8D0" stroke="#B07830" stroke-width="1" rx="4"/>
  <text x="510" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B5A18">Non-justiciable — guide state policy</text>
  <line x1="415" y1="348" x2="605" y2="348" stroke="#B07830" stroke-width="0.5"/>
  <text x="415" y="364" font-size="9" fill="#333">• Social welfare &amp; economic</text>
  <text x="420" y="378" font-size="9" fill="#333">  justice for all</text>
  <text x="415" y="394" font-size="9" fill="#333">• Uniform Civil Code (Art. 44)</text>
  <text x="415" y="410" font-size="9" fill="#333">• Village panchayats</text>
  <text x="415" y="426" font-size="9" fill="#333">• Free &amp; compulsory education</text>
  <text x="415" y="442" font-size="9" fill="#333">• Protection of environment</text>
  <text x="415" y="458" font-size="9" fill="#333">• Equal pay, living wage</text>

  <!-- FOUNDATION — Preamble -->
  <rect x="80" y="485" width="590" height="55" fill="#5B3A29" stroke="#3A2010" stroke-width="3" rx="8"/>
  <text x="375" y="505" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFD700">PREAMBLE — FOUNDATION</text>
  <text x="375" y="522" text-anchor="middle" font-size="10" fill="#E8D8C0">Sovereign | Socialist | Secular | Democratic | Republic</text>
  <text x="375" y="536" text-anchor="middle" font-size="10" fill="#D8C8A8">Justice  •  Liberty  •  Equality  •  Fraternity</text>

  <!-- Balance indicator between pillars -->
  <line x1="370" y1="340" x2="385" y2="340" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="375" y="370" text-anchor="middle" font-size="20" fill="#888">⚖</text>
  <text x="375" y="390" text-anchor="middle" font-size="8" fill="#888">Balance: Liberty</text>
  <text x="375" y="400" text-anchor="middle" font-size="8" fill="#888">+ Social Justice</text>

  <!-- Legend -->
  <rect x="50" y="550" width="650" height="40" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="60" y="568" font-size="10" fill="#555" font-weight="bold">Q: How do the parts work together? Preamble (foundation) + Fundamental Rights (Pillar A, courts) +</text>
  <text x="60" y="582" font-size="10" fill="#555" font-weight="bold">Directive Principles (Pillar B, policy) + Three organs (governance) + Federal structure (Centre-State balance)</text>
</svg>
