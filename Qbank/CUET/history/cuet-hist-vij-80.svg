<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="550" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Simplified Layout of the City of Vijayanagara</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#666">Identify Zones A, B, and C</text>

  <!-- Tungabhadra River at top -->
  <path d="M0,80 Q80,68 160,82 Q240,96 320,78 Q400,62 480,80 Q560,98 640,76 Q680,68 700,72" fill="#A8D4E8" stroke="#5A9AB5" stroke-width="2"/>
  <path d="M0,92 Q80,80 160,94 Q240,108 320,90 Q400,74 480,92 Q560,110 640,88 Q680,80 700,84" fill="#C0E4F4" stroke="none"/>
  <text x="350" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B6A8B">← Tungabhadra River (flowing west to east) →</text>

  <!-- Zone A — Outermost: Agricultural/forested hinterland -->
  <rect x="40" y="100" width="620" height="370" fill="#D4E8C4" stroke="#5A8A3A" stroke-width="3" rx="6"/>
  
  <!-- Agricultural/forest elements in Zone A -->
  <!-- Trees -->
  <circle cx="80" cy="140" r="10" fill="#7AB868" stroke="#4A8A38" stroke-width="1"/>
  <rect x="78" y="148" width="4" height="8" fill="#8B6914"/>
  <circle cx="630" cy="150" r="10" fill="#7AB868" stroke="#4A8A38" stroke-width="1"/>
  <rect x="628" y="158" width="4" height="8" fill="#8B6914"/>
  <circle cx="90" cy="420" r="10" fill="#7AB868" stroke="#4A8A38" stroke-width="1"/>
  <rect x="88" y="428" width="4" height="8" fill="#8B6914"/>
  <circle cx="620" cy="430" r="10" fill="#7AB868" stroke="#4A8A38" stroke-width="1"/>
  <rect x="618" y="438" width="4" height="8" fill="#8B6914"/>
  <!-- Field patterns -->
  <rect x="70" y="350" width="40" height="30" fill="#C8D8A8" stroke="#8AAA68" stroke-width="1" rx="2"/>
  <rect x="580" y="340" width="50" height="35" fill="#C8D8A8" stroke="#8AAA68" stroke-width="1" rx="2"/>
  <rect x="75" y="180" width="35" height="40" fill="#C8D8A8" stroke="#8AAA68" stroke-width="1" rx="2"/>
  <rect x="590" y="190" width="40" height="35" fill="#C8D8A8" stroke="#8AAA68" stroke-width="1" rx="2"/>
  
  <!-- Zone A label -->
  <rect x="52" y="108" width="100" height="24" fill="#fff" fill-opacity="0.8" rx="3"/>
  <text x="102" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#3A6A2A">Zone A</text>
  <text x="100" y="300" text-anchor="middle" font-size="9" fill="#4A7A3A" transform="rotate(-90,100,300)">Fields, orchards, forests</text>

  <!-- Fortification wall 1 (outermost — Zone A boundary is the rect above) -->
  
  <!-- Fortification wall 2 — between A and B -->
  <rect x="130" y="150" width="440" height="280" fill="#E8DCC8" stroke="#8B7355" stroke-width="2.5" rx="4" stroke-dasharray="12,4"/>

  <!-- Zone B — Sacred Centre -->
  <rect x="140" y="160" width="420" height="260" fill="#F0E8D4" stroke="#A09070" stroke-width="1.5" rx="3"/>
  
  <!-- Zone B label -->
  <text x="350" y="185" text-anchor="middle" font-size="15" font-weight="bold" fill="#6B5A3A">Zone B — Sacred Centre</text>

  <!-- Hillocks in sacred centre -->
  <!-- Matanga Hill -->
  <polygon points="180,310 210,260 240,310" fill="#C8B898" stroke="#A09070" stroke-width="1.5"/>
  <text x="210" y="305" text-anchor="middle" font-size="8" fill="#6B5A3A">Hillock</text>
  <!-- Hemakuta Hill -->
  <polygon points="280,330 310,280 340,330" fill="#C8B898" stroke="#A09070" stroke-width="1.5"/>
  <text x="310" y="325" text-anchor="middle" font-size="8" fill="#6B5A3A">Hillock</text>

  <!-- Virupaksha Temple symbol -->
  <rect x="185" y="210" width="70" height="50" fill="#D8C498" stroke="#8B6914" stroke-width="1.5" rx="3"/>
  <!-- Gopuram shape -->
  <polygon points="205,210 220,188 235,210" fill="#C8A868" stroke="#8B6914" stroke-width="1.5"/>
  <text x="220" y="232" text-anchor="middle" font-size="9" font-weight="bold" fill="#5A4A2A">Virupaksha</text>
  <text x="220" y="244" text-anchor="middle" font-size="9" fill="#5A4A2A">Temple</text>
  <text x="220" y="256" text-anchor="middle" font-size="7" fill="#888">🛕</text>

  <!-- Vitthala Temple symbol (northeast) -->
  <rect x="440" y="200" width="70" height="50" fill="#D8C498" stroke="#8B6914" stroke-width="1.5" rx="3"/>
  <polygon points="460,200 475,178 490,200" fill="#C8A868" stroke="#8B6914" stroke-width="1.5"/>
  <text x="475" y="222" text-anchor="middle" font-size="9" font-weight="bold" fill="#5A4A2A">Vitthala</text>
  <text x="475" y="234" text-anchor="middle" font-size="9" fill="#5A4A2A">Temple</text>
  <text x="475" y="246" text-anchor="middle" font-size="7" fill="#888">🛕</text>

  <!-- Fortification wall 3 — between B and C -->
  <rect x="300" y="280" width="210" height="130" fill="none" stroke="#7A5A3A" stroke-width="3" rx="4"/>

  <!-- Zone C — Royal Centre (innermost) -->
  <rect x="308" y="288" width="194" height="114" fill="#F4E8D0" stroke="#8B6914" stroke-width="2" rx="3"/>
  
  <!-- Zone C label -->
  <text x="405" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#5A3A1A">Zone C — Royal Centre</text>

  <!-- Mahanavami Dibba -->
  <rect x="320" y="320" width="70" height="30" fill="#D0B880" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <text x="355" y="334" text-anchor="middle" font-size="7" font-weight="bold" fill="#5A4A2A">Mahanavami</text>
  <text x="355" y="344" text-anchor="middle" font-size="7" fill="#5A4A2A">Dibba</text>

  <!-- Lotus Mahal -->
  <rect x="400" y="320" width="55" height="30" fill="#D8C8B0" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <text x="427" y="334" text-anchor="middle" font-size="7" font-weight="bold" fill="#5A4A2A">Lotus</text>
  <text x="427" y="344" text-anchor="middle" font-size="7" fill="#5A4A2A">Mahal</text>

  <!-- Elephant Stables -->
  <rect x="465" y="320" width="28" height="30" fill="#C8B898" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <text x="479" y="334" text-anchor="middle" font-size="6" font-weight="bold" fill="#5A4A2A">Elephant</text>
  <text x="479" y="344" text-anchor="middle" font-size="6" fill="#5A4A2A">Stables</text>

  <!-- Fortification wall labels -->
  <text x="350" y="445" text-anchor="middle" font-size="10" fill="#7A5A3A" font-style="italic">Concentric fortification walls separate each zone</text>

  <!-- Legend symbols -->
  <rect x="40" y="480" width="620" height="60" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="50" y="498" font-size="11" fill="#555" font-weight="bold">Q: Identify Zones A, B, and C. Why did the outermost zone include agricultural and forested land?</text>
  
  <!-- Legend items -->
  <rect x="55" y="508" width="12" height="12" fill="#D4E8C4" stroke="#5A8A3A" stroke-width="1"/>
  <text x="72" y="518" font-size="9" fill="#555">Zone A (outermost)</text>
  <rect x="175" y="508" width="12" height="12" fill="#F0E8D4" stroke="#A09070" stroke-width="1"/>
  <text x="192" y="518" font-size="9" fill="#555">Zone B (middle)</text>
  <rect x="280" y="508" width="12" height="12" fill="#F4E8D0" stroke="#8B6914" stroke-width="1"/>
  <text x="297" y="518" font-size="9" fill="#555">Zone C (innermost)</text>
  <polygon points="395,508 401,520 407,508" fill="#C8A868" stroke="#8B6914" stroke-width="1"/>
  <text x="415" y="518" font-size="9" fill="#555">Temple</text>
  <polygon points="465,520 475,508 485,520" fill="#C8B898" stroke="#A09070" stroke-width="1"/>
  <text x="495" y="518" font-size="9" fill="#555">Hillock</text>
  <rect x="540" y="508" width="12" height="12" fill="#C8D8A8" stroke="#8AAA68" stroke-width="1"/>
  <text x="557" y="518" font-size="9" fill="#555">Fields/orchards</text>
</svg>
