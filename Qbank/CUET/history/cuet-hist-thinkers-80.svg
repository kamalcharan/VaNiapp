<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 530" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="530" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Cross-Section of a Typical Buddhist Stupa</text>
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#666">Identify Parts A, B, C, D, and E</text>

  <!-- Ground line -->
  <line x1="60" y1="420" x2="640" y2="420" stroke="#8B7355" stroke-width="3"/>
  
  <!-- Raised circular base/platform -->
  <ellipse cx="350" cy="420" rx="220" ry="25" fill="#D2C4A0" stroke="#8B7355" stroke-width="2"/>

  <!-- Part D — Vedika (stone railing/fence encircling base) -->
  <!-- Left railing -->
  <rect x="115" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <rect x="145" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <rect x="175" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <!-- Horizontal rails left -->
  <line x1="115" y1="375" x2="187" y2="375" stroke="#7A6A4A" stroke-width="2"/>
  <line x1="115" y1="395" x2="187" y2="395" stroke="#7A6A4A" stroke-width="2"/>
  
  <!-- Right railing -->
  <rect x="513" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <rect x="543" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <rect x="573" y="360" width="12" height="60" fill="#C8B898" stroke="#7A6A4A" stroke-width="1.5" rx="2"/>
  <!-- Horizontal rails right -->
  <line x1="513" y1="375" x2="585" y2="375" stroke="#7A6A4A" stroke-width="2"/>
  <line x1="513" y1="395" x2="585" y2="395" stroke="#7A6A4A" stroke-width="2"/>

  <!-- Part D label -->
  <line x1="115" y1="385" x2="65" y2="385" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="58" y="380" text-anchor="end" font-size="14" font-weight="bold" fill="#6B4E2B">Part D</text>
  <text x="58" y="396" text-anchor="end" font-size="10" fill="#888">(? — Identify)</text>

  <!-- Part E — Torana (decorated entrance gateway) — shown as right gateway -->
  <rect x="490" y="310" width="14" height="110" fill="#B8A070" stroke="#6B5030" stroke-width="2" rx="2"/>
  <rect x="596" y="310" width="14" height="110" fill="#B8A070" stroke="#6B5030" stroke-width="2" rx="2"/>
  <!-- Horizontal architraves of torana -->
  <rect x="485" y="305" width="130" height="8" fill="#C8A868" stroke="#6B5030" stroke-width="1.5" rx="3"/>
  <rect x="485" y="320" width="130" height="8" fill="#C8A868" stroke="#6B5030" stroke-width="1.5" rx="3"/>
  <rect x="485" y="335" width="130" height="8" fill="#C8A868" stroke="#6B5030" stroke-width="1.5" rx="3"/>
  <!-- Decorative scrolls on torana ends -->
  <circle cx="483" cy="309" r="6" fill="#C8A868" stroke="#6B5030" stroke-width="1"/>
  <circle cx="617" cy="309" r="6" fill="#C8A868" stroke="#6B5030" stroke-width="1"/>
  <circle cx="483" cy="339" r="6" fill="#C8A868" stroke="#6B5030" stroke-width="1"/>
  <circle cx="617" cy="339" r="6" fill="#C8A868" stroke="#6B5030" stroke-width="1"/>

  <!-- Part E label -->
  <line x1="620" y1="330" x2="655" y2="300" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="658" y="295" font-size="14" font-weight="bold" fill="#6B4E2B">Part E</text>
  <text x="658" y="311" font-size="10" fill="#888">(? — Identify)</text>

  <!-- Part A — Anda (hemispherical dome) -->
  <path d="M190,395 Q190,160 350,140 Q510,160 510,395" fill="#E0D4B8" stroke="#8B7355" stroke-width="2.5"/>
  <!-- Brick pattern lines on dome -->
  <path d="M220,350 Q350,200 480,350" fill="none" stroke="#B8A888" stroke-width="1" stroke-dasharray="6,4"/>
  <path d="M240,310 Q350,220 460,310" fill="none" stroke="#B8A888" stroke-width="1" stroke-dasharray="6,4"/>
  <path d="M270,270 Q350,230 430,270" fill="none" stroke="#B8A888" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Part A label -->
  <line x1="280" y1="300" x2="90" y2="260" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="83" y="252" text-anchor="end" font-size="14" font-weight="bold" fill="#6B4E2B">Part A</text>
  <text x="83" y="268" text-anchor="end" font-size="10" fill="#888">(? — Identify)</text>
  <text x="83" y="282" text-anchor="end" font-size="9" fill="#aaa" font-style="italic">Hemispherical dome</text>

  <!-- Part B — Harmika (square railing on top of dome) -->
  <rect x="320" y="130" width="60" height="35" fill="#D8C8A0" stroke="#7A6A4A" stroke-width="2" rx="2"/>
  <!-- Railing lines on harmika -->
  <line x1="325" y1="142" x2="375" y2="142" stroke="#7A6A4A" stroke-width="1.5"/>
  <line x1="325" y1="152" x2="375" y2="152" stroke="#7A6A4A" stroke-width="1.5"/>

  <!-- Part B label -->
  <line x1="320" y1="148" x2="230" y2="130" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="223" y="122" text-anchor="end" font-size="14" font-weight="bold" fill="#6B4E2B">Part B</text>
  <text x="223" y="138" text-anchor="end" font-size="10" fill="#888">(? — Identify)</text>
  <text x="223" y="152" text-anchor="end" font-size="9" fill="#aaa" font-style="italic">Square structure on top</text>

  <!-- Part C — Chhatra (umbrella/pole with disc tiers) -->
  <!-- Vertical pole -->
  <line x1="350" y1="130" x2="350" y2="70" stroke="#7A6A4A" stroke-width="3"/>
  <!-- Three disc tiers -->
  <ellipse cx="350" cy="75" rx="18" ry="5" fill="#D8C498" stroke="#7A6A4A" stroke-width="1.5"/>
  <ellipse cx="350" cy="88" rx="24" ry="6" fill="#D8C498" stroke="#7A6A4A" stroke-width="1.5"/>
  <ellipse cx="350" cy="103" rx="30" ry="7" fill="#D8C498" stroke="#7A6A4A" stroke-width="1.5"/>

  <!-- Part C label -->
  <line x1="382" y1="88" x2="440" y2="80" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="445" y="75" font-size="14" font-weight="bold" fill="#6B4E2B">Part C</text>
  <text x="445" y="91" font-size="10" fill="#888">(? — Identify)</text>
  <text x="445" y="105" font-size="9" fill="#aaa" font-style="italic">Pole with disc tiers</text>

  <!-- Pradakshina path label -->
  <text x="350" y="412" text-anchor="middle" font-size="9" fill="#777" font-style="italic">← Pradakshina path (circumambulation) →</text>

  <!-- Legend -->
  <rect x="50" y="450" width="600" height="65" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="60" y="470" font-size="11" fill="#555" font-weight="bold">Q: Identify the five parts of the stupa:</text>
  <text x="60" y="488" font-size="10" fill="#555">Part A (hemispherical dome) = ?     Part B (square structure on top) = ?     Part C (pole with disc tiers) = ?</text>
  <text x="60" y="504" font-size="10" fill="#555">Part D (stone fence encircling base) = ?     Part E (decorated entrance gateway) = ?</text>
</svg>
