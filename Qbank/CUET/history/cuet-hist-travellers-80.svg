<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="380" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Timeline of Three Travellers' Visits to India (1000–1700 CE)</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">Identify Travellers A, B, and C</text>

  <!-- Main timeline axis -->
  <line x1="70" y1="160" x2="740" y2="160" stroke="#555" stroke-width="3"/>
  <polygon points="740,160 730,154 730,166" fill="#555"/>

  <!-- Century tick marks -->
  <line x1="100" y1="152" x2="100" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="100" y="185" text-anchor="middle" font-size="10" fill="#777">1000 CE</text>

  <line x1="196" y1="152" x2="196" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="196" y="185" text-anchor="middle" font-size="10" fill="#777">1100</text>

  <line x1="292" y1="152" x2="292" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="292" y="185" text-anchor="middle" font-size="10" fill="#777">1200</text>

  <line x1="388" y1="152" x2="388" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="388" y="185" text-anchor="middle" font-size="10" fill="#777">1300</text>

  <line x1="484" y1="152" x2="484" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="484" y="185" text-anchor="middle" font-size="10" fill="#777">1400</text>

  <line x1="580" y1="152" x2="580" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="580" y="185" text-anchor="middle" font-size="10" fill="#777">1500</text>

  <line x1="676" y1="152" x2="676" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="676" y="185" text-anchor="middle" font-size="10" fill="#777">1600</text>

  <line x1="725" y1="152" x2="725" y2="168" stroke="#555" stroke-width="1.5"/>
  <text x="725" y="185" text-anchor="middle" font-size="10" fill="#777">1700</text>

  <!-- Point X — 1020-1030 CE — Traveller A -->
  <!-- Position: 1025 CE ≈ x=124 -->
  <circle cx="124" cy="160" r="8" fill="#4A7A9B" stroke="#2B4F6E" stroke-width="2"/>
  <text x="124" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">X</text>
  <!-- Connector line up to card -->
  <line x1="124" y1="152" x2="124" y2="92" stroke="#4A7A9B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Info card -->
  <rect x="40" y="65" width="170" height="60" fill="#E0EEF8" stroke="#4A7A9B" stroke-width="2" rx="6"/>
  <text x="125" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B4F6E">Point X (1020–1030 CE)</text>
  <text x="125" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A7A9B">Traveller A = ?</text>
  <text x="125" y="112" text-anchor="middle" font-size="9" fill="#555">Arabic scholar, came with</text>
  <text x="125" y="122" text-anchor="middle" font-size="9" fill="#555">Ghaznavid expedition</text>

  <!-- Point Y — 1333-1347 CE — Traveller B -->
  <!-- Position: 1340 CE ≈ x=427 -->
  <circle cx="427" cy="160" r="8" fill="#4A8B4A" stroke="#2B5E2B" stroke-width="2"/>
  <text x="427" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Y</text>
  <!-- Connector line up to card -->
  <line x1="427" y1="152" x2="427" y2="92" stroke="#4A8B4A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Info card -->
  <rect x="340" y="65" width="175" height="60" fill="#E0F0E0" stroke="#4A8B4A" stroke-width="2" rx="6"/>
  <text x="427" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B5E2B">Point Y (1333–1347 CE)</text>
  <text x="427" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A8B4A">Traveller B = ?</text>
  <text x="427" y="112" text-anchor="middle" font-size="9" fill="#555">Moroccan qazi, served at</text>
  <text x="427" y="122" text-anchor="middle" font-size="9" fill="#555">the Sultan's court in Delhi</text>

  <!-- Point Z — 1656-1668 CE — Traveller C -->
  <!-- Position: 1662 CE ≈ x=696 -->
  <circle cx="696" cy="160" r="8" fill="#8B4A6B" stroke="#6B2B4E" stroke-width="2"/>
  <text x="696" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Z</text>
  <!-- Connector line up to card -->
  <line x1="696" y1="152" x2="696" y2="92" stroke="#8B4A6B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Info card -->
  <rect x="605" y="65" width="175" height="60" fill="#F0E0EC" stroke="#8B4A6B" stroke-width="2" rx="6"/>
  <text x="692" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B2B4E">Point Z (1656–1668 CE)</text>
  <text x="692" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#8B4A6B">Traveller C = ?</text>
  <text x="692" y="112" text-anchor="middle" font-size="9" fill="#555">French physician, sent by</text>
  <text x="692" y="122" text-anchor="middle" font-size="9" fill="#555">Louis XIV to Mughal court</text>

  <!-- Context blocks below timeline -->
  <!-- Delhi Sultanate period bar -->
  <rect x="292" y="200" width="288" height="22" fill="#E8E0D0" stroke="#A09070" stroke-width="1.5" rx="4"/>
  <text x="436" y="215" text-anchor="middle" font-size="10" fill="#6B5A3A" font-weight="bold">Delhi Sultanate Period (1206–1526)</text>

  <!-- Mughal Empire bar -->
  <rect x="580" y="200" width="145" height="22" fill="#D8E0E8" stroke="#7090A0" stroke-width="1.5" rx="4"/>
  <text x="652" y="215" text-anchor="middle" font-size="10" fill="#405060" font-weight="bold">Mughal Empire (1526–1707)</text>

  <!-- Ghaznavid context -->
  <rect x="100" y="200" width="96" height="22" fill="#E0D8C8" stroke="#A09070" stroke-width="1.5" rx="4"/>
  <text x="148" y="215" text-anchor="middle" font-size="9" fill="#6B5A3A" font-weight="bold">Ghaznavid raids</text>

  <!-- Detail rows for each traveller -->
  <rect x="50" y="240" width="210" height="70" fill="#E8F0F8" stroke="#4A7A9B" stroke-width="1" rx="4"/>
  <text x="155" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B4F6E">Traveller A Clues:</text>
  <text x="155" y="275" text-anchor="middle" font-size="9" fill="#555">• Wrote in Arabic</text>
  <text x="155" y="289" text-anchor="middle" font-size="9" fill="#555">• Studied Indian philosophy, science</text>
  <text x="155" y="303" text-anchor="middle" font-size="9" fill="#555">• Accompanied Mahmud of Ghazni</text>

  <rect x="290" y="240" width="210" height="70" fill="#E0F0E0" stroke="#4A8B4A" stroke-width="1" rx="4"/>
  <text x="395" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B5E2B">Traveller B Clues:</text>
  <text x="395" y="275" text-anchor="middle" font-size="9" fill="#555">• From Morocco, trained as a qazi</text>
  <text x="395" y="289" text-anchor="middle" font-size="9" fill="#555">• Served Muhammad bin Tughlaq</text>
  <text x="395" y="303" text-anchor="middle" font-size="9" fill="#555">• Wrote Rihla (travel account)</text>

  <rect x="530" y="240" width="210" height="70" fill="#F0E0EC" stroke="#8B4A6B" stroke-width="1" rx="4"/>
  <text x="635" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B2B4E">Traveller C Clues:</text>
  <text x="635" y="275" text-anchor="middle" font-size="9" fill="#555">• French physician &amp; traveller</text>
  <text x="635" y="289" text-anchor="middle" font-size="9" fill="#555">• Compared Mughal India with Europe</text>
  <text x="635" y="303" text-anchor="middle" font-size="9" fill="#555">• Sent by King Louis XIV</text>

  <!-- Legend -->
  <rect x="50" y="325" width="700" height="42" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="60" y="344" font-size="11" fill="#555" font-weight="bold">Q: Identify Travellers A, B, and C based on the clues and time periods.</text>
  <text x="60" y="360" font-size="10" fill="#555">A = ? (Arabic scholar, Ghaznavid era)     B = ? (Moroccan qazi, Sultanate era)     C = ? (French physician, Mughal era)</text>
</svg>
