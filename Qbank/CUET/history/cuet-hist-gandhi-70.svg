<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="850" height="420" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="425" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Timeline of Major Gandhian Movements (1915–1947)</text>
  <text x="425" y="46" text-anchor="middle" font-size="11" fill="#666">Identify Events/Movements A, X, Y, and Z</text>

  <!-- Main timeline axis -->
  <line x1="40" y1="175" x2="820" y2="175" stroke="#555" stroke-width="3"/>
  <polygon points="820,175 810,169 810,181" fill="#555"/>

  <!-- Year ticks and labels -->
  <!-- 1915 -->
  <line x1="60" y1="167" x2="60" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="60" y="200" text-anchor="middle" font-size="9" fill="#777">1915</text>
  <!-- 1917 -->
  <line x1="107" y1="167" x2="107" y2="183" stroke="#555" stroke-width="2"/>
  <text x="107" y="200" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">1917</text>
  <!-- 1919 -->
  <line x1="155" y1="167" x2="155" y2="183" stroke="#555" stroke-width="2"/>
  <text x="155" y="200" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">1919</text>
  <!-- 1920 -->
  <line x1="178" y1="167" x2="178" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="178" y="200" text-anchor="middle" font-size="9" fill="#777">1920</text>
  <!-- 1922 -->
  <line x1="225" y1="167" x2="225" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="225" y="200" text-anchor="middle" font-size="9" fill="#777">1922</text>
  <!-- 1929 -->
  <line x1="390" y1="167" x2="390" y2="183" stroke="#555" stroke-width="2"/>
  <text x="390" y="200" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">1929</text>
  <!-- 1930 -->
  <line x1="413" y1="167" x2="413" y2="183" stroke="#555" stroke-width="2"/>
  <text x="413" y="200" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">1930</text>
  <!-- 1932 -->
  <line x1="460" y1="167" x2="460" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="460" y="200" text-anchor="middle" font-size="9" fill="#777">1932</text>
  <!-- 1935 -->
  <line x1="530" y1="167" x2="530" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="530" y="200" text-anchor="middle" font-size="9" fill="#777">1935</text>
  <!-- 1937 -->
  <line x1="577" y1="167" x2="577" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="577" y="200" text-anchor="middle" font-size="9" fill="#777">1937</text>
  <!-- 1939 -->
  <line x1="625" y1="167" x2="625" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="625" y="200" text-anchor="middle" font-size="9" fill="#777">1939</text>
  <!-- 1942 -->
  <line x1="695" y1="167" x2="695" y2="183" stroke="#555" stroke-width="2"/>
  <text x="695" y="200" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">1942</text>
  <!-- 1946 -->
  <line x1="790" y1="167" x2="790" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="790" y="200" text-anchor="middle" font-size="9" fill="#777">1946</text>
  <!-- 1947 -->
  <line x1="810" y1="167" x2="810" y2="183" stroke="#555" stroke-width="1.5"/>
  <text x="810" y="200" text-anchor="middle" font-size="9" fill="#777">1947</text>

  <!-- Gandhi returns marker -->
  <circle cx="60" cy="175" r="5" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="60" y="220" text-anchor="middle" font-size="8" fill="#666" font-style="italic">Gandhi returns</text>
  <text x="60" y="230" text-anchor="middle" font-size="8" fill="#666" font-style="italic">to India</text>

  <!-- EVENT A — 1917 — Star symbol — First satyagraha -->
  <polygon points="107,175 110,165 116,165 111,159 113,150 107,155 101,150 103,159 98,165 104,165" fill="#E8A030" stroke="#B07010" stroke-width="1.5"/>
  <line x1="107" y1="150" x2="107" y2="85" stroke="#E8A030" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="40" y="60" width="135" height="42" fill="#FFF4E0" stroke="#E8A030" stroke-width="2" rx="5"/>
  <text x="107" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#B07010">Event A = ?</text>
  <text x="107" y="90" text-anchor="middle" font-size="9" fill="#888">First satyagraha in India</text>
  <text x="107" y="100" text-anchor="middle" font-size="8" fill="#aaa" font-style="italic">★ 1917</text>

  <!-- EVENT B — 1919 — Rowlatt + Jallianwala -->
  <rect x="130" y="210" width="105" height="38" fill="#F0E0E0" stroke="#B05050" stroke-width="1" rx="4"/>
  <line x1="155" y1="183" x2="155" y2="210" stroke="#B05050" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="182" y="225" text-anchor="middle" font-size="8" font-weight="bold" fill="#B05050">1919: Rowlatt Act</text>
  <text x="182" y="238" text-anchor="middle" font-size="8" fill="#B05050">Jallianwala Bagh</text>

  <!-- BLOCK X — 1920-22 — Movement X (Non-Cooperation + Khilafat) -->
  <rect x="178" y="120" width="47" height="50" fill="#4A8B4A" fill-opacity="0.3" stroke="#4A8B4A" stroke-width="2" rx="4"/>
  <line x1="200" y1="120" x2="200" y2="78" stroke="#4A8B4A" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="155" y="60" width="140" height="46" fill="#E0F4E0" stroke="#4A8B4A" stroke-width="2" rx="5"/>
  <text x="225" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B6B2B">Movement X = ?</text>
  <text x="225" y="90" text-anchor="middle" font-size="8" fill="#555">Allied with Khilafat</text>
  <text x="225" y="100" text-anchor="middle" font-size="8" fill="#888">Ended after Chauri Chaura</text>

  <!-- EVENT D — 1929 — Lahore Congress -->
  <rect x="352" y="210" width="110" height="32" fill="#E8E0F0" stroke="#7050A0" stroke-width="1" rx="4"/>
  <line x1="390" y1="183" x2="390" y2="210" stroke="#7050A0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="407" y="225" text-anchor="middle" font-size="8" font-weight="bold" fill="#5030A0">1929: Lahore Congress</text>
  <text x="407" y="237" text-anchor="middle" font-size="8" fill="#7050A0">Purna Swaraj declared</text>

  <!-- EVENT E — 1930 — Movement Y (Salt March / Civil Disobedience) -->
  <circle cx="413" cy="175" r="7" fill="#4A7A9B" stroke="#2B5A7B" stroke-width="2"/>
  <line x1="413" y1="168" x2="413" y2="78" stroke="#4A7A9B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="60" width="160" height="46" fill="#D8EAF4" stroke="#4A7A9B" stroke-width="2" rx="5"/>
  <text x="430" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B5A7B">Movement Y = ?</text>
  <text x="430" y="90" text-anchor="middle" font-size="8" fill="#555">Begins with 240-mile march</text>
  <text x="430" y="100" text-anchor="middle" font-size="8" fill="#888">1930</text>

  <!-- EVENT F — 1932 — Poona Pact -->
  <rect x="435" y="210" width="85" height="28" fill="#F0F0E0" stroke="#A0A060" stroke-width="1" rx="4"/>
  <line x1="460" y1="183" x2="460" y2="210" stroke="#A0A060" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="477" y="228" text-anchor="middle" font-size="8" font-weight="bold" fill="#6B6B30">1932: Poona Pact</text>

  <!-- 1935 — GOI Act -->
  <rect x="508" y="210" width="85" height="28" fill="#E8E8E8" stroke="#999" stroke-width="1" rx="4"/>
  <line x1="530" y1="183" x2="530" y2="210" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="550" y="228" text-anchor="middle" font-size="8" fill="#666">GOI Act 1935</text>

  <!-- 1937 — Provincial elections -->
  <rect x="555" y="245" width="95" height="28" fill="#E0E8E0" stroke="#6B8B6B" stroke-width="1" rx="4"/>
  <line x1="577" y1="183" x2="577" y2="245" stroke="#6B8B6B" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="602" y="258" text-anchor="middle" font-size="8" fill="#3A6B3A">1937: Congress wins</text>
  <text x="602" y="268" text-anchor="middle" font-size="8" fill="#3A6B3A">8/11 provinces</text>

  <!-- 1939 — WWII, ministries resign -->
  <rect x="600" y="210" width="80" height="28" fill="#F0E0E0" stroke="#B07070" stroke-width="1" rx="4"/>
  <line x1="625" y1="183" x2="625" y2="210" stroke="#B07070" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="640" y="223" text-anchor="middle" font-size="7" fill="#8B4040">WWII begins</text>
  <text x="640" y="233" text-anchor="middle" font-size="7" fill="#8B4040">Ministries resign</text>

  <!-- BLOCK G — 1942 — Movement Z (Quit India — Do or Die) -->
  <rect x="685" y="130" width="50" height="40" fill="#C04040" fill-opacity="0.3" stroke="#C04040" stroke-width="2" rx="4"/>
  <line x1="695" y1="130" x2="695" y2="78" stroke="#C04040" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="600" y="60" width="170" height="46" fill="#F8E0E0" stroke="#C04040" stroke-width="2" rx="5"/>
  <text x="685" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#8B2222">Movement Z = ?</text>
  <text x="685" y="90" text-anchor="middle" font-size="8" fill="#555">'Do or Die' — 1942</text>
  <text x="685" y="100" text-anchor="middle" font-size="8" fill="#888">Most spontaneous mass uprising</text>

  <!-- 1946 — Cabinet Mission -->
  <rect x="765" y="210" width="70" height="28" fill="#E8E0F0" stroke="#8070A0" stroke-width="1" rx="4"/>
  <line x1="790" y1="183" x2="790" y2="210" stroke="#8070A0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="800" y="223" text-anchor="middle" font-size="7" fill="#6050A0">Cabinet</text>
  <text x="800" y="233" text-anchor="middle" font-size="7" fill="#6050A0">Mission</text>

  <!-- 1947 — Independence -->
  <rect x="793" y="245" width="50" height="28" fill="#FFE8A0" stroke="#C8A030" stroke-width="1.5" rx="4"/>
  <line x1="810" y1="183" x2="810" y2="245" stroke="#C8A030" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="818" y="258" text-anchor="middle" font-size="7" font-weight="bold" fill="#8B6914">1947</text>
  <text x="818" y="268" text-anchor="middle" font-size="7" fill="#8B6914">Independence</text>

  <!-- Expanding base arrow at bottom -->
  <path d="M80,310 L107,295 L200,300 L413,305 L695,310 L810,315" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="425" y="330" text-anchor="middle" font-size="9" fill="#777" font-style="italic">Each movement expanded the social base → peasants → Muslims → women → workers → spontaneous mass uprising</text>

  <!-- Legend -->
  <rect x="40" y="350" width="770" height="58" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="50" y="368" font-size="11" fill="#555" font-weight="bold">Q: Identify A, X, Y, and Z. How did each movement expand the base of the national movement?</text>
  <text x="50" y="386" font-size="9" fill="#555">A = ? (1917, first satyagraha)     X = ? (1920-22, allied with Khilafat, ended at Chauri Chaura)</text>
  <text x="50" y="400" font-size="9" fill="#555">Y = ? (1930, begins with 240-mile march)     Z = ? (1942, 'Do or Die', most spontaneous mass uprising)</text>
</svg>
