<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="500" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Simplified Plan of a Typical Harappan City</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#666">Identify the labelled areas and features</text>

  <!-- Outer wall of entire city -->
  <rect x="40" y="75" width="620" height="370" fill="none" stroke="#8B7355" stroke-width="4" rx="4"/>
  
  <!-- AREA X — Citadel (left, elevated) -->
  <rect x="60" y="95" width="180" height="330" fill="#D2B48C" stroke="#8B6914" stroke-width="2.5" rx="3"/>
  <!-- Elevated platform indication -->
  <rect x="65" y="100" width="170" height="320" fill="#C4A882" stroke="none" rx="2"/>
  <!-- Hatching to show elevation -->
  <line x1="60" y1="425" x2="60" y2="430" stroke="#8B6914" stroke-width="2"/>
  <line x1="240" y1="425" x2="240" y2="430" stroke="#8B6914" stroke-width="2"/>
  <rect x="55" y="425" width="190" height="12" fill="#B8A070" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <text x="150" y="434" text-anchor="middle" font-size="9" fill="#5a4a2a">(Elevated Platform)</text>
  
  <!-- Label: Area X -->
  <text x="150" y="125" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3520">Area X</text>

  <!-- Structure A — Granary/Warehouse -->
  <rect x="85" y="150" width="110" height="70" fill="#E8D5B0" stroke="#6B4226" stroke-width="2" rx="2"/>
  <text x="140" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a3520">Structure A</text>
  <text x="140" y="198" text-anchor="middle" font-size="10" fill="#6B4226">(? — Identify)</text>

  <!-- Structure B — Great Bath -->
  <rect x="85" y="260" width="110" height="80" fill="#A8C8D8" stroke="#3B6E8F" stroke-width="2" rx="2"/>
  <!-- Water indication lines -->
  <path d="M95 300 Q105 295 115 300 Q125 305 135 300 Q145 295 155 300 Q165 305 175 300" fill="none" stroke="#5A9AB5" stroke-width="1.5"/>
  <path d="M95 312 Q105 307 115 312 Q125 317 135 312 Q145 307 155 312 Q165 317 175 312" fill="none" stroke="#5A9AB5" stroke-width="1.5"/>
  <text x="140" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B4F6E">Structure B</text>
  <text x="140" y="330" text-anchor="middle" font-size="10" fill="#3B6E8F">(? — Identify)</text>

  <!-- Dividing wall between Citadel and Lower Town -->
  <line x1="260" y1="85" x2="260" y2="435" stroke="#8B7355" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- AREA Y — Lower Town (right, larger) -->
  <rect x="275" y="95" width="370" height="330" fill="#E8E0D0" stroke="#8B7355" stroke-width="2" rx="3"/>
  
  <!-- Label: Area Y -->
  <text x="460" y="125" text-anchor="middle" font-size="18" font-weight="bold" fill="#4a3520">Area Y</text>

  <!-- Grid streets -->
  <!-- Horizontal streets -->
  <line x1="285" y1="175" x2="635" y2="175" stroke="#A09080" stroke-width="2"/>
  <line x1="285" y1="255" x2="635" y2="255" stroke="#A09080" stroke-width="2"/>
  <line x1="285" y1="335" x2="635" y2="335" stroke="#A09080" stroke-width="2"/>
  <!-- Vertical streets -->
  <line x1="375" y1="135" x2="375" y2="415" stroke="#A09080" stroke-width="2"/>
  <line x1="465" y1="135" x2="465" y2="415" stroke="#A09080" stroke-width="2"/>
  <line x1="555" y1="135" x2="555" y2="415" stroke="#A09080" stroke-width="2"/>

  <!-- Residential blocks -->
  <rect x="290" y="140" width="80" height="30" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="380" y="140" width="80" height="30" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="470" y="140" width="80" height="30" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="560" y="140" width="70" height="30" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>

  <rect x="290" y="180" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="380" y="180" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="470" y="180" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="560" y="180" width="70" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>

  <rect x="290" y="260" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="380" y="260" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="470" y="260" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="560" y="260" width="70" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>

  <rect x="290" y="340" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="380" y="340" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="470" y="340" width="80" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>
  <rect x="560" y="340" width="70" height="70" fill="#D4C4A8" stroke="#8B7355" stroke-width="1" rx="2"/>

  <!-- Feature C — Covered drains along streets -->
  <rect x="283" y="170" width="355" height="10" fill="#7A9A7A" stroke="#4A6A4A" stroke-width="1.5" rx="1"/>
  <text x="460" y="178" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Feature C (? — Identify)</text>

  <!-- Grid street labels -->
  <text x="460" y="420" text-anchor="middle" font-size="10" fill="#706050" font-style="italic">Grid-pattern streets</text>

  <!-- Legend -->
  <rect x="40" y="455" width="620" height="35" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="50" y="477" font-size="11" fill="#555" font-weight="bold">Q: Identify Area X, Structure A, Structure B, Area Y, and Feature C.</text>
</svg>
