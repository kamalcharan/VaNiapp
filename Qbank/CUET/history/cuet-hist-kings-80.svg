<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="340" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Timeline of Major Dynasties (600 BCE – 600 CE)</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#666">Identify Dynasties X, Y, Z, and W</text>

  <!-- Main timeline axis -->
  <line x1="50" y1="140" x2="750" y2="140" stroke="#555" stroke-width="3"/>
  <!-- Arrow head -->
  <polygon points="750,140 740,134 740,146" fill="#555"/>

  <!-- Tick marks and date labels -->
  <line x1="80" y1="132" x2="80" y2="148" stroke="#555" stroke-width="2"/>
  <text x="80" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">600 BCE</text>

  <line x1="220" y1="132" x2="220" y2="148" stroke="#555" stroke-width="2"/>
  <text x="220" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">400 BCE</text>

  <line x1="290" y1="132" x2="290" y2="148" stroke="#555" stroke-width="2"/>
  <text x="290" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">321 BCE</text>

  <line x1="390" y1="132" x2="390" y2="148" stroke="#555" stroke-width="2"/>
  <text x="390" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">185 BCE</text>

  <line x1="430" y1="132" x2="430" y2="148" stroke="#555" stroke-width="2"/>
  <text x="430" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">200 BCE</text>

  <line x1="540" y1="132" x2="540" y2="148" stroke="#555" stroke-width="2"/>
  <text x="540" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">300 CE</text>

  <line x1="570" y1="132" x2="570" y2="148" stroke="#555" stroke-width="2"/>
  <text x="570" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">320 CE</text>

  <line x1="710" y1="132" x2="710" y2="148" stroke="#555" stroke-width="2"/>
  <text x="710" y="168" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">550 CE</text>

  <!-- Era A: 600-400 BCE — 16 Mahajanapadas -->
  <rect x="80" y="80" width="140" height="50" fill="#B8D4E3" stroke="#4A7A9B" stroke-width="2" rx="6"/>
  <text x="150" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B4F6E">Era A</text>
  <text x="150" y="117" text-anchor="middle" font-size="10" fill="#3B6E8F">16 Mahajanapadas</text>

  <!-- Era B: 321-185 BCE — Dynasty X (Mauryas) -->
  <rect x="290" y="80" width="100" height="50" fill="#C8E6C8" stroke="#4A8B4A" stroke-width="2" rx="6"/>
  <text x="340" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B5E2B">Era B</text>
  <text x="340" y="117" text-anchor="middle" font-size="10" fill="#3B7A3B">Dynasty X = ?</text>

  <!-- Era C: 200 BCE-300 CE — Foreign rulers Y and Z -->
  <rect x="430" y="80" width="110" height="50" fill="#E8D4B8" stroke="#A07840" stroke-width="2" rx="6"/>
  <text x="485" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#6B4E2B">Era C</text>
  <text x="485" y="117" text-anchor="middle" font-size="10" fill="#8B6B3B">Rulers Y, Z = ?</text>

  <!-- Era D: 320-550 CE — Dynasty W (Guptas) -->
  <rect x="570" y="80" width="140" height="50" fill="#E0C8E8" stroke="#7A4A8B" stroke-width="2" rx="6"/>
  <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#5A2B6E">Era D</text>
  <text x="640" y="117" text-anchor="middle" font-size="10" fill="#7A4A8B">Dynasty W = ?</text>

  <!-- Connector lines from blocks to timeline -->
  <line x1="150" y1="130" x2="150" y2="140" stroke="#4A7A9B" stroke-width="1.5"/>
  <line x1="340" y1="130" x2="340" y2="140" stroke="#4A8B4A" stroke-width="1.5"/>
  <line x1="485" y1="130" x2="485" y2="140" stroke="#A07840" stroke-width="1.5"/>
  <line x1="640" y1="130" x2="640" y2="140" stroke="#7A4A8B" stroke-width="1.5"/>

  <!-- Detail boxes below timeline -->
  <!-- Era A detail -->
  <rect x="55" y="190" width="190" height="55" fill="#E8F0F8" stroke="#4A7A9B" stroke-width="1" rx="4"/>
  <text x="150" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#2B4F6E">Era A (600–400 BCE)</text>
  <text x="150" y="223" text-anchor="middle" font-size="9" fill="#555">Rise of 16 Mahajanapadas</text>
  <text x="150" y="236" text-anchor="middle" font-size="9" fill="#555">Magadha emerges as dominant</text>

  <!-- Era B detail -->
  <rect x="260" y="190" width="160" height="55" fill="#E8F8E8" stroke="#4A8B4A" stroke-width="1" rx="4"/>
  <text x="340" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#2B5E2B">Era B (321–185 BCE)</text>
  <text x="340" y="223" text-anchor="middle" font-size="9" fill="#555">Dynasty X = ?</text>
  <text x="340" y="236" text-anchor="middle" font-size="9" fill="#555">Chandragupta, Ashoka</text>

  <!-- Era C detail -->
  <rect x="435" y="190" width="160" height="55" fill="#F8F0E0" stroke="#A07840" stroke-width="1" rx="4"/>
  <text x="515" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#6B4E2B">Era C (200 BCE–300 CE)</text>
  <text x="515" y="223" text-anchor="middle" font-size="9" fill="#555">Foreign rulers Y = ?</text>
  <text x="515" y="236" text-anchor="middle" font-size="9" fill="#555">and Z = ?</text>

  <!-- Era D detail -->
  <rect x="610" y="190" width="145" height="55" fill="#F0E8F8" stroke="#7A4A8B" stroke-width="1" rx="4"/>
  <text x="682" y="208" text-anchor="middle" font-size="10" font-weight="bold" fill="#5A2B6E">Era D (320–550 CE)</text>
  <text x="682" y="223" text-anchor="middle" font-size="9" fill="#555">Dynasty W = ?</text>
  <text x="682" y="236" text-anchor="middle" font-size="9" fill="#555">'Golden Age' of India</text>

  <!-- Legend -->
  <rect x="50" y="265" width="700" height="60" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="60" y="285" font-size="11" fill="#555" font-weight="bold">Q: Identify the dynasties/rulers:</text>
  <text x="60" y="302" font-size="10" fill="#555">X = ? (Era B, 321–185 BCE)    Y = ? (Era C, foreign rulers from the west)    Z = ? (Era C, Central Asian rulers)</text>
  <text x="60" y="317" font-size="10" fill="#555">W = ? (Era D, 320–550 CE, 'Golden Age')</text>
</svg>
