<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 560" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="750" height="560" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Chain of Communal Violence Leading to Partition (1946–47)</text>
  <text x="375" y="46" text-anchor="middle" font-size="11" fill="#666">How did the cycle of retaliation escalate? What made it difficult to stop?</text>

  <!-- Defs -->
  <defs>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#B03030"/>
    </marker>
    <marker id="aD2" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
      <polygon points="0,0 5,10 10,0" fill="#B03030"/>
    </marker>
  </defs>

  <!-- Box 1: Direct Action Day -->
  <rect x="225" y="65" width="300" height="52" fill="#D04040" stroke="#8B2020" stroke-width="2" rx="7"/>
  <text x="375" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1. Direct Action Day — 16 Aug 1946</text>
  <text x="375" y="100" text-anchor="middle" font-size="9" fill="#F8D0D0">Great Calcutta Killings (Muslims &amp; Hindus killed)</text>
  <text x="375" y="112" text-anchor="middle" font-size="8" fill="#F0B0B0">~4,000–5,000 dead in days</text>

  <!-- Arrow 1→2 -->
  <line x1="375" y1="117" x2="375" y2="140" stroke="#B03030" stroke-width="2.5" marker-end="url(#aD2)"/>

  <!-- Box 2: Noakhali Riots -->
  <rect x="225" y="143" width="300" height="48" fill="#C85050" stroke="#8B2020" stroke-width="2" rx="7"/>
  <text x="375" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2. Noakhali Riots — Oct 1946</text>
  <text x="375" y="178" text-anchor="middle" font-size="9" fill="#F8D0D0">Hindus targeted in eastern Bengal</text>
  <text x="375" y="188" text-anchor="middle" font-size="8" fill="#F0B0B0">Gandhi walks through villages for peace</text>

  <!-- Arrow 2→3 -->
  <line x1="375" y1="191" x2="375" y2="214" stroke="#B03030" stroke-width="2.5" marker-end="url(#aD2)"/>
  <!-- Retaliation label -->
  <text x="540" y="208" font-size="9" fill="#B03030" font-weight="bold" font-style="italic">Retaliation →</text>

  <!-- Box 3: Bihar Riots -->
  <rect x="225" y="217" width="300" height="48" fill="#B06060" stroke="#8B2020" stroke-width="2" rx="7"/>
  <text x="375" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3. Bihar Riots — Nov 1946</text>
  <text x="375" y="252" text-anchor="middle" font-size="9" fill="#F8D0D0">Muslims targeted in retaliation for Noakhali</text>
  <text x="375" y="262" text-anchor="middle" font-size="8" fill="#F0B0B0">Thousands killed</text>

  <!-- Arrow 3→4 -->
  <line x1="375" y1="265" x2="375" y2="288" stroke="#B03030" stroke-width="2.5" marker-end="url(#aD2)"/>
  <text x="540" y="282" font-size="9" fill="#B03030" font-weight="bold" font-style="italic">Retaliation →</text>

  <!-- Box 4: Rawalpindi Riots -->
  <rect x="225" y="291" width="300" height="48" fill="#A07070" stroke="#8B2020" stroke-width="2" rx="7"/>
  <text x="375" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4. Rawalpindi Riots — Mar 1947</text>
  <text x="375" y="326" text-anchor="middle" font-size="9" fill="#F8D0D0">Sikhs &amp; Hindus attacked in west Punjab</text>

  <!-- Arrow 4→5 -->
  <line x1="375" y1="339" x2="375" y2="358" stroke="#555" stroke-width="2" marker-end="url(#aD2)"/>

  <!-- Box 5: Partition Announced -->
  <rect x="240" y="361" width="270" height="35" fill="#555" stroke="#333" stroke-width="2" rx="7"/>
  <text x="375" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">5. Partition Announced — 3 June 1947</text>

  <!-- Arrow 5→6 -->
  <line x1="375" y1="396" x2="375" y2="415" stroke="#B03030" stroke-width="2.5" marker-end="url(#aD2)"/>

  <!-- Box 6: Punjab Massacres -->
  <rect x="195" y="418" width="360" height="48" fill="#8B2222" stroke="#5A1010" stroke-width="2" rx="7"/>
  <text x="375" y="437" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">6. Punjab Massacres — Aug-Sep 1947</text>
  <text x="375" y="453" text-anchor="middle" font-size="9" fill="#F8C0C0">All communities attack each other on both sides</text>
  <text x="375" y="463" text-anchor="middle" font-size="8" fill="#F0A0A0">Worst violence of Partition — lakhs killed</text>

  <!-- Arrow 6→7 -->
  <line x1="500" y1="442" x2="570" y2="442" stroke="#B03030" stroke-width="2" marker-end="url(#aR)"/>

  <!-- Box 7: Delhi Violence -->
  <rect x="573" y="418" width="160" height="48" fill="#A03030" stroke="#7A1818" stroke-width="2" rx="7"/>
  <text x="653" y="437" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">7. Delhi Violence</text>
  <text x="653" y="453" text-anchor="middle" font-size="9" fill="#F8D0D0">Sep 1947 — Muslims</text>
  <text x="653" y="463" text-anchor="middle" font-size="9" fill="#F8D0D0">targeted</text>

  <!-- Curved arrow: Cycle of retaliation looping from Box 7 back toward Box 1 -->
  <path d="M653,418 Q680,350 700,270 Q710,180 680,100 Q660,70 530,68" fill="none" stroke="#B03030" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#aR)"/>
  <!-- Cycle label -->
  <rect x="690" y="210" width="50" height="55" fill="#FFF0F0" stroke="#B03030" stroke-width="1" rx="4"/>
  <text x="715" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#B03030">Cycle</text>
  <text x="715" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="#B03030">of</text>
  <text x="715" y="252" text-anchor="middle" font-size="9" font-weight="bold" fill="#B03030">Retali-</text>
  <text x="715" y="264" text-anchor="middle" font-size="9" font-weight="bold" fill="#B03030">ation</text>

  <!-- GANDHI'S FASTS — separate box breaking the cycle -->
  <rect x="15" y="170" width="185" height="80" fill="#E0F4D0" stroke="#4A8B4A" stroke-width="2.5" rx="8"/>
  <text x="107" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B6B2B">Gandhi's Fasts</text>
  <text x="107" y="208" text-anchor="middle" font-size="9" fill="#3A8A3A">Calcutta (Sep 1947)</text>
  <text x="107" y="222" text-anchor="middle" font-size="9" fill="#3A8A3A">Delhi (Jan 1948)</text>
  <text x="107" y="238" text-anchor="middle" font-size="9" fill="#3A8A3A" font-weight="bold">Breaks cycle locally</text>

  <!-- Arrow from Gandhi box pointing to chain -->
  <line x1="200" y1="210" x2="222" y2="210" stroke="#4A8B4A" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- "Breaks" symbol -->
  <text x="212" y="198" font-size="16" fill="#4A8B4A" font-weight="bold">⚡</text>

  <!-- Escalation indicator on left -->
  <line x1="35" y1="80" x2="35" y2="455" stroke="#B03030" stroke-width="2"/>
  <polygon points="35,455 28,440 42,440" fill="#B03030"/>
  <text x="27" y="270" text-anchor="middle" font-size="9" fill="#B03030" font-weight="bold" transform="rotate(-90,27,270)">Violence escalates ↓</text>

  <!-- Legend -->
  <rect x="40" y="485" width="670" height="62" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="50" y="503" font-size="11" fill="#555" font-weight="bold">Q: How did communal violence escalate through retaliation? What made it difficult to stop?</text>
  <line x1="55" y1="518" x2="80" y2="518" stroke="#B03030" stroke-width="2.5"/>
  <text x="88" y="522" font-size="9" fill="#555">Escalating violence chain</text>
  <path d="M220,518 Q235,510 250,518" fill="none" stroke="#B03030" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="258" y="522" font-size="9" fill="#555">Cycle of retaliation</text>
  <rect x="370" y="512" width="14" height="12" fill="#E0F4D0" stroke="#4A8B4A" stroke-width="1"/>
  <text x="390" y="522" font-size="9" fill="#555">Gandhi's intervention</text>
  <text x="50" y="540" font-size="8" fill="#777" font-style="italic">Each attack triggered revenge elsewhere. Each community saw itself as the victim. Only extraordinary moral authority (Gandhi's fasts) could interrupt the cycle locally.</text>
</svg>
