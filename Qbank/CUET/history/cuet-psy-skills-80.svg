<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 470" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="650" height="470" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="325" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Hierarchy of Psychological Skills</text>
  <text x="325" y="52" text-anchor="middle" font-size="12" fill="#666">Identify which skill category forms the foundation, middle, and top</text>

  <!-- Pyramid Layer 1 (Top) — Specific Skills -->
  <polygon points="325,80 235,170 415,170" fill="#E8788A" stroke="#C0405A" stroke-width="2.5"/>
  <text x="325" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Specific Skills</text>
  <text x="325" y="145" text-anchor="middle" font-size="10" fill="#F8D0D8">(Top Level)</text>

  <!-- Specific Skills detail items -->
  <rect x="435" y="95" width="175" height="70" fill="#FBE8EC" stroke="#C0405A" stroke-width="1" rx="5"/>
  <line x1="415" y1="130" x2="435" y2="130" stroke="#C0405A" stroke-width="1.5"/>
  <text x="522" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0405A">Includes:</text>
  <text x="445" y="130" font-size="10" fill="#555">• Psychological Testing</text>
  <text x="445" y="146" font-size="10" fill="#555">• Counselling</text>
  <text x="445" y="162" font-size="10" fill="#555">• Interviewing</text>

  <!-- Pyramid Layer 2 (Middle) — Observational Skills -->
  <polygon points="235,170 145,275 505,275 415,170" fill="#7AB0D4" stroke="#3A7AAA" stroke-width="2.5"/>
  <text x="325" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Observational Skills</text>
  <text x="325" y="232" text-anchor="middle" font-size="10" fill="#D0E8F8">(Middle Level)</text>

  <!-- Observational Skills detail items -->
  <rect x="525" y="190" width="110" height="80" fill="#E0F0FA" stroke="#3A7AAA" stroke-width="1" rx="5"/>
  <line x1="505" y1="225" x2="525" y2="225" stroke="#3A7AAA" stroke-width="1.5"/>
  <text x="580" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A7AAA">Includes:</text>
  <text x="535" y="226" font-size="10" fill="#555">• Naturalistic</text>
  <text x="535" y="242" font-size="10" fill="#555">• Controlled</text>
  <text x="535" y="258" font-size="10" fill="#555">• Participant</text>

  <!-- Pyramid Layer 3 (Bottom/Foundation) — General Skills -->
  <polygon points="145,275 55,390 595,390 505,275" fill="#6AB87A" stroke="#3A8848" stroke-width="2.5"/>
  <text x="325" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">General Skills</text>
  <text x="325" y="342" text-anchor="middle" font-size="10" fill="#D0F0D8">(Foundation Level)</text>

  <!-- General Skills detail items -->
  <rect x="15" y="285" width="130" height="100" fill="#E0F4E4" stroke="#3A8848" stroke-width="1" rx="5"/>
  <line x1="145" y1="335" x2="130" y2="335" stroke="#3A8848" stroke-width="1.5"/>
  <text x="80" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A8848">Includes:</text>
  <text x="25" y="320" font-size="10" fill="#555">• Intellectual</text>
  <text x="28" y="333" font-size="10" fill="#555">  competence</text>
  <text x="25" y="350" font-size="10" fill="#555">• Emotional</text>
  <text x="28" y="363" font-size="10" fill="#555">  competence</text>
  <text x="25" y="380" font-size="10" fill="#555">• Positive attitude</text>

  <!-- Self-awareness on right side -->
  <rect x="510" y="310" width="125" height="75" fill="#E0F4E4" stroke="#3A8848" stroke-width="1" rx="5"/>
  <line x1="505" y1="345" x2="510" y2="345" stroke="#3A8848" stroke-width="1.5"/>
  <text x="572" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#3A8848">Also includes:</text>
  <text x="520" y="350" font-size="10" fill="#555">• Self-awareness</text>
  <text x="520" y="368" font-size="10" fill="#555">• Personal growth</text>
  <text x="520" y="383" font-size="10" fill="#555">• Ethical values</text>

  <!-- Base line emphasis -->
  <line x1="55" y1="390" x2="595" y2="390" stroke="#3A8848" stroke-width="3"/>

  <!-- Hierarchy arrow on far left -->
  <line x1="30" y1="100" x2="30" y2="380" stroke="#666" stroke-width="2"/>
  <polygon points="30,380 24,368 36,368" fill="#666"/>
  <polygon points="30,100 24,112 36,112" fill="#666"/>
  <text x="22" y="200" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90,22,200)">More specialised →</text>
  <text x="22" y="320" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90,22,320)">← More foundational</text>

  <!-- Explanatory note -->
  <rect x="100" y="400" width="450" height="30" fill="#F8F4E8" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="325" y="420" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Each level builds upon the skills below it — foundation skills are essential for all higher skills</text>

  <!-- Legend / Question -->
  <rect x="50" y="440" width="550" height="22" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="60" y="456" font-size="11" fill="#555" font-weight="bold">Q: Which skill type forms the foundation? Which is at the middle? Which is at the top?</text>
</svg>
