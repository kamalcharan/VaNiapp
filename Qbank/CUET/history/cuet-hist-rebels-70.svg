<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="680" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Geography of the 1857 Revolt</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#666">Identify Zone A and Zone B. Why did certain regions not participate?</text>

  <!-- Simplified outline of India -->
  <path d="M220,70 L260,65 L300,72 L340,68 L380,75 L410,80 L430,100 L445,130 
           L450,160 L440,195 L445,230 L455,260 L460,290 L445,320 L430,350 
           L420,380 L400,410 L380,430 L360,445 L340,460 L320,475 L305,500 
           L295,520 L280,535 L265,540 L255,530 L250,510 L240,490 L225,470 
           L210,445 L195,420 L180,390 L170,360 L160,330 L145,300 L135,270 
           L130,240 L135,210 L140,180 L150,150 L160,125 L175,105 L195,85 L220,70 Z" 
        fill="#E8E0D0" stroke="#8B7355" stroke-width="2"/>

  <!-- Zone A — Primary Revolt Zone (Gangetic plain, shaded dark) -->
  <path d="M215,110 L270,105 L320,108 L370,112 L400,120 L420,140 
           L430,170 L435,200 L430,230 L420,250 L400,260 
           L370,265 L340,260 L310,255 L280,250 L250,240 
           L230,220 L215,195 L205,170 L200,145 L205,120 Z" 
        fill="#D4716A" fill-opacity="0.5" stroke="#B04040" stroke-width="2"/>

  <!-- Zone A label -->
  <text x="320" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B2222">ZONE A</text>
  <text x="320" y="196" text-anchor="middle" font-size="9" fill="#8B2222">Primary Zone of Revolt</text>
  <text x="320" y="210" text-anchor="middle" font-size="8" fill="#A04040">(Gangetic Plain &amp; Central India)</text>

  <!-- Star markers for key revolt centres -->
  <!-- Star 1: Delhi -->
  <polygon points="275,135 278,128 284,128 279,123 281,117 275,121 269,117 271,123 266,128 272,128" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="258" y="143" text-anchor="end" font-size="10" font-weight="bold" fill="#5A2A0A">Delhi</text>
  <text x="258" y="153" text-anchor="end" font-size="7" fill="#888">★1</text>

  <!-- Star 2: Meerut -->
  <polygon points="300,120 303,113 309,113 304,108 306,102 300,106 294,102 296,108 291,113 297,113" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="315" y="110" font-size="10" font-weight="bold" fill="#5A2A0A">Meerut</text>
  <text x="315" y="120" font-size="7" fill="#888">★2</text>

  <!-- Star 3: Lucknow -->
  <polygon points="350,155 353,148 359,148 354,143 356,137 350,141 344,137 346,143 341,148 347,148" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="365" y="148" font-size="10" font-weight="bold" fill="#5A2A0A">Lucknow</text>
  <text x="365" y="158" font-size="7" fill="#888">★3</text>

  <!-- Star 4: Kanpur -->
  <polygon points="335,175 338,168 344,168 339,163 341,157 335,161 329,157 331,163 326,168 332,168" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="348" y="175" font-size="10" font-weight="bold" fill="#5A2A0A">Kanpur</text>
  <text x="348" y="185" font-size="7" fill="#888">★4</text>

  <!-- Star 5: Jhansi -->
  <polygon points="295,225 298,218 304,218 299,213 301,207 295,211 289,207 291,213 286,218 292,218" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="280" y="235" text-anchor="end" font-size="10" font-weight="bold" fill="#5A2A0A">Jhansi</text>
  <text x="280" y="245" text-anchor="end" font-size="7" fill="#888">★5</text>

  <!-- Star 6: Gwalior -->
  <polygon points="270,240 273,233 279,233 274,228 276,222 270,226 264,222 266,228 261,233 267,233" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="255" y="248" text-anchor="end" font-size="10" font-weight="bold" fill="#5A2A0A">Gwalior</text>
  <text x="255" y="258" text-anchor="end" font-size="7" fill="#888">★6</text>

  <!-- Star 7: Jagdishpur (Bihar) -->
  <polygon points="400,170 403,163 409,163 404,158 406,152 400,156 394,152 396,158 391,163 397,163" fill="#FFD700" stroke="#8B6914" stroke-width="1"/>
  <text x="415" y="165" font-size="10" font-weight="bold" fill="#5A2A0A">Jagdishpur</text>
  <text x="415" y="175" font-size="7" fill="#888">★7 (Bihar)</text>

  <!-- Arrow: Meerut to Delhi -->
  <line x1="290" y1="115" x2="280" y2="128" stroke="#FFD700" stroke-width="2"/>
  <text x="275" y="112" font-size="7" fill="#8B6914" font-weight="bold">Sepoys march</text>
  <text x="280" y="100" font-size="7" fill="#8B6914" font-weight="bold">May 1857</text>

  <!-- Zone B labels — Regions largely unaffected -->
  <!-- Punjab -->
  <text x="215" y="90" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Punjab</text>
  <text x="215" y="100" text-anchor="middle" font-size="7" fill="#4A8BB0">(Stayed loyal)</text>

  <!-- Madras -->
  <text x="310" y="440" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Madras</text>
  <text x="310" y="450" text-anchor="middle" font-size="7" fill="#4A8BB0">(Unaffected)</text>

  <!-- Bombay -->
  <text x="195" y="340" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Bombay</text>
  <text x="195" y="350" text-anchor="middle" font-size="7" fill="#4A8BB0">(Largely quiet)</text>

  <!-- Eastern Bengal -->
  <text x="435" y="210" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Eastern</text>
  <text x="435" y="220" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Bengal</text>
  <text x="435" y="230" text-anchor="middle" font-size="7" fill="#4A8BB0">(Unaffected)</text>

  <!-- Zone B label box -->
  <rect x="430" y="340" width="145" height="50" fill="#D8E8F0" stroke="#3A7AAA" stroke-width="1.5" rx="5"/>
  <text x="502" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B5A7B">ZONE B</text>
  <text x="502" y="372" text-anchor="middle" font-size="9" fill="#4A8BB0">Regions Largely</text>
  <text x="502" y="384" text-anchor="middle" font-size="9" fill="#4A8BB0">Unaffected</text>

  <!-- Legend -->
  <rect x="30" y="560" width="540" height="108" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="40" y="578" font-size="11" fill="#555" font-weight="bold">Q: Explain the geographical pattern and why certain regions did not participate.</text>
  
  <!-- Legend items -->
  <rect x="45" y="590" width="16" height="12" fill="#D4716A" fill-opacity="0.5" stroke="#B04040" stroke-width="1"/>
  <text x="68" y="600" font-size="9" fill="#555">Zone A — Major revolt centres (Gangetic plain, central India)</text>
  
  <rect x="45" y="608" width="16" height="12" fill="#E8E0D0" stroke="#8B7355" stroke-width="1"/>
  <text x="68" y="618" font-size="9" fill="#555">Zone B — British-controlled / unaffected (Punjab, Madras, Bombay, E. Bengal)</text>

  <polygon points="45,632 48,625 54,625 49,620 51,614 45,618 39,614 41,620 36,625 42,625" fill="#FFD700" stroke="#8B6914" stroke-width="0.8"/>
  <text x="68" y="636" font-size="9" fill="#555">★ Major revolt centres (numbered 1-7)</text>

  <text x="45" y="658" font-size="8" fill="#777" font-style="italic">Punjab: Sikhs opposed Mughal restoration. Madras/Bombay: different army, fewer grievances.</text>
  <text x="45" y="668" font-size="8" fill="#777" font-style="italic">E. Bengal: lacked military presence. Revolt concentrated where Bengal Army recruited heavily.</text>
</svg>
