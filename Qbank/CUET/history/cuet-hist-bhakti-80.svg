<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="750" height="480" fill="#faf8f0" rx="8"/>
  
  <!-- Title -->
  <text x="375" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Classification of Bhakti Traditions</text>
  <text x="375" y="52" text-anchor="middle" font-size="12" fill="#666">Identify Type X and Type Y</text>

  <!-- Root node — BHAKTI MOVEMENT -->
  <rect x="260" y="70" width="230" height="45" fill="#5B3A29" stroke="#3A2010" stroke-width="2" rx="8"/>
  <text x="375" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">BHAKTI MOVEMENT</text>
  <text x="375" y="107" text-anchor="middle" font-size="10" fill="#D8C8A8">Devotional traditions of medieval India</text>

  <!-- Connector lines from root to two branches -->
  <line x1="310" y1="115" x2="190" y2="155" stroke="#5B3A29" stroke-width="2.5"/>
  <line x1="440" y1="115" x2="560" y2="155" stroke="#5B3A29" stroke-width="2.5"/>

  <!-- Branch A — Type X (Nirguna Bhakti) -->
  <rect x="75" y="155" width="230" height="50" fill="#4A7A9B" stroke="#2B5A7B" stroke-width="2" rx="8"/>
  <text x="190" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Branch A: Type X = ?</text>
  <text x="190" y="196" text-anchor="middle" font-size="11" fill="#C8E0F0">Devotion WITHOUT form/image</text>

  <!-- Branch B — Type Y (Saguna Bhakti) -->
  <rect x="445" y="155" width="230" height="50" fill="#8B4A6B" stroke="#6B2A4B" stroke-width="2" rx="8"/>
  <text x="560" y="176" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Branch B: Type Y = ?</text>
  <text x="560" y="196" text-anchor="middle" font-size="11" fill="#F0D0E0">Devotion WITH form/image</text>

  <!-- Connector lines from Branch A to saints -->
  <line x1="130" y1="205" x2="130" y2="240" stroke="#4A7A9B" stroke-width="2"/>
  <line x1="190" y1="205" x2="190" y2="240" stroke="#4A7A9B" stroke-width="2"/>
  <line x1="250" y1="205" x2="250" y2="240" stroke="#4A7A9B" stroke-width="2"/>

  <!-- Type X saints -->
  <rect x="85" y="240" width="90" height="60" fill="#D8E8F4" stroke="#4A7A9B" stroke-width="1.5" rx="5"/>
  <text x="130" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B5A7B">Kabir</text>
  <text x="130" y="276" text-anchor="middle" font-size="9" fill="#555">Weaver-poet</text>
  <text x="130" y="290" text-anchor="middle" font-size="9" fill="#555">Beyond Hindu/Muslim</text>

  <rect x="145" y="240" width="90" height="60" fill="#D8E8F4" stroke="#4A7A9B" stroke-width="1.5" rx="5"/>
  <text x="190" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B5A7B">Guru Nanak</text>
  <text x="190" y="276" text-anchor="middle" font-size="9" fill="#555">Founder of Sikhism</text>
  <text x="190" y="290" text-anchor="middle" font-size="9" fill="#555">One formless God</text>

  <rect x="205" y="240" width="90" height="60" fill="#D8E8F4" stroke="#4A7A9B" stroke-width="1.5" rx="5"/>
  <text x="250" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B5A7B">Ravidas</text>
  <text x="250" y="276" text-anchor="middle" font-size="9" fill="#555">Cobbler-saint</text>
  <text x="250" y="290" text-anchor="middle" font-size="9" fill="#555">Rejected caste</text>

  <!-- Extra saint for X -->
  <line x1="70" y1="205" x2="70" y2="240" stroke="#4A7A9B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="25" y="240" width="90" height="60" fill="#D8E8F4" stroke="#4A7A9B" stroke-width="1.5" rx="5"/>
  <text x="70" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#2B5A7B">Dadu Dayal</text>
  <text x="70" y="276" text-anchor="middle" font-size="9" fill="#555">Cotton carder</text>
  <text x="70" y="290" text-anchor="middle" font-size="9" fill="#555">Formless devotion</text>

  <!-- Key characteristic box for Type X -->
  <rect x="55" y="315" width="260" height="35" fill="#EEF4FA" stroke="#4A7A9B" stroke-width="1" rx="4" stroke-dasharray="5,3"/>
  <text x="185" y="330" text-anchor="middle" font-size="10" fill="#2B5A7B" font-weight="bold">Key: God is formless, beyond images;</text>
  <text x="185" y="344" text-anchor="middle" font-size="10" fill="#2B5A7B">inner devotion, reject rituals &amp; caste</text>

  <!-- Connector lines from Branch B to sub-branches -->
  <line x1="500" y1="205" x2="460" y2="250" stroke="#8B4A6B" stroke-width="2"/>
  <line x1="620" y1="205" x2="660" y2="250" stroke="#8B4A6B" stroke-width="2"/>

  <!-- Sub-branch: Rama tradition -->
  <rect x="390" y="250" width="140" height="35" fill="#C87A9B" stroke="#8B4A6B" stroke-width="1.5" rx="5"/>
  <text x="460" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Rama Tradition</text>

  <!-- Sub-branch: Krishna tradition -->
  <rect x="590" y="250" width="140" height="35" fill="#C87A9B" stroke="#8B4A6B" stroke-width="1.5" rx="5"/>
  <text x="660" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Krishna Tradition</text>

  <!-- Rama tradition saints -->
  <line x1="460" y1="285" x2="460" y2="310" stroke="#8B4A6B" stroke-width="1.5"/>
  <rect x="405" y="310" width="110" height="50" fill="#F4E0EC" stroke="#8B4A6B" stroke-width="1.5" rx="5"/>
  <text x="460" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#6B2A4B">Tulsidas</text>
  <text x="460" y="346" text-anchor="middle" font-size="9" fill="#555">Ramcharitmanas</text>
  <text x="460" y="358" text-anchor="middle" font-size="9" fill="#555">Devotion to Lord Rama</text>

  <!-- Krishna tradition saints -->
  <line x1="620" y1="285" x2="620" y2="310" stroke="#8B4A6B" stroke-width="1.5"/>
  <line x1="660" y1="285" x2="660" y2="310" stroke="#8B4A6B" stroke-width="1.5"/>
  <line x1="700" y1="285" x2="700" y2="310" stroke="#8B4A6B" stroke-width="1.5"/>

  <rect x="580" y="310" width="80" height="50" fill="#F4E0EC" stroke="#8B4A6B" stroke-width="1.5" rx="5"/>
  <text x="620" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B2A4B">Mirabai</text>
  <text x="620" y="346" text-anchor="middle" font-size="9" fill="#555">Rajput princess</text>
  <text x="620" y="358" text-anchor="middle" font-size="9" fill="#555">Krishna devotee</text>

  <rect x="665" y="310" width="80" height="50" fill="#F4E0EC" stroke="#8B4A6B" stroke-width="1.5" rx="5"/>
  <text x="705" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B2A4B">Surdas</text>
  <text x="705" y="346" text-anchor="middle" font-size="9" fill="#555">Blind poet</text>
  <text x="705" y="358" text-anchor="middle" font-size="9" fill="#555">Krishna's childhood</text>

  <!-- Chaitanya below Krishna -->
  <rect x="622" y="365" width="80" height="40" fill="#F4E0EC" stroke="#8B4A6B" stroke-width="1" rx="5"/>
  <text x="662" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#6B2A4B">Chaitanya</text>
  <text x="662" y="398" text-anchor="middle" font-size="9" fill="#555">Bengal, kirtan</text>

  <!-- Key characteristic box for Type Y -->
  <rect x="420" y="415" width="310" height="35" fill="#FAE8F0" stroke="#8B4A6B" stroke-width="1" rx="4" stroke-dasharray="5,3"/>
  <text x="575" y="430" text-anchor="middle" font-size="10" fill="#6B2A4B" font-weight="bold">Key: God has a definite form (Rama, Krishna);</text>
  <text x="575" y="444" text-anchor="middle" font-size="10" fill="#6B2A4B">worship through images, songs, temples</text>

  <!-- Legend -->
  <rect x="30" y="455" width="690" height="20" fill="#f0ece0" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="40" y="470" font-size="11" fill="#555" font-weight="bold">Q: Identify Type X (Branch A — devotion without form) = ?     Type Y (Branch B — devotion with form) = ?</text>
</svg>
