<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subject Detail - Qbank Admin</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* ================================================================
       HERO
       ================================================================ */
    .subject-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--gray-50, #f9fafb);
      padding: 12px 0;
    }
    .subject-hero-icon {
      font-size: 2.5rem;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .subject-hero-info h1 { margin: 0; font-size: 1.5rem; }
    .subject-hero-info .breadcrumb {
      font-size: 0.85rem;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .subject-hero-info .breadcrumb a {
      color: var(--primary);
      text-decoration: none;
    }

    /* ================================================================
       STATS GRID — 4 cards with % bar
       ================================================================ */
    .subject-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .subject-stat-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .subject-stat-card .value {
      font-size: 1.75rem;
      font-weight: 700;
    }
    .subject-stat-card .label {
      font-size: 0.8rem;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .stat-pct-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--gray-100);
      margin-top: 10px;
      overflow: hidden;
    }
    .stat-pct-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .subject-stat-card.clickable { cursor: pointer; }
    .subject-stat-card.clickable:hover { border-color: var(--primary); }

    /* ================================================================
       TYPE DISTRIBUTION — horizontal bar chart
       ================================================================ */
    .type-dist-section {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }
    .type-dist-section h3 {
      margin: 0 0 16px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .type-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .type-bar-label {
      width: 140px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: right;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .type-bar-track {
      flex: 1;
      height: 24px;
      background: var(--gray-100);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .type-bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: white;
      transition: width 0.6s ease;
      min-width: 0;
      white-space: nowrap;
    }
    .type-bar-count {
      width: 80px;
      font-size: 0.85rem;
      color: var(--gray-600);
      flex-shrink: 0;
      text-align: right;
    }
    .type-bar-count .pct {
      color: var(--gray-400);
      font-size: 0.75rem;
    }

    /* ================================================================
       CHAPTER CARDS — with topic drill-down
       ================================================================ */
    .chapter-row {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .chapter-row:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chapter-row-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
    }
    .chapter-row-header:hover { background: var(--gray-50); }
    .chapter-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .chapter-info {
      flex: 1;
      min-width: 0;
    }
    .chapter-name {
      font-weight: 600;
    }
    .chapter-meta-row {
      font-size: 0.8rem;
      color: var(--gray-500);
      margin-top: 2px;
    }
    .chapter-mini-bar {
      height: 4px;
      background: var(--gray-100);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
      max-width: 200px;
    }
    .chapter-mini-bar .fill {
      height: 100%;
      border-radius: 2px;
      background: var(--success);
      transition: width 0.5s;
    }
    .chapter-counts {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .chapter-counts span { white-space: nowrap; }
    .chapter-counts .c-total { font-weight: 600; }
    .chapter-counts .c-active { color: var(--success); }
    .chapter-counts .c-draft { color: var(--warning, #f59e0b); }
    .chapter-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .chapter-expand-icon {
      transition: transform 0.2s;
      font-size: 0.8rem;
      color: var(--gray-400);
    }
    .chapter-row.expanded .chapter-expand-icon {
      transform: rotate(180deg);
    }

    .chapter-body {
      display: none;
      border-top: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .chapter-row.expanded .chapter-body {
      display: block;
    }

    /* Topic list inside chapter body */
    .topic-section {
      padding: 16px;
      border-bottom: 1px solid var(--gray-200);
    }
    .topic-section-header {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gray-500);
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
    }
    .topic-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-size: 0.85rem;
    }
    .topic-card:hover {
      border-color: var(--primary);
      box-shadow: 0 1px 4px rgba(99,102,241,0.12);
    }
    .topic-card.active-filter {
      border-color: var(--primary);
      background: #eef2ff;
    }
    .topic-card .topic-name {
      flex: 1;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topic-card .topic-name .important-tag {
      font-size: 0.65rem;
      background: #fef3c7;
      color: #92400e;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .topic-card .topic-count {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 24px;
      text-align: center;
    }
    .topic-mini-bar {
      width: 60px;
      height: 6px;
      background: var(--gray-100);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .topic-mini-bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s;
    }
    .topic-status-dots {
      display: flex;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--gray-500);
    }

    /* Questions section inside chapter body */
    .questions-section {
      padding: 16px;
    }

    .q-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .q-filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--gray-300);
      background: var(--white);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .q-filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .q-list-item {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.85rem;
      overflow: hidden;
    }
    .q-list-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .q-list-header:hover { background: var(--gray-50); }
    .q-list-item .q-check {
      flex-shrink: 0;
      margin-top: 2px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .q-list-item .q-num {
      font-weight: 600;
      color: var(--gray-400);
      flex-shrink: 0;
      min-width: 24px;
    }
    .q-list-item .q-text {
      flex: 1;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .q-list-item.expanded .q-text {
      -webkit-line-clamp: unset;
    }
    .q-list-item .q-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .q-expand-icon {
      color: var(--gray-400);
      font-size: 0.7rem;
      transition: transform 0.2s;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .q-list-item.expanded .q-expand-icon { transform: rotate(180deg); }

    /* Expanded detail panel */
    .q-detail {
      display: none;
      border-top: 1px solid var(--gray-200);
      padding: 14px 16px 14px 52px;
      background: var(--gray-50);
    }
    .q-list-item.expanded .q-detail { display: block; }
    .q-detail-section { margin-bottom: 12px; }
    .q-detail-section:last-child { margin-bottom: 0; }
    .q-detail-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gray-500);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .q-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: var(--white);
      border: 1px solid var(--gray-200);
    }
    .q-option.correct {
      background: #d1fae5;
      border-color: #6ee7b7;
    }
    .q-option-key {
      font-weight: 700;
      min-width: 20px;
      color: var(--gray-500);
    }
    .q-option.correct .q-option-key { color: #065f46; }
    .q-option-text { flex: 1; }
    .q-option-correct-tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: #065f46;
      background: #a7f3d0;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .q-explanation {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 10px 12px;
      line-height: 1.5;
      color: #1e40af;
    }
    .q-hint {
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 4px;
      font-size: 0.8rem;
    }
    .q-hint-key { font-weight: 600; color: #92400e; }
    .q-hint-misconception { font-style: italic; color: #78716c; margin-top: 2px; }
    .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .q-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      background: var(--gray-100);
      border-radius: 10px;
      color: var(--gray-600);
    }

    /* Status toggle */
    .status-toggle {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--gray-300);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .status-toggle:hover { opacity: 0.8; }
    .status-toggle.to-active { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .status-toggle.to-draft { background: #fef3c7; color: #92400e; border-color: #fcd34d; }

    /* Bulk action bar */
    .bulk-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .bulk-bar .bulk-count { font-weight: 600; color: #1d4ed8; }
    .bulk-bar .btn { font-size: 0.8rem; padding: 4px 12px; }

    /* Pending review items */
    .pending-job-card {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .pending-job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pending-job-header .badge { font-size: 0.72rem; padding: 2px 8px; }
    .pending-q-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .pending-q-item:hover { background: var(--gray-50); }
    .pending-q-item .pq-num { font-weight: 600; color: var(--gray-400); min-width: 24px; flex-shrink: 0; }
    .pending-q-item .pq-text { flex: 1; line-height: 1.4; }
    .pending-q-detail {
      display: none;
      border-top: 1px solid var(--gray-200);
      padding: 10px 12px 10px 36px;
      background: var(--gray-50);
      border-radius: 0 0 6px 6px;
      margin-top: -4px;
      margin-bottom: 4px;
    }
    .pending-q-item.expanded + .pending-q-detail { display: block; }

    .q-pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--gray-500);
    }
    .q-pagination button {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--gray-300);
      background: var(--white);
      font-size: 0.8rem;
      cursor: pointer;
    }
    .q-pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-chapter {
      text-align: center;
      padding: 24px;
      color: var(--gray-400);
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-bar { height: 24px; margin-bottom: 10px; }
    .skeleton-card { height: 60px; margin-bottom: 8px; }

    @media (max-width: 768px) {
      .subject-stats { grid-template-columns: repeat(2, 1fr); }
      .chapter-counts { display: none; }
      .type-bar-label { width: 80px; font-size: 0.75rem; }
      .topic-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header id="nav-header"></header>

  <div class="page-wrapper">
    <div class="page-content">

      <!-- Hero -->
      <div class="subject-hero" id="subjectHero">
        <div class="subject-hero-icon" id="heroIcon"></div>
        <div class="subject-hero-info">
          <h1 id="heroTitle">Loading...</h1>
          <div class="breadcrumb">
            <a href="./index.html" id="breadcrumbDashboard">Dashboard</a> &gt;
            <span id="heroBreadcrumb"></span>
          </div>
        </div>
        <div style="margin-left: auto;">
          <a id="generateBtn" href="#" class="btn btn-primary">+ Generate Questions</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="subject-stats" id="subjectStats">
        <div class="subject-stat-card">
          <div class="value" id="statTotal">--</div>
          <div class="label">Total Questions</div>
          <div class="stat-pct-bar"><div class="fill" id="barTotal" style="width: 0; background: var(--primary);"></div></div>
        </div>
        <div class="subject-stat-card">
          <div class="value" id="statActive" style="color: var(--success);">--</div>
          <div class="label">Active</div>
          <div class="stat-pct-bar"><div class="fill" id="barActive" style="width: 0; background: var(--success);"></div></div>
        </div>
        <div class="subject-stat-card">
          <div class="value" id="statDraft" style="color: #f59e0b;">--</div>
          <div class="label">Draft</div>
          <div class="stat-pct-bar"><div class="fill" id="barDraft" style="width: 0; background: #f59e0b;"></div></div>
        </div>
        <div class="subject-stat-card clickable" id="pendingStatCard" title="Click to review pending jobs">
          <div class="value" id="statPending" style="color: #f59e0b;">--</div>
          <div class="label">Needs Review</div>
          <div class="stat-pct-bar"><div class="fill" id="barPending" style="width: 0; background: #f59e0b;"></div></div>
        </div>
      </div>

      <!-- Question Type Distribution -->
      <div class="type-dist-section" id="typeDistSection" style="display: none;">
        <h3>Question Type Distribution</h3>
        <div id="typeDistChart">
          <!-- Skeleton loading -->
          <div class="skeleton skeleton-bar" style="width: 80%;"></div>
          <div class="skeleton skeleton-bar" style="width: 50%;"></div>
          <div class="skeleton skeleton-bar" style="width: 30%;"></div>
        </div>
      </div>

      <!-- Chapters -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title" id="chaptersTitle">Chapters</h3>
        </div>
        <div class="card-body" id="chaptersContainer">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="./shared.js"></script>
  <script>
    // Read URL params
    const params = new URLSearchParams(window.location.search);
    const examId = (params.get('exam') || 'NEET').toUpperCase();
    const subjectId = (params.get('subject') || '').toUpperCase();

    let chapters = [];
    let chapterQuestionCounts = {};
    let pendingByChapter = {};
    let readyByChapter = {};
    let pendingJobsByChapter = {};
    let typeDistribution = {};

    // Per-chapter state for expanded questions
    const chapterState = {};
    // Cache: chapterId -> { topics, counts }
    const topicCache = {};

    // Type bar colors
    const TYPE_COLORS = {
      'mcq': '#6366f1',
      'assertion-reasoning': '#8b5cf6',
      'true-false': '#10b981',
      'match-the-following': '#f59e0b',
      'fill-in-blanks': '#ef4444',
      'scenario-based': '#ec4899',
      'diagram-based': '#14b8a6',
      'logical-sequence': '#f97316'
    };
    const TYPE_LABELS = {
      'mcq': 'MCQ',
      'true-false': 'True / False',
      'assertion-reasoning': 'Assertion-Reasoning',
      'match-the-following': 'Match the Following',
      'fill-in-blanks': 'Fill in Blanks',
      'scenario-based': 'Scenario Based',
      'diagram-based': 'Diagram Based',
      'logical-sequence': 'Logical Sequence'
    };

    async function init() {
      const user = await Qbank.requireAuth();
      if (!user) return;
      Qbank.renderNavHeader();

      if (!subjectId) {
        document.getElementById('chaptersContainer').innerHTML =
          '<p class="empty-message">No subject specified. <a href="./index.html">Go to Dashboard</a></p>';
        return;
      }

      const meta = Qbank.getSubjectMeta(subjectId);
      const examConfig = Qbank.getExamConfig(examId);

      // Hero
      document.getElementById('heroIcon').style.background = meta.bg;
      document.getElementById('heroIcon').textContent = meta.emoji;
      document.getElementById('heroTitle').textContent = meta.name;
      document.getElementById('heroBreadcrumb').textContent = `${examConfig?.name || examId} > ${meta.name}`;
      document.title = `${meta.name} - Qbank Admin`;

      // Generate button
      document.getElementById('generateBtn').href = `./generate.html?exam=${examId}&subject=${subjectId}`;

      // Load data in parallel
      const [chaptersData, qCounts, jobs, typeDist] = await Promise.all([
        Qbank.fetchChapters(subjectId, examId),
        Qbank.fetchQuestionsCountByChapter(subjectId, examId),
        Qbank.fetchGenerationJobs(),
        Qbank.fetchTypeDistribution(subjectId, examId)
      ]);

      chapters = chaptersData;
      chapterQuestionCounts = qCounts;
      typeDistribution = typeDist;

      // Count jobs per chapter
      pendingJobsByChapter = {};
      readyByChapter = {};
      jobs.filter(j =>
        Qbank.normalizeId(j.subject_id) === Qbank.normalizeId(subjectId) &&
        (j.status === 'pending' || j.status === 'reviewed')
      ).forEach(job => {
        const chId = job.chapter_id;
        if (job.status === 'pending') {
          const count = job.output_json?.questions?.length || 0;
          if (!pendingByChapter[chId]) pendingByChapter[chId] = 0;
          pendingByChapter[chId] += count;
        } else if (job.status === 'reviewed') {
          const approved = (job.output_json?.questions || []).filter(q => q._approved).length;
          if (!readyByChapter[chId]) readyByChapter[chId] = 0;
          readyByChapter[chId] += approved;
        }
        if (!pendingJobsByChapter[chId]) pendingJobsByChapter[chId] = [];
        pendingJobsByChapter[chId].push(job);
      });

      renderStats();
      renderTypeDistribution();
      renderChapters();
    }

    // ========================================================================
    // STATS
    // ========================================================================
    function renderStats() {
      let total = 0, active = 0, draft = 0;
      Object.values(chapterQuestionCounts).forEach(c => {
        total += c.total;
        active += c.active;
        draft += c.draft;
      });

      let jobPending = 0;
      Object.values(pendingByChapter).forEach(v => jobPending += v);
      let jobReady = 0;
      Object.values(readyByChapter).forEach(v => jobReady += v);

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statDraft').textContent = draft;
      document.getElementById('statPending').textContent = jobPending + jobReady;

      // Percentage bars
      if (total > 0) {
        document.getElementById('barTotal').style.width = '100%';
        document.getElementById('barActive').style.width = ((active / total) * 100) + '%';
        document.getElementById('barDraft').style.width = ((draft / total) * 100) + '%';
      }
      const pendingTotal = jobPending + jobReady;
      if (pendingTotal > 0) {
        document.getElementById('barPending').style.width = '100%';
      }

      // Clickable pending card
      document.getElementById('pendingStatCard').onclick = () => {
        if (jobPending > 0) {
          window.location.href = `./review.html?exam=${examId}&subject=${subjectId}&status=pending`;
        } else if (jobReady > 0) {
          window.location.href = `./insert.html?exam=${examId}&subject=${subjectId}`;
        }
      };
    }

    // ========================================================================
    // TYPE DISTRIBUTION CHART
    // ========================================================================
    function renderTypeDistribution() {
      const section = document.getElementById('typeDistSection');
      const container = document.getElementById('typeDistChart');

      const entries = Object.entries(typeDistribution).sort((a, b) => b[1].total - a[1].total);
      if (entries.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      const maxCount = entries[0][1].total;

      container.innerHTML = entries.map(([type, counts]) => {
        const pct = maxCount > 0 ? (counts.total / maxCount) * 100 : 0;
        const totalAll = Object.values(typeDistribution).reduce((s, c) => s + c.total, 0);
        const globalPct = totalAll > 0 ? ((counts.total / totalAll) * 100).toFixed(1) : 0;
        const color = TYPE_COLORS[type] || '#6b7280';
        const label = TYPE_LABELS[type] || type;

        return `
          <div class="type-bar-row">
            <div class="type-bar-label">${label}</div>
            <div class="type-bar-track">
              <div class="type-bar-fill" style="width: ${pct}%; background: ${color};">
                ${pct > 20 ? counts.total : ''}
              </div>
            </div>
            <div class="type-bar-count">
              ${counts.total} <span class="pct">(${globalPct}%)</span>
              <div style="font-size: 0.7rem; color: var(--gray-400);">
                ${counts.active} active &middot; ${counts.draft} draft
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ========================================================================
    // CHAPTERS
    // ========================================================================
    function renderChapters() {
      const container = document.getElementById('chaptersContainer');
      const meta = Qbank.getSubjectMeta(subjectId);

      if (chapters.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p class="empty-title">No chapters found for ${meta.name}</p>
            <p class="empty-message">Chapters need to be added to the database first.</p>
          </div>`;
        return;
      }

      document.getElementById('chaptersTitle').textContent = `Chapters (${chapters.length})`;

      container.innerHTML = chapters.map((ch, idx) => {
        const counts = chapterQuestionCounts[ch.id] || { total: 0, active: 0, draft: 0, pending: 0 };
        const chPending = pendingByChapter[ch.id] || 0;
        const chReady = readyByChapter[ch.id] || 0;
        const activePct = counts.total > 0 ? ((counts.active / counts.total) * 100).toFixed(0) : 0;

        return `
          <div class="chapter-row" id="chapter-${ch.id}">
            <div class="chapter-row-header" onclick="toggleChapter('${ch.id}')">
              <div class="chapter-num" style="background: ${meta.bg}; color: ${meta.color};">
                ${ch.chapter_number || idx + 1}
              </div>
              <div class="chapter-info">
                <div class="chapter-name">${ch.name}</div>
                <div class="chapter-meta-row">
                  Class ${ch.class_level || '?'}
                  ${ch.weightage ? ' &middot; ' + ch.weightage + '% weightage' : ''}
                  ${counts.total > 0 ? ` &middot; ${activePct}% active` : ''}
                </div>
                ${counts.total > 0 ? `
                  <div class="chapter-mini-bar">
                    <div class="fill" style="width: ${activePct}%;"></div>
                  </div>
                ` : ''}
              </div>
              <div class="chapter-counts">
                <span class="c-total">${counts.total} total</span>
                <span class="c-active">${counts.active} active</span>
                <span class="c-draft">${counts.draft} draft</span>
                ${chPending > 0 ? `<span style="color: #f59e0b;">${chPending} review</span>` : ''}
                ${chReady > 0 ? `<span style="color: var(--success);">${chReady} ready</span>` : ''}
              </div>
              <div class="chapter-actions">
                <a href="./explore.html?exam=${examId}&subject=${subjectId}&chapter=${ch.id}"
                   class="btn btn-sm btn-secondary" onclick="event.stopPropagation();"
                   title="Scan for quality issues"
                   style="${counts.total === 0 ? 'display:none;' : ''}">
                  Explore
                </a>
                <a href="./generate.html?exam=${examId}&subject=${subjectId}&chapter=${ch.id}"
                   class="btn btn-sm btn-primary" onclick="event.stopPropagation();">
                  ${counts.total === 0 ? 'Generate First' : 'Generate'}
                </a>
              </div>
              <span class="chapter-expand-icon">▼</span>
            </div>
            <div class="chapter-body" id="chapter-body-${ch.id}">
              <div style="padding: 16px;">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card" style="width: 70%;"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ========================================================================
    // EXPAND CHAPTER — LOAD TOPICS + QUESTIONS
    // ========================================================================
    async function toggleChapter(chapterId) {
      const row = document.getElementById(`chapter-${chapterId}`);
      const isExpanded = row.classList.contains('expanded');

      if (isExpanded) {
        row.classList.remove('expanded');
        return;
      }

      row.classList.add('expanded');

      // Initialize state if first time
      if (!chapterState[chapterId]) {
        chapterState[chapterId] = { page: 1, filter: null, topicFilter: null, data: [], total: 0 };
      }

      await loadChapterContent(chapterId);
    }

    async function loadChapterContent(chapterId) {
      const body = document.getElementById(`chapter-body-${chapterId}`);
      body.innerHTML = `
        <div style="padding: 16px;">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card" style="width: 70%;"></div>
        </div>`;

      // Fetch topics (cached) and questions in parallel
      const topicPromise = topicCache[chapterId]
        ? Promise.resolve(topicCache[chapterId])
        : Qbank.fetchTopicCountsByChapter(chapterId);

      const state = chapterState[chapterId];
      const qPromise = Qbank.fetchQuestionsByChapter(chapterId, {
        page: state.page,
        pageSize: 10,
        status: state.filter === 'pending_review' ? null : state.filter
      });

      const [topicData, result] = await Promise.all([topicPromise, qPromise]);

      // Cache topic data
      topicCache[chapterId] = topicData;

      state.data = result.data;
      const counts = chapterQuestionCounts[chapterId] || { total: 0, active: 0, draft: 0, pending: 0 };
      if (!state.filter) state.total = counts.total;
      else if (state.filter === 'active') state.total = counts.active;
      else if (state.filter === 'draft') state.total = counts.draft;
      else state.total = counts.pending;

      renderChapterBody(chapterId);
    }

    function renderChapterBody(chapterId) {
      const body = document.getElementById(`chapter-body-${chapterId}`);
      const state = chapterState[chapterId];
      const topicData = topicCache[chapterId] || { topics: [], counts: {} };

      let html = '';

      // ---- Topic Section ----
      if (topicData.topics.length > 0 || Object.keys(topicData.counts).length > 0) {
        const maxTopicCount = Math.max(1, ...Object.values(topicData.counts).map(c => c.total));
        const meta = Qbank.getSubjectMeta(subjectId);

        html += `<div class="topic-section">
          <div class="topic-section-header">
            Topics (${topicData.topics.length})
            ${state.topicFilter ? `<button class="q-filter-btn active" onclick="clearTopicFilter('${chapterId}')" style="font-size: 0.72rem; padding: 2px 8px;">Clear filter ✕</button>` : ''}
          </div>
          <div class="topic-grid">`;

        // Render named topics
        topicData.topics.forEach(topic => {
          const tc = topicData.counts[topic.id] || { total: 0, active: 0, draft: 0 };
          const barPct = maxTopicCount > 0 ? (tc.total / maxTopicCount) * 100 : 0;
          const isActive = state.topicFilter === topic.id;

          html += `
            <div class="topic-card ${isActive ? 'active-filter' : ''}" onclick="filterByTopic('${chapterId}', '${topic.id}')">
              <div class="topic-name">
                ${Qbank.escapeHtml(topic.name)}
                ${topic.is_important ? '<span class="important-tag">IMP</span>' : ''}
              </div>
              <div class="topic-mini-bar">
                <div class="fill" style="width: ${barPct}%; background: ${meta.color};"></div>
              </div>
              <div class="topic-count">${tc.total}</div>
              <div class="topic-status-dots">
                <span style="color: var(--success);">${tc.active}a</span>
                <span style="color: var(--warning);">${tc.draft}d</span>
              </div>
            </div>`;
        });

        // Uncategorized
        const uncatCounts = topicData.counts['__none__'];
        if (uncatCounts && uncatCounts.total > 0) {
          const barPct = maxTopicCount > 0 ? (uncatCounts.total / maxTopicCount) * 100 : 0;
          const isActive = state.topicFilter === '__none__';
          html += `
            <div class="topic-card ${isActive ? 'active-filter' : ''}" onclick="filterByTopic('${chapterId}', '__none__')" style="border-style: dashed;">
              <div class="topic-name" style="color: var(--gray-400);">Uncategorized</div>
              <div class="topic-mini-bar">
                <div class="fill" style="width: ${barPct}%; background: var(--gray-400);"></div>
              </div>
              <div class="topic-count" style="color: var(--gray-400);">${uncatCounts.total}</div>
              <div class="topic-status-dots">
                <span style="color: var(--success);">${uncatCounts.active}a</span>
                <span style="color: var(--warning);">${uncatCounts.draft}d</span>
              </div>
            </div>`;
        }

        html += `</div></div>`;
      }

      // ---- Questions Section ----
      html += `<div class="questions-section">`;
      html += renderChapterQuestions(chapterId);
      html += `</div>`;

      body.innerHTML = html;
    }

    function renderChapterQuestions(chapterId) {
      const state = chapterState[chapterId];
      const counts = chapterQuestionCounts[chapterId] || { total: 0, active: 0, draft: 0, pending: 0 };
      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil(state.total / pageSize));

      const chPending = pendingByChapter[chapterId] || 0;
      const chReady = readyByChapter[chapterId] || 0;
      const jobQCount = chPending + chReady;

      let html = `
        <div class="q-filters">
          <button class="q-filter-btn ${!state.filter ? 'active' : ''}"
                  onclick="setFilter('${chapterId}', null)">All (${counts.total})</button>
          <button class="q-filter-btn ${state.filter === 'active' ? 'active' : ''}"
                  onclick="setFilter('${chapterId}', 'active')">Active (${counts.active})</button>
          <button class="q-filter-btn ${state.filter === 'draft' ? 'active' : ''}"
                  onclick="setFilter('${chapterId}', 'draft')">Draft (${counts.draft})</button>
          ${jobQCount > 0 ? `
            <button class="q-filter-btn ${state.filter === 'pending_review' ? 'active' : ''}"
                    onclick="setFilter('${chapterId}', 'pending_review')" style="border-color: var(--primary);">
              From Jobs (${chPending > 0 ? chPending + ' review' : ''}${chPending > 0 && chReady > 0 ? ', ' : ''}${chReady > 0 ? chReady + ' ready' : ''})
            </button>
          ` : ''}
        </div>`;

      // If viewing pending_review, show questions from generation jobs
      if (state.filter === 'pending_review') {
        return html + renderPendingJobQuestions(chapterId);
      }

      // Filter by topic if set
      let displayData = state.data;
      if (state.topicFilter) {
        const filterVal = state.topicFilter === '__none__' ? null : state.topicFilter;
        displayData = state.data.filter(q => (q.topic_id || null) === filterVal);
      }

      if (displayData.length === 0) {
        return html + `
          <div class="empty-chapter">
            No ${state.filter || ''} questions ${state.topicFilter ? 'for this topic' : 'yet'}.
            ${!state.topicFilter && chPending > 0 ? `<br><strong>${chPending} questions need review</strong> — <a href="./review.html?exam=${examId}&subject=${subjectId}&status=pending">Review them</a>.` : ''}
            ${!state.topicFilter && chReady > 0 ? `<br><strong>${chReady} questions ready to insert</strong> — <a href="./insert.html?exam=${examId}&subject=${subjectId}">Insert them</a>.` : ''}
            ${!state.topicFilter && jobQCount === 0 ? `<br><a href="./generate.html?exam=${examId}&subject=${subjectId}&chapter=${chapterId}">Generate some!</a>` : ''}
          </div>`;
      }

      const startNum = (state.page - 1) * pageSize;

      // Select All + Bulk actions
      html += `
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem;">
            <input type="checkbox" id="selectAll-${chapterId}" onchange="toggleSelectAll('${chapterId}', this.checked)"
                   style="width: 16px; height: 16px; cursor: pointer;">
            Select All
          </label>
        </div>
        <div class="bulk-bar" id="bulkBar-${chapterId}" style="display: none;">
          <span class="bulk-count" id="bulkCount-${chapterId}">0 selected</span>
          <button class="btn btn-sm" style="background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7;"
                  onclick="bulkSetStatus('${chapterId}', 'active')">Activate Selected</button>
          <button class="btn btn-sm" style="background: #fef3c7; color: #92400e; border: 1px solid #fcd34d;"
                  onclick="bulkSetStatus('${chapterId}', 'draft')">Draft Selected</button>
        </div>`;

      html += displayData.map((q, i) => {
        const isActive = q.status === 'active';
        const toggleClass = isActive ? 'to-draft' : 'to-active';
        const toggleLabel = isActive ? 'Draft' : 'Active';
        const newStatus = isActive ? 'draft' : 'active';

        return `
          <div class="q-list-item" id="q-${q.id}" data-qid="${q.id}" data-chapter="${chapterId}">
            <div class="q-list-header" onclick="expandQuestion('${q.id}', event)">
              <input type="checkbox" class="q-check" data-chapter="${chapterId}" data-qid="${q.id}"
                     onclick="event.stopPropagation(); updateBulkBar('${chapterId}')" />
              <span class="q-num">#${startNum + i + 1}</span>
              <span class="q-text">${Qbank.escapeHtml(q.question_text)}</span>
              <span class="q-meta">
                ${Qbank.getQuestionTypeBadge(q.question_type)}
                ${Qbank.getDifficultyBadge(q.difficulty)}
                ${Qbank.getStatusBadge(q.status)}
                <button class="status-toggle ${toggleClass}"
                        onclick="event.stopPropagation(); toggleStatus('${q.id}', '${newStatus}', '${chapterId}')">
                  ${toggleLabel}
                </button>
              </span>
              <span class="q-expand-icon">▼</span>
            </div>
            <div class="q-detail" id="detail-${q.id}">
              <div style="text-align: center; color: var(--gray-400); padding: 12px;">Loading details...</div>
            </div>
          </div>
        `;
      }).join('');

      // Pagination (only show if no topic filter active since topic filter is client-side)
      if (!state.topicFilter) {
        html += `
          <div class="q-pagination">
            <span>Page ${state.page} of ${totalPages} (${state.total} questions)</span>
            <div style="display: flex; gap: 8px;">
              <button ${state.page <= 1 ? 'disabled' : ''} onclick="changePage('${chapterId}', -1)">← Prev</button>
              <button ${state.page >= totalPages ? 'disabled' : ''} onclick="changePage('${chapterId}', 1)">Next →</button>
            </div>
          </div>`;
      }

      return html;
    }

    // ========================================================================
    // TOPIC FILTER
    // ========================================================================
    function filterByTopic(chapterId, topicId) {
      const state = chapterState[chapterId];
      // Toggle off if same topic clicked
      if (state.topicFilter === topicId) {
        state.topicFilter = null;
      } else {
        state.topicFilter = topicId;
      }
      renderChapterBody(chapterId);
    }

    function clearTopicFilter(chapterId) {
      chapterState[chapterId].topicFilter = null;
      renderChapterBody(chapterId);
    }

    // ========================================================================
    // FILTER & PAGINATION
    // ========================================================================
    async function setFilter(chapterId, filter) {
      chapterState[chapterId].filter = filter;
      chapterState[chapterId].page = 1;
      chapterState[chapterId].topicFilter = null;
      await loadChapterContent(chapterId);
    }

    async function changePage(chapterId, direction) {
      chapterState[chapterId].page += direction;
      await loadChapterContent(chapterId);
    }

    // ========================================================================
    // PENDING REVIEW QUESTIONS (from generation jobs)
    // ========================================================================
    function renderPendingJobQuestions(chapterId) {
      const jobs = pendingJobsByChapter[chapterId] || [];
      if (jobs.length === 0) {
        return `<div class="empty-chapter">No pending review questions for this chapter.</div>`;
      }

      return jobs.map(job => {
        const questions = job.output_json?.questions || [];
        const createdAt = new Date(job.created_at).toLocaleDateString();

        return `
          <div class="pending-job-card">
            <div class="pending-job-header">
              <div>
                <strong>Job:</strong> ${questions.length} questions
                <span style="color: var(--gray-500); font-size: 0.8rem;">&middot; Generated ${createdAt}</span>
                <span class="badge" style="background: ${job.status === 'reviewed' ? '#d1fae5' : '#fef3c7'}; color: ${job.status === 'reviewed' ? '#065f46' : '#92400e'};">
                  ${job.status}
                </span>
              </div>
              <a href="./review.html?exam=${examId}&subject=${subjectId}&job=${job.id}"
                 class="btn btn-sm btn-primary" style="font-size: 0.8rem;">
                Review & Insert
              </a>
            </div>
            ${questions.map((q, i) => {
              const qId = `pq-${job.id}-${i}`;
              return `
                <div class="pending-q-item" id="${qId}" onclick="togglePendingQ('${qId}')">
                  <span class="pq-num">#${i + 1}</span>
                  <span class="pq-text">${q.question_text || q.question}</span>
                  <span style="font-size: 0.7rem; color: var(--gray-400);">▼</span>
                </div>
                <div class="pending-q-detail" id="${qId}-detail">
                  ${(q.options || []).map(opt => `
                    <div class="q-option ${opt.is_correct || opt.key === q.correct_answer ? 'correct' : ''}">
                      <span class="q-option-key">${opt.key}.</span>
                      <span class="q-option-text">${opt.text}</span>
                      ${opt.is_correct || opt.key === q.correct_answer ? '<span class="q-option-correct-tag">Correct</span>' : ''}
                    </div>
                  `).join('')}
                  ${q.explanation ? `<div class="q-explanation" style="margin-top: 8px;">${q.explanation}</div>` : ''}
                  ${(q.elimination_hints || []).length > 0 ? `
                    <div style="margin-top: 8px;">
                      <div class="q-detail-label">Elimination Hints</div>
                      ${q.elimination_hints.map(h => `
                        <div class="q-hint">
                          <span class="q-hint-key">Option ${h.option_key}:</span> ${h.hint}
                          ${h.misconception ? `<div class="q-hint-misconception">Misconception: ${h.misconception}</div>` : ''}
                        </div>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function togglePendingQ(qId) {
      const item = document.getElementById(qId);
      if (item) item.classList.toggle('expanded');
    }

    // ========================================================================
    // EXPAND QUESTION — SHOW FULL DETAILS
    // ========================================================================
    const loadedDetails = {};

    async function expandQuestion(questionId, event) {
      if (event && event.target.classList.contains('q-check')) return;

      const item = document.getElementById(`q-${questionId}`);
      const detailDiv = document.getElementById(`detail-${questionId}`);
      if (!item || !detailDiv) return;

      const isExpanded = item.classList.contains('expanded');
      if (isExpanded) {
        item.classList.remove('expanded');
        return;
      }

      item.classList.add('expanded');

      if (!loadedDetails[questionId]) {
        const details = await Qbank.fetchQuestionDetails(questionId);
        loadedDetails[questionId] = details;
      }

      const details = loadedDetails[questionId];
      const q = chapterState[item.dataset.chapter]?.data.find(x => x.id === questionId);
      renderQuestionDetail(questionId, q, details);
    }

    function renderQuestionDetail(questionId, q, details) {
      const detailDiv = document.getElementById(`detail-${questionId}`);
      if (!detailDiv) return;

      let html = '';

      // Options
      if (details.options.length > 0) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Options</div>
          ${details.options.map(opt => `
            <div class="q-option ${opt.is_correct ? 'correct' : ''}">
              <span class="q-option-key">${opt.option_key}.</span>
              <span class="q-option-text">${Qbank.escapeHtml(opt.option_text)}</span>
              ${opt.is_correct ? '<span class="q-option-correct-tag">Correct</span>' : ''}
            </div>
          `).join('')}
        </div>`;
      } else if (q?.correct_answer) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Correct Answer</div>
          <div style="font-weight: 600; color: #065f46;">${q.correct_answer}</div>
        </div>`;
      }

      // Explanation
      if (q?.explanation) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Explanation</div>
          <div class="q-explanation">${Qbank.escapeHtml(q.explanation)}</div>
        </div>`;
      }

      // Elimination hints
      if (details.hints.length > 0) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Elimination Hints</div>
          ${details.hints.map(h => `
            <div class="q-hint">
              <span class="q-hint-key">Option ${h.option_key}:</span> ${h.hint_text}
              ${h.misconception ? `<div class="q-hint-misconception">Misconception: ${h.misconception}</div>` : ''}
            </div>
          `).join('')}
        </div>`;
      }

      // Concept tags
      if (q?.concept_tags && q.concept_tags.length > 0) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Concept Tags</div>
          <div class="q-tags">${q.concept_tags.map(t => `<span class="q-tag">${t}</span>`).join('')}</div>
        </div>`;
      }

      // Topic / Bloom level from payload
      if (q?.payload?.topic_name || q?.payload?.bloom_level) {
        html += `<div class="q-detail-section">
          <div class="q-detail-label">Metadata</div>
          <div style="font-size: 0.8rem; color: var(--gray-600);">
            ${q.payload.topic_name ? `Topic: <strong>${q.payload.topic_name}</strong>` : ''}
            ${q.payload.bloom_level ? ` &middot; Bloom: <strong>${q.payload.bloom_level}</strong>` : ''}
          </div>
        </div>`;
      }

      if (!html) {
        html = '<div style="color: var(--gray-400);">No additional details available.</div>';
      }

      detailDiv.innerHTML = html;
    }

    // ========================================================================
    // SELECT ALL & BULK ACTIONS
    // ========================================================================
    function toggleSelectAll(chapterId, checked) {
      document.querySelectorAll(`.q-check[data-chapter="${chapterId}"]`).forEach(cb => {
        cb.checked = checked;
      });
      updateBulkBar(chapterId);
    }

    function updateBulkBar(chapterId) {
      const checks = document.querySelectorAll(`.q-check[data-chapter="${chapterId}"]`);
      const checked = document.querySelectorAll(`.q-check[data-chapter="${chapterId}"]:checked`);
      const bar = document.getElementById(`bulkBar-${chapterId}`);
      const countEl = document.getElementById(`bulkCount-${chapterId}`);
      const selectAllCb = document.getElementById(`selectAll-${chapterId}`);

      if (bar) bar.style.display = checked.length > 0 ? 'flex' : 'none';
      if (countEl) countEl.textContent = `${checked.length} selected`;
      if (selectAllCb) selectAllCb.checked = checked.length === checks.length && checks.length > 0;
    }

    async function bulkSetStatus(chapterId, newStatus) {
      const checked = document.querySelectorAll(`.q-check[data-chapter="${chapterId}"]:checked`);
      const ids = Array.from(checked).map(cb => cb.dataset.qid);

      if (ids.length === 0) return;
      if (!confirm(`Set ${ids.length} question(s) to "${newStatus}"?`)) return;

      const result = await Qbank.bulkUpdateQuestionStatus(ids, newStatus);
      if (result) {
        Qbank.showToast(`${result.length} questions set to ${newStatus}`, 'success');

        const counts = chapterQuestionCounts[chapterId];
        if (counts) {
          const state = chapterState[chapterId];
          ids.forEach(id => {
            const q = state.data.find(x => x.id === id);
            if (q) {
              const oldStatus = q.status;
              if (oldStatus === 'active' && newStatus !== 'active') counts.active = Math.max(0, counts.active - 1);
              else if (oldStatus === 'draft' && newStatus !== 'draft') counts.draft = Math.max(0, counts.draft - 1);
              if (newStatus === 'active') counts.active++;
              else if (newStatus === 'draft') counts.draft++;
            }
          });
        }

        // Invalidate topic cache for this chapter
        delete topicCache[chapterId];

        renderStats();
        await loadChapterContent(chapterId);
      } else {
        Qbank.showToast('Failed to update questions', 'error');
      }
    }

    // ========================================================================
    // STATUS TOGGLE (single question)
    // ========================================================================
    async function toggleStatus(questionId, newStatus, chapterId) {
      const btn = document.querySelector(`#q-${questionId} .status-toggle`);
      if (btn) {
        btn.disabled = true;
        btn.textContent = '...';
      }

      const result = await Qbank.updateQuestionStatus(questionId, newStatus);

      if (result) {
        Qbank.showToast(`Question ${newStatus === 'active' ? 'activated' : 'set to draft'}`, 'success');

        const counts = chapterQuestionCounts[chapterId];
        if (counts) {
          if (newStatus === 'active') {
            counts.active++;
            counts.draft = Math.max(0, counts.draft - 1);
          } else {
            counts.draft++;
            counts.active = Math.max(0, counts.active - 1);
          }
        }

        // Invalidate topic cache for this chapter
        delete topicCache[chapterId];

        renderStats();
        await loadChapterContent(chapterId);
      } else {
        Qbank.showToast('Failed to update status', 'error');
        if (btn) {
          btn.disabled = false;
          btn.textContent = newStatus === 'active' ? 'Active' : 'Draft';
        }
      }
    }

    init();
  </script>
</body>
</html>
