<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Translation Status - Qbank Admin</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* ── Filters ────────────────────────────────────── */
    .ts-filters {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      padding: 20px;
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .ts-filters .form-group { margin: 0; flex: 1; min-width: 180px; }

    /* ── Global summary cards ───────────────────────── */
    .ts-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .ts-summary-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .ts-summary-card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .ts-summary-card .label { font-size: 0.8rem; color: var(--gray-500); margin-top: 6px; }
    .ts-summary-card.good  { border-left: 4px solid var(--success); }
    .ts-summary-card.warn  { border-left: 4px solid var(--warning); }
    .ts-summary-card.bad   { border-left: 4px solid var(--error); }
    .ts-summary-card.info  { border-left: 4px solid var(--info); }

    /* ── Per-language coverage bars ──────────────────── */
    .lang-coverage {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
    }
    .lang-coverage h3 { margin: 0 0 16px; font-size: 1rem; }
    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .lang-row:last-child { margin-bottom: 0; }
    .lang-label-bar {
      font-weight: 600;
      min-width: 100px;
      font-size: 0.9rem;
    }
    .lang-bar-wrap {
      flex: 1;
      height: 26px;
      background: var(--gray-100);
      border-radius: 13px;
      overflow: hidden;
      position: relative;
    }
    .lang-bar-fill {
      height: 100%;
      border-radius: 13px;
      transition: width 0.6s ease;
      min-width: 2px;
    }
    .lang-bar-fill.high   { background: var(--success); }
    .lang-bar-fill.medium { background: var(--warning); }
    .lang-bar-fill.low    { background: var(--error); }
    .lang-pct {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 90px;
      text-align: right;
    }

    /* ── Chapter breakdown table ─────────────────────── */
    .ch-table { width: 100%; border-collapse: collapse; }
    .ch-table th, .ch-table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
      font-size: 0.85rem;
    }
    .ch-table th {
      background: var(--gray-50);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--gray-500);
    }
    .ch-table tr:hover { background: var(--gray-50); }
    .ch-pct-bar {
      display: inline-block;
      height: 8px;
      border-radius: 4px;
      min-width: 2px;
    }
    .ch-pct-bar.high   { background: var(--success); }
    .ch-pct-bar.medium { background: var(--warning); }
    .ch-pct-bar.low    { background: var(--error); }

    .corrected-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #fef3c7;
      color: #92400e;
    }

    @media (max-width: 768px) {
      .ts-summary { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header id="nav-header"></header>

  <div class="page-wrapper">
    <div class="page-content">
      <div class="page-header">
        <h1 class="page-title">
          <span class="page-title-icon">🌐</span>
          Translation Status
        </h1>
        <p class="page-subtitle">Coverage dashboard — tracks translation progress per language, subject, and chapter</p>
      </div>

      <!-- Global Summary -->
      <div class="ts-summary" id="globalSummary">
        <div class="ts-summary-card info"><div class="value" id="totalQs">--</div><div class="label">Total Questions</div></div>
      </div>

      <!-- Per-language coverage -->
      <div class="lang-coverage" id="langCoverage">
        <h3>Language Coverage</h3>
        <div id="langBars">
          <p style="color: var(--gray-400); text-align: center;">Loading...</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="ts-filters">
        <div class="form-group">
          <label class="form-label">Subject</label>
          <select id="subjectFilter" class="form-select">
            <option value="">All Subjects</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Language</label>
          <select id="langFilter" class="form-select">
            <option value="">All Languages</option>
          </select>
        </div>
        <div style="align-self: flex-end;">
          <button class="btn btn-secondary" onclick="loadBreakdown()">Refresh</button>
        </div>
      </div>

      <!-- Chapter breakdown -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Chapter Breakdown</h3>
          <span id="breakdownHint" style="font-size: 0.8rem; color: var(--gray-500);"></span>
        </div>
        <div class="card-body" id="breakdownBody">
          <p style="color: var(--gray-400); text-align: center; padding: 40px;">Select a subject to view chapter-level translation coverage.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="./shared.js?v=20260307"></script>
  <script>
    console.log('[translate] Translation Status Dashboard loaded');

    let activeLangs = [];   // [{id, label, native, emoji}]
    let allSubjects = [];

    // ====================================================================
    // INIT
    // ====================================================================
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await Qbank.requireAuth('admin');
      if (!user) return;
      Qbank.renderNavHeader();

      // Load languages + subjects in parallel
      const [langs, subjects] = await Promise.all([
        Qbank.fetchActiveLanguages(),
        Qbank.fetchSubjects()
      ]);
      activeLangs = langs;
      allSubjects = subjects;

      // Populate subject filter
      const subjectSel = document.getElementById('subjectFilter');
      subjects.forEach(s => {
        const o = document.createElement('option');
        o.value = s.id;
        o.textContent = `${Qbank.getSubjectEmoji(s.id)} ${s.name}`;
        subjectSel.appendChild(o);
      });

      // Populate language filter
      const langSel = document.getElementById('langFilter');
      activeLangs.forEach(l => {
        const o = document.createElement('option');
        o.value = l.id;
        o.textContent = `${l.emoji} ${l.label} (${l.native})`;
        langSel.appendChild(o);
      });

      document.getElementById('subjectFilter').addEventListener('change', loadBreakdown);
      document.getElementById('langFilter').addEventListener('change', loadBreakdown);

      await loadGlobalStats();
    });

    // ====================================================================
    // GLOBAL STATS — per-language coverage across all questions
    // ====================================================================
    async function loadGlobalStats() {
      if (!Qbank.supabase) return;

      // Build select: id + all translation columns
      const langCols = activeLangs.map(l => `question_text_${l.id}`).join(', ');
      const selectStr = `id, subject_id${langCols ? ', ' + langCols : ''}, corrected_at, last_translated_at`;

      const { data, error } = await Qbank.supabase
        .from('med_questions')
        .select(selectStr)
        .in('status', ['active', 'draft']);

      if (error) {
        console.error('[translate] Failed to load global stats:', error);
        return;
      }

      const total = data.length;
      document.getElementById('totalQs').textContent = total;

      // Count corrected-but-not-retranslated
      const pendingRetranslation = data.filter(q =>
        q.corrected_at && (!q.last_translated_at || new Date(q.corrected_at) > new Date(q.last_translated_at))
      ).length;

      // Build global summary cards
      const summaryEl = document.getElementById('globalSummary');
      let summaryHtml = `<div class="ts-summary-card info"><div class="value">${total}</div><div class="label">Total Questions</div></div>`;

      if (pendingRetranslation > 0) {
        summaryHtml += `<div class="ts-summary-card warn"><div class="value">${pendingRetranslation}</div><div class="label">Corrected, Awaiting Re-translation</div></div>`;
      }

      // Per-language stats
      const langStats = [];
      for (const lang of activeLangs) {
        const col = `question_text_${lang.id}`;
        const translated = data.filter(q => q[col]).length;
        const pct = total > 0 ? Math.round((translated / total) * 100) : 0;
        langStats.push({ lang, translated, missing: total - translated, pct });

        const cls = pct >= 80 ? 'good' : pct >= 40 ? 'warn' : 'bad';
        summaryHtml += `<div class="ts-summary-card ${cls}"><div class="value">${pct}%</div><div class="label">${lang.emoji} ${lang.label}</div></div>`;
      }
      summaryEl.innerHTML = summaryHtml;

      // Language coverage bars
      const barsEl = document.getElementById('langBars');
      barsEl.innerHTML = langStats.map(s => {
        const cls = s.pct >= 80 ? 'high' : s.pct >= 40 ? 'medium' : 'low';
        return `
          <div class="lang-row">
            <div class="lang-label-bar">${s.lang.emoji} ${s.lang.label}</div>
            <div class="lang-bar-wrap">
              <div class="lang-bar-fill ${cls}" style="width: ${Math.max(s.pct, 1)}%"></div>
            </div>
            <div class="lang-pct">${s.translated}/${total} (${s.pct}%)</div>
          </div>
        `;
      }).join('');

      if (langStats.length === 0) {
        barsEl.innerHTML = '<p style="color: var(--gray-400); text-align: center;">No active languages configured.</p>';
      }
    }

    // ====================================================================
    // CHAPTER BREAKDOWN
    // ====================================================================
    async function loadBreakdown() {
      const subjectId = document.getElementById('subjectFilter').value;
      const langId = document.getElementById('langFilter').value;
      const body = document.getElementById('breakdownBody');
      const hint = document.getElementById('breakdownHint');

      if (!subjectId) {
        body.innerHTML = '<p style="color: var(--gray-400); text-align: center; padding: 40px;">Select a subject to view chapter-level translation coverage.</p>';
        hint.textContent = '';
        return;
      }

      body.innerHTML = '<div style="text-align:center; padding: 40px;"><div class="loader-spinner" style="margin: 0 auto 12px;"></div>Loading...</div>';

      // Fetch chapters for this subject
      const chapters = await Qbank.fetchChapters(subjectId);

      // Determine which languages to show
      const langs = langId ? activeLangs.filter(l => l.id === langId) : activeLangs;
      if (langs.length === 0) {
        body.innerHTML = '<p style="color: var(--gray-400); text-align: center; padding: 40px;">No languages selected.</p>';
        return;
      }

      // Fetch question counts per chapter with translation columns
      const langCols = langs.map(l => `question_text_${l.id}`).join(', ');
      const selectStr = `id, chapter_id, corrected_at, last_translated_at${langCols ? ', ' + langCols : ''}`;

      const { data: questions, error } = await Qbank.supabase
        .from('med_questions')
        .select(selectStr)
        .eq('subject_id', subjectId)
        .in('status', ['active', 'draft']);

      if (error) {
        body.innerHTML = `<p style="color: var(--error);">Error: ${Qbank.escapeHtml(error.message)}</p>`;
        return;
      }

      // Aggregate per chapter
      const chapterMap = {};
      (questions || []).forEach(q => {
        if (!chapterMap[q.chapter_id]) {
          chapterMap[q.chapter_id] = { total: 0, langs: {}, correctedPending: 0 };
          langs.forEach(l => { chapterMap[q.chapter_id].langs[l.id] = 0; });
        }
        const ch = chapterMap[q.chapter_id];
        ch.total++;
        langs.forEach(l => {
          if (q[`question_text_${l.id}`]) ch.langs[l.id]++;
        });
        if (q.corrected_at && (!q.last_translated_at || new Date(q.corrected_at) > new Date(q.last_translated_at))) {
          ch.correctedPending++;
        }
      });

      // Build table
      const langHeaders = langs.map(l => `<th>${l.emoji} ${l.label}</th>`).join('');
      let tableHtml = `<table class="ch-table">
        <thead><tr>
          <th>Chapter</th>
          <th>Total Qs</th>
          ${langHeaders}
          <th>Pending Re-translation</th>
        </tr></thead>
        <tbody>`;

      // Sort chapters by chapter_number
      const sorted = [...chapters].sort((a, b) => (a.chapter_number || 0) - (b.chapter_number || 0));

      let grandTotal = 0;
      const grandLang = {};
      langs.forEach(l => { grandLang[l.id] = 0; });
      let grandPending = 0;

      for (const ch of sorted) {
        const stats = chapterMap[ch.id];
        if (!stats) continue; // no questions

        grandTotal += stats.total;
        grandPending += stats.correctedPending;

        const langCells = langs.map(l => {
          const count = stats.langs[l.id] || 0;
          grandLang[l.id] += count;
          const pct = stats.total > 0 ? Math.round((count / stats.total) * 100) : 0;
          const cls = pct >= 80 ? 'high' : pct >= 40 ? 'medium' : 'low';
          return `<td>
            <span class="ch-pct-bar ${cls}" style="width: ${Math.max(pct, 2)}px; display: inline-block;"></span>
            ${count}/${stats.total} <span style="color: var(--gray-400); font-size: 0.75rem;">(${pct}%)</span>
          </td>`;
        }).join('');

        const pendingBadge = stats.correctedPending > 0
          ? `<span class="corrected-badge">${stats.correctedPending} pending</span>`
          : '<span style="color: var(--gray-400); font-size: 0.75rem;">--</span>';

        tableHtml += `<tr>
          <td><strong>${Qbank.escapeHtml(ch.name)}</strong><br><span style="font-size: 0.7rem; color: var(--gray-400);">${ch.id}</span></td>
          <td>${stats.total}</td>
          ${langCells}
          <td>${pendingBadge}</td>
        </tr>`;
      }

      // Grand total row
      const grandLangCells = langs.map(l => {
        const pct = grandTotal > 0 ? Math.round((grandLang[l.id] / grandTotal) * 100) : 0;
        return `<td><strong>${grandLang[l.id]}/${grandTotal} (${pct}%)</strong></td>`;
      }).join('');

      tableHtml += `<tr style="background: var(--gray-50); font-weight: 600;">
        <td>TOTAL</td>
        <td>${grandTotal}</td>
        ${grandLangCells}
        <td>${grandPending > 0 ? `<span class="corrected-badge">${grandPending} pending</span>` : '--'}</td>
      </tr>`;

      tableHtml += '</tbody></table>';

      body.innerHTML = tableHtml;
      hint.textContent = `${sorted.filter(ch => chapterMap[ch.id]).length} chapters with questions`;
    }
  </script>
</body>
</html>
