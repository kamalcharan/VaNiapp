<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Viewer - Qbank Admin</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .viewer-filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px 16px;
      align-items: end;
    }

    .viewer-filters .form-group {
      margin: 0;
    }

    .viewer-filters .form-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--gray-500);
      margin-bottom: 4px;
    }

    .lang-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: var(--gray-100);
      border-radius: var(--radius);
    }

    .lang-toggle button {
      border: none;
      background: transparent;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--gray-600);
      font-weight: 500;
    }

    .lang-toggle button.active {
      background: white;
      color: var(--gray-900);
      box-shadow: var(--shadow-sm);
    }

    .viewer-layout {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .viewer-layout {
        grid-template-columns: 1fr;
      }
    }

    .viewer-list,
    .viewer-detail {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      min-height: 400px;
    }

    .viewer-list-header,
    .viewer-detail-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-200);
      font-size: 0.85rem;
      color: var(--gray-600);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-500);
    }

    .empty-state-icon {
      font-size: 3rem;
      opacity: 0.4;
      margin-bottom: 12px;
    }

    /* Question list */
    .q-row {
      padding: 12px 16px;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background 0.15s;
    }

    .q-row:hover {
      background: var(--gray-50);
    }

    .q-row.selected {
      background: #eff6ff;
      border-left: 3px solid #3b82f6;
      padding-left: 13px;
    }

    .q-row-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .q-row-index {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gray-400);
      min-width: 28px;
    }

    .q-row-text {
      font-size: 0.88rem;
      color: var(--gray-800);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid var(--gray-100);
      font-size: 0.85rem;
    }

    .pager button {
      border: 1px solid var(--gray-300);
      background: white;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .pager button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Question detail */
    .q-detail {
      padding: 22px 26px;
    }

    .q-detail-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .q-detail-id {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.75rem;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    .q-detail-id:hover {
      background: var(--gray-200);
    }

    .q-stem {
      font-size: 1rem;
      line-height: 1.55;
      color: var(--gray-900);
      margin-bottom: 18px;
      white-space: pre-wrap;
    }

    .q-scenario-card {
      background: #fef9c3;
      border-left: 4px solid #f59e0b;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .q-scenario-card .scenario-label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #b45309;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 22px;
    }

    .q-option {
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      background: white;
    }

    .q-option.correct {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .q-option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gray-100);
      color: var(--gray-700);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .q-option.correct .q-option-letter {
      background: #16a34a;
      color: white;
    }

    .q-option-body {
      flex: 1;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .q-option-text {
      white-space: pre-wrap;
    }

    .q-option-correct-tag {
      display: inline-block;
      font-size: 0.7rem;
      color: #15803d;
      font-weight: 600;
      margin-left: 6px;
    }

    .q-option-hint {
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--gray-50);
      border-radius: 6px;
      font-size: 0.82rem;
      color: var(--gray-700);
      line-height: 1.4;
    }

    .q-option-hint .hint-label {
      font-weight: 600;
      color: var(--gray-600);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 2px;
    }

    .q-option-misconception {
      margin-top: 4px;
      font-style: italic;
      color: var(--gray-600);
    }

    .q-section-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gray-500);
      margin: 0 0 8px;
    }

    .q-explanation {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--gray-800);
      white-space: pre-wrap;
    }

    .q-not-available {
      color: var(--gray-400);
      font-style: italic;
      font-size: 0.88rem;
    }

    /* Type-specific blocks */
    .q-ar-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .q-ar-card {
      border: 1px solid var(--gray-200);
      border-left: 4px solid #6366f1;
      background: #f5f3ff;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 0.93rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .q-ar-card.reason {
      border-left-color: #f97316;
      background: #fff7ed;
    }

    .q-ar-card .ar-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4338ca;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .q-ar-card.reason .ar-label {
      color: #c2410c;
    }

    .q-mtf-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .q-mtf-table th,
    .q-mtf-table td {
      padding: 10px 12px;
      border: 1px solid var(--gray-200);
      text-align: left;
      vertical-align: top;
    }

    .q-mtf-table th {
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .q-mtf-mapping {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .q-mtf-mapping .mapping-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #15803d;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .q-mtf-mapping code {
      font-family: ui-monospace, SFMono-Regular, monospace;
      background: white;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid #bbf7d0;
    }

    .q-fill-text {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--gray-900);
      margin-bottom: 18px;
      padding: 14px 16px;
      background: #fef9c3;
      border-radius: 6px;
      border-left: 4px solid #f59e0b;
      white-space: pre-wrap;
    }

    .q-fill-text .blank {
      display: inline-block;
      min-width: 60px;
      border-bottom: 2px solid var(--gray-700);
      margin: 0 2px;
    }

    .q-diagram {
      margin-bottom: 18px;
      text-align: center;
    }

    .q-diagram img {
      max-width: 100%;
      max-height: 360px;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
    }

    .q-diagram .img-error {
      padding: 30px;
      background: var(--gray-50);
      color: var(--gray-500);
      border-radius: 6px;
      border: 1px dashed var(--gray-300);
    }

    .q-diagram .img-alt {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--gray-500);
      font-style: italic;
    }

    .q-seq-list {
      list-style: none;
      counter-reset: seq;
      padding: 0;
      margin: 0 0 16px;
    }

    .q-seq-list li {
      counter-increment: seq;
      padding: 8px 12px 8px 40px;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      margin-bottom: 6px;
      position: relative;
      font-size: 0.92rem;
    }

    .q-seq-list li::before {
      content: counter(seq);
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      background: #6366f1;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .q-seq-list li.in-order {
      border-color: #16a34a;
      background: #f0fdf4;
    }

    .q-seq-list li.in-order::before {
      background: #16a34a;
    }

    .q-row-topic {
      font-size: 0.72rem;
      color: var(--gray-500);
      margin-top: 4px;
    }

    .list-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--gray-100);
    }

    .list-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header id="nav-header"></header>

  <div class="page-wrapper">
    <div class="page-content">
      <div class="page-header">
        <h1 class="page-title">
          <span class="page-title-icon">👀</span>
          Question Viewer
        </h1>
        <p class="page-subtitle">Browse questions in the database. Read-only — no scoring, no edits.</p>
      </div>

      <!-- Filters -->
      <div class="card" style="margin-bottom: 20px;">
        <div class="card-body" style="padding: 18px 22px;">
          <div class="viewer-filters">
            <div class="form-group">
              <label class="form-label" for="examFilter">Exam</label>
              <select id="examFilter" class="form-select">
                <option value="NEET">🩺 NEET</option>
                <option value="CUET">🎓 CUET</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="subjectFilter">Subject</label>
              <select id="subjectFilter" class="form-select">
                <option value="">— select subject —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="chapterFilter">Chapter</label>
              <select id="chapterFilter" class="form-select" disabled>
                <option value="">— select subject first —</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="topicFilter">Topic</label>
              <select id="topicFilter" class="form-select" disabled>
                <option value="">All topics</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="typeFilter">Type</label>
              <select id="typeFilter" class="form-select">
                <option value="">All types</option>
                <option value="mcq">MCQ</option>
                <option value="true-false">True / False</option>
                <option value="assertion-reasoning">Assertion-Reasoning</option>
                <option value="match-the-following">Match the Following</option>
                <option value="fill-in-blanks">Fill in the Blanks</option>
                <option value="scenario-based">Scenario-Based</option>
                <option value="diagram-based">Diagram-Based</option>
                <option value="logical-sequence">Logical Sequence</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="statusFilter">Status</label>
              <select id="statusFilter" class="form-select">
                <option value="">All statuses</option>
                <option value="active">Active</option>
                <option value="draft">Draft</option>
                <option value="pending">Pending</option>
                <option value="reviewed">Reviewed</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Language</label>
              <div class="lang-toggle" id="langToggle" role="tablist">
                <button type="button" class="active" data-lang="en">EN</button>
                <button type="button" data-lang="hi">HI</button>
                <button type="button" data-lang="te">TE</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Layout: list (left) + detail (right) -->
      <div class="viewer-layout">
        <div class="viewer-list">
          <div class="viewer-list-header">
            <span id="listCountLabel">Questions</span>
            <span id="listPagerLabel" style="color: var(--gray-400);"></span>
          </div>
          <div class="list-search">
            <input id="listSearch" type="search" placeholder="Search question text…" autocomplete="off">
          </div>
          <div id="listBody">
            <div class="empty-state">
              <div class="empty-state-icon">🎯</div>
              <p>Pick an exam, subject and chapter above to load questions.</p>
            </div>
          </div>
        </div>

        <div class="viewer-detail">
          <div class="viewer-detail-header">
            <span id="detailHeaderLabel">Question detail</span>
            <span id="detailLangLabel" style="color: var(--gray-400);"></span>
          </div>
          <div id="detailBody">
            <div class="empty-state">
              <div class="empty-state-icon">📖</div>
              <p>Select a question from the list to see the answer and explanation.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./shared.js"></script>
  <script>
    // ──────────────────────────────────────────────────────────────────────────
    // STATE
    // ──────────────────────────────────────────────────────────────────────────
    const PAGE_SIZE = 25;

    const state = {
      exam: 'NEET',
      subject: '',
      chapter: '',
      topic: '',
      type: '',
      status: '',
      language: 'en',
      search: '',
      // caches
      subjects: [],
      chapters: [],
      topics: [],
      topicNameById: {},
      // questions for current chapter (full set, then filtered/paged client-side)
      allQuestions: [],
      filteredQuestions: [],
      page: 1,
      selectedId: null,
      // detail-side cache: { questionId: { options, hints } }
      detailsCache: {}
    };

    // ──────────────────────────────────────────────────────────────────────────
    // URL PARAM SYNC
    // ──────────────────────────────────────────────────────────────────────────
    function readUrlParams() {
      const p = new URLSearchParams(window.location.search);
      const exam = (p.get('exam') || 'NEET').toUpperCase();
      state.exam = (exam === 'CUET') ? 'CUET' : 'NEET';
      state.subject = p.get('subject') || '';
      state.chapter = p.get('chapter') || '';
      state.topic = p.get('topic') || '';
      state.type = p.get('type') || '';
      state.status = p.get('status') || '';
      const lang = (p.get('lang') || 'en').toLowerCase();
      state.language = ['en', 'hi', 'te'].includes(lang) ? lang : 'en';
    }

    function writeUrlParams() {
      const p = new URLSearchParams();
      p.set('exam', state.exam);
      if (state.subject) p.set('subject', state.subject);
      if (state.chapter) p.set('chapter', state.chapter);
      if (state.topic) p.set('topic', state.topic);
      if (state.type) p.set('type', state.type);
      if (state.status) p.set('status', state.status);
      if (state.language && state.language !== 'en') p.set('lang', state.language);
      const qs = p.toString();
      const url = window.location.pathname + (qs ? '?' + qs : '');
      window.history.replaceState(null, '', url);
    }

    // ──────────────────────────────────────────────────────────────────────────
    // POPULATE DROPDOWNS
    // ──────────────────────────────────────────────────────────────────────────
    function populateSubjects() {
      const sel = document.getElementById('subjectFilter');
      const allSubjectIds = Qbank.getExamSubjects(state.exam);
      const allowed = state.subjects.filter(s =>
        allSubjectIds.some(id => id.toLowerCase() === s.id.toLowerCase())
      );

      sel.innerHTML = '<option value="">— select subject —</option>' +
        allowed.map(s => {
          const meta = Qbank.getSubjectMeta(s.id);
          return `<option value="${Qbank.escapeHtml(s.id)}">${meta.emoji} ${Qbank.escapeHtml(s.name)}</option>`;
        }).join('');

      // restore from state if still valid
      if (state.subject && allowed.some(s => s.id.toLowerCase() === state.subject.toLowerCase())) {
        sel.value = allowed.find(s => s.id.toLowerCase() === state.subject.toLowerCase()).id;
        state.subject = sel.value;
      } else {
        state.subject = '';
        sel.value = '';
      }
    }

    async function populateChapters() {
      const sel = document.getElementById('chapterFilter');
      if (!state.subject) {
        sel.disabled = true;
        sel.innerHTML = '<option value="">— select subject first —</option>';
        state.chapters = [];
        state.chapter = '';
        await populateTopics();
        return;
      }

      sel.disabled = true;
      sel.innerHTML = '<option value="">Loading chapters…</option>';
      const chapters = await Qbank.fetchChapters(state.subject, state.exam);
      state.chapters = chapters || [];

      sel.disabled = false;
      sel.innerHTML = '<option value="">— select chapter —</option>' +
        state.chapters.map(c => {
          const num = c.chapter_number ? `${c.chapter_number}. ` : '';
          return `<option value="${Qbank.escapeHtml(c.id)}">${num}${Qbank.escapeHtml(c.name)}</option>`;
        }).join('');

      if (state.chapter && state.chapters.some(c => c.id === state.chapter)) {
        sel.value = state.chapter;
      } else {
        state.chapter = '';
        sel.value = '';
      }
      await populateTopics();
    }

    async function populateTopics() {
      const sel = document.getElementById('topicFilter');
      if (!state.chapter) {
        sel.disabled = true;
        sel.innerHTML = '<option value="">All topics</option>';
        state.topics = [];
        state.topic = '';
        return;
      }

      sel.disabled = true;
      sel.innerHTML = '<option value="">Loading topics…</option>';
      const topics = await Qbank.fetchTopics(state.chapter);
      state.topics = topics || [];

      sel.disabled = false;
      sel.innerHTML = '<option value="">All topics</option>' +
        state.topics.map(t =>
          `<option value="${Qbank.escapeHtml(t.id)}">${Qbank.escapeHtml(t.name)}</option>`
        ).join('');

      // Build topic id → name map for list-row display
      state.topicNameById = {};
      state.topics.forEach(t => { state.topicNameById[t.id] = t.name; });

      if (state.topic && state.topics.some(t => t.id === state.topic)) {
        sel.value = state.topic;
      } else {
        state.topic = '';
        sel.value = '';
      }
    }

    // ──────────────────────────────────────────────────────────────────────────
    // LANGUAGE HELPERS
    // ──────────────────────────────────────────────────────────────────────────
    // Pick the field for the current language. NO English fallback —
    // if the translation is empty, returns null so caller can render
    // "— not available —".
    function pickLang(en, te, hi) {
      if (state.language === 'te') return (te && te.trim()) ? te : null;
      if (state.language === 'hi') return (hi && hi.trim()) ? hi : null;
      return (en && en.trim()) ? en : null;
    }

    function fieldHtml(en, te, hi, opts = {}) {
      const v = pickLang(en, te, hi);
      if (v == null) return `<span class="q-not-available">— not available in ${state.language.toUpperCase()} —</span>`;
      return Qbank.escapeHtml(v);
    }

    // ──────────────────────────────────────────────────────────────────────────
    // FETCH QUESTIONS FOR VIEWER
    // ──────────────────────────────────────────────────────────────────────────
    // shared.js fetchQuestionsByChapter doesn't include _te/_hi columns or
    // topic_id, so we run a viewer-specific select that grabs everything we
    // need for one chapter. Chapters cap at a few hundred questions, well
    // under Supabase's 1000-row default, so a single fetch is fine.
    async function fetchChapterQuestions(chapterId) {
      const sb = Qbank.supabase;
      if (!sb) return [];
      const { data, error } = await sb
        .from('med_questions')
        .select(
          'id, subject_id, chapter_id, topic_id, question_type, difficulty, status, ' +
          'question_text, question_text_te, question_text_hi, ' +
          'explanation, explanation_te, explanation_hi, ' +
          'correct_answer, image_url, image_alt, payload, created_at'
        )
        .eq('chapter_id', chapterId)
        .order('created_at', { ascending: true });
      if (error) {
        console.error('[viewer] fetch questions failed', error);
        Qbank.showToast('Failed to load questions: ' + error.message, 'error');
        return [];
      }
      return data || [];
    }

    function applyClientFilters() {
      const t = (state.topic || '').trim();
      const ty = (state.type || '').trim();
      const st = (state.status || '').trim();
      const search = (state.search || '').trim().toLowerCase();
      state.filteredQuestions = state.allQuestions.filter(q => {
        if (t && q.topic_id !== t) return false;
        if (ty && q.question_type !== ty) return false;
        if (st && q.status !== st) return false;
        if (search) {
          const haystack = (
            (q.question_text || '') + ' ' +
            (q.question_text_te || '') + ' ' +
            (q.question_text_hi || '')
          ).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
      state.page = 1;
    }

    async function loadChapterQuestions() {
      const body = document.getElementById('listBody');
      const countLabel = document.getElementById('listCountLabel');
      const pagerLabel = document.getElementById('listPagerLabel');
      pagerLabel.textContent = '';

      if (!state.chapter) {
        state.allQuestions = [];
        state.filteredQuestions = [];
        state.selectedId = null;
        countLabel.textContent = 'Questions';
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎯</div>
            <p>Pick an exam, subject and chapter above to load questions.</p>
          </div>`;
        return;
      }

      countLabel.textContent = 'Loading…';
      body.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⏳</div>
          <p>Loading questions…</p>
        </div>`;

      state.allQuestions = await fetchChapterQuestions(state.chapter);
      applyClientFilters();
      renderList();
    }

    // ──────────────────────────────────────────────────────────────────────────
    // RENDER LIST
    // ──────────────────────────────────────────────────────────────────────────
    function renderList() {
      const body = document.getElementById('listBody');
      const countLabel = document.getElementById('listCountLabel');
      const pagerLabel = document.getElementById('listPagerLabel');

      if (!state.chapter) {
        countLabel.textContent = 'Questions';
        pagerLabel.textContent = '';
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎯</div>
            <p>Pick an exam, subject and chapter above to load questions.</p>
          </div>`;
        return;
      }

      const total = state.filteredQuestions.length;
      countLabel.textContent = `${total} question${total === 1 ? '' : 's'}`;

      if (total === 0) {
        pagerLabel.textContent = '';
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>No questions match the current filters.</p>
          </div>`;
        return;
      }

      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * PAGE_SIZE;
      const slice = state.filteredQuestions.slice(start, start + PAGE_SIZE);

      pagerLabel.textContent = `Page ${state.page}/${totalPages}`;

      const rowsHtml = slice.map((q, i) => {
        const idx = start + i + 1;
        const text = (q.question_text || '').slice(0, 140);
        const isSel = state.selectedId === q.id;
        const topicName = state.topicNameById[q.topic_id];
        return `
          <div class="q-row ${isSel ? 'selected' : ''}" data-qid="${Qbank.escapeHtml(q.id)}">
            <div class="q-row-meta">
              <span class="q-row-index">#${idx}</span>
              ${Qbank.getQuestionTypeBadge(q.question_type)}
              ${Qbank.getDifficultyBadge(q.difficulty)}
              ${Qbank.getStatusBadge(q.status)}
            </div>
            <div class="q-row-text">${Qbank.escapeHtml(text)}</div>
            ${topicName ? `<div class="q-row-topic">📍 ${Qbank.escapeHtml(topicName)}</div>` : ''}
          </div>`;
      }).join('');

      body.innerHTML = rowsHtml + `
        <div class="pager">
          <button id="pgPrev" ${state.page === 1 ? 'disabled' : ''}>← Prev</button>
          <span style="color: var(--gray-500);">${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total}</span>
          <button id="pgNext" ${state.page === totalPages ? 'disabled' : ''}>Next →</button>
        </div>`;

      body.querySelectorAll('.q-row').forEach(el => {
        el.addEventListener('click', () => {
          state.selectedId = el.dataset.qid;
          renderList();
          renderDetail();
        });
      });
      const prev = document.getElementById('pgPrev');
      const next = document.getElementById('pgNext');
      if (prev) prev.addEventListener('click', () => { state.page--; renderList(); });
      if (next) next.addEventListener('click', () => { state.page++; renderList(); });
    }

    // ──────────────────────────────────────────────────────────────────────────
    // RENDER DETAIL
    // ──────────────────────────────────────────────────────────────────────────
    async function renderDetail() {
      const body = document.getElementById('detailBody');
      const langLabel = document.getElementById('detailLangLabel');
      const headerLabel = document.getElementById('detailHeaderLabel');
      langLabel.textContent = state.language.toUpperCase();

      if (!state.selectedId) {
        headerLabel.textContent = 'Question detail';
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📖</div>
            <p>Select a question from the list to see the answer and explanation.</p>
          </div>`;
        return;
      }

      const q = state.allQuestions.find(x => x.id === state.selectedId);
      if (!q) {
        body.innerHTML = `<div class="empty-state"><p>Question not found.</p></div>`;
        return;
      }

      headerLabel.textContent = q.question_type.toUpperCase();

      // Fetch & cache options + hints
      let details = state.detailsCache[q.id];
      if (!details) {
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <p>Loading question detail…</p>
          </div>`;
        details = await Qbank.fetchQuestionDetails(q.id);
        if (state.selectedId !== q.id) return; // user moved on
        state.detailsCache[q.id] = details || { options: [], hints: [] };
      }

      body.innerHTML = renderQuestionDetailHtml(q, state.detailsCache[q.id]);
      // Wire copy-id button
      const idEl = body.querySelector('.q-detail-id');
      if (idEl) idEl.addEventListener('click', () => {
        navigator.clipboard?.writeText(q.id);
        Qbank.showToast('Question ID copied', 'success', 1500);
      });
    }

    function renderQuestionDetailHtml(q, details) {
      const opts = (details.options || []).slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      const hints = details.hints || [];
      const hintByKey = {};
      hints.forEach(h => { hintByKey[h.option_key] = h; });

      const stemHtml = renderStemBlock(q);
      const optionsHtml = renderOptionsBlock(q, opts, hintByKey);
      const explanationHtml = renderExplanationBlock(q);

      return `
        <div class="q-detail">
          <div class="q-detail-meta">
            ${Qbank.getQuestionTypeBadge(q.question_type)}
            ${Qbank.getDifficultyBadge(q.difficulty)}
            ${Qbank.getStatusBadge(q.status)}
            <span class="q-detail-id" title="Click to copy">${Qbank.escapeHtml(q.id)}</span>
          </div>
          ${stemHtml}
          ${optionsHtml}
          <h4 class="q-section-title">Explanation</h4>
          ${explanationHtml}
        </div>`;
    }

    // Renders the question stem + any type-specific blocks (scenario card, A-R
    // assertion/reason cards, MTF columns, fill-blank text, diagram image,
    // sequence items list).
    function renderStemBlock(q) {
      const raw = q.payload || {};
      const stemText = pickLang(q.question_text, q.question_text_te, q.question_text_hi);

      // For fill-in-blanks the stem IS the text-with-blanks rendering (replaces stem)
      if (q.question_type === 'fill-in-blanks') {
        return renderFillStem(q, raw);
      }

      let html = '';

      // Pre-stem cards
      if (q.question_type === 'scenario-based') {
        html += renderScenarioCard(raw);
      } else if (q.question_type === 'assertion-reasoning') {
        html += renderAssertionReasonCards(raw);
      } else if (q.question_type === 'diagram-based') {
        html += renderDiagramBlock(q, raw);
      }

      // Stem text — show for all types except A-R (where assertion+reason replace
      // the bare stem; the question_text often just says "Choose the correct option")
      // and except true-false where it's the statement.
      if (q.question_type !== 'assertion-reasoning' || (stemText && !raw.assertion)) {
        html += `<div class="q-stem">${stemText != null
          ? Qbank.escapeHtml(stemText)
          : '<span class="q-not-available">— not available in ' + state.language.toUpperCase() + ' —</span>'
        }</div>`;
      }

      // Post-stem structures
      if (q.question_type === 'match-the-following') {
        html += renderMtfBlocks(raw);
      } else if (q.question_type === 'logical-sequence') {
        html += renderSequenceBlock(raw);
      }

      return html;
    }

    function renderScenarioCard(raw) {
      const scenario = pickLang(raw.scenario, raw.scenario_te, raw.scenario_hi);
      return `
        <div class="q-scenario-card">
          <span class="scenario-label">Scenario</span>
          ${scenario != null
            ? Qbank.escapeHtml(scenario).replace(/\n/g, '<br>')
            : '<span class="q-not-available">— not available in ' + state.language.toUpperCase() + ' —</span>'}
        </div>`;
    }

    function renderAssertionReasonCards(raw) {
      const assertion = pickLang(raw.assertion, raw.assertion_te, raw.assertion_hi);
      const reason = pickLang(raw.reason, raw.reason_te, raw.reason_hi);
      const naMsg = `<span class="q-not-available">— not available in ${state.language.toUpperCase()} —</span>`;
      return `
        <div class="q-ar-grid">
          <div class="q-ar-card">
            <span class="ar-label">Assertion (A)</span>
            ${assertion != null ? Qbank.escapeHtml(assertion) : naMsg}
          </div>
          <div class="q-ar-card reason">
            <span class="ar-label">Reason (R)</span>
            ${reason != null ? Qbank.escapeHtml(reason) : naMsg}
          </div>
        </div>`;
    }

    function renderMtfBlocks(raw) {
      const colA = parseColumnItems(raw.column_a ?? raw.columnA);
      const colB = parseColumnItems(raw.column_b ?? raw.columnB);
      const mapping = (raw.correct_mapping ?? raw.correctMapping) || {};

      if (colA.length === 0 && colB.length === 0) {
        return `<p class="q-not-available">No column data stored in payload.</p>`;
      }

      const rowCount = Math.max(colA.length, colB.length);
      const rows = [];
      for (let i = 0; i < rowCount; i++) {
        const a = colA[i];
        const b = colB[i];
        rows.push(`
          <tr>
            <td>${a ? `<strong>${Qbank.escapeHtml(a.id)}.</strong> ${renderItemText(a)}` : ''}</td>
            <td>${b ? `<strong>${Qbank.escapeHtml(b.id)}.</strong> ${renderItemText(b)}` : ''}</td>
          </tr>`);
      }

      let mappingHtml = '';
      const mapKeys = Object.keys(mapping);
      if (mapKeys.length > 0) {
        const pairs = mapKeys.map(k =>
          `<code>${Qbank.escapeHtml(k)} → ${Qbank.escapeHtml(String(mapping[k]))}</code>`
        ).join(' &nbsp; ');
        mappingHtml = `
          <div class="q-mtf-mapping">
            <span class="mapping-label">Correct mapping</span>
            ${pairs}
          </div>`;
      }

      return `
        <table class="q-mtf-table">
          <thead><tr><th>Column A</th><th>Column B</th></tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
        ${mappingHtml}`;
    }

    function renderFillStem(q, raw) {
      const tEn = raw.text_with_blanks || q.question_text || '';
      const tTe = raw.text_with_blanks_te || q.question_text_te || '';
      const tHi = raw.text_with_blanks_hi || q.question_text_hi || '';
      const text = pickLang(tEn, tTe, tHi);
      if (text == null) {
        return `<div class="q-fill-text"><span class="q-not-available">— not available in ${state.language.toUpperCase()} —</span></div>`;
      }
      // Replace ___ (3+ underscores) and "____" patterns with a styled blank span.
      const escaped = Qbank.escapeHtml(text)
        .replace(/_{3,}/g, '<span class="blank">&nbsp;</span>');
      return `<div class="q-fill-text">${escaped}</div>`;
    }

    function renderDiagramBlock(q, raw) {
      const url = q.image_url || raw.image_uri || '';
      const alt = q.image_alt || raw.image_alt || '';
      if (!url) {
        return `<div class="q-diagram"><div class="img-error">No diagram image stored for this question.</div></div>`;
      }
      const safeUrl = Qbank.escapeHtml(url);
      const safeAlt = Qbank.escapeHtml(alt || 'Diagram');
      return `
        <div class="q-diagram">
          <img src="${safeUrl}" alt="${safeAlt}"
               onerror="this.outerHTML='<div class=&quot;img-error&quot;>Image failed to load: ${safeUrl}</div>'">
          ${alt ? `<div class="img-alt">${safeAlt}</div>` : ''}
        </div>`;
    }

    function renderSequenceBlock(raw) {
      const items = parseColumnItems(raw.items);
      const order = Array.isArray(raw.correct_order) ? raw.correct_order : [];

      if (items.length === 0) {
        return '<p class="q-not-available">No sequence items stored in payload.</p>';
      }

      // Items as authored
      const itemsHtml = items.map(it =>
        `<li><strong>${Qbank.escapeHtml(it.id)}.</strong> ${renderItemText(it)}</li>`
      ).join('');

      // Correct order
      let orderHtml = '';
      if (order.length > 0) {
        const itemMap = {};
        items.forEach(it => { itemMap[it.id] = it; });
        const orderedItems = order.map(id => {
          const it = itemMap[id];
          return `<li class="in-order"><strong>${Qbank.escapeHtml(id)}.</strong> ${it ? renderItemText(it) : ''}</li>`;
        }).join('');
        orderHtml = `
          <h4 class="q-section-title">Correct order</h4>
          <ol class="q-seq-list">${orderedItems}</ol>`;
      }

      return `
        <h4 class="q-section-title">Items (as authored)</h4>
        <ul class="q-seq-list" style="counter-reset: none;">${itemsHtml}</ul>
        ${orderHtml}`;
    }

    // Helpers
    function parseColumnItems(data) {
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch { return []; }
      }
      if (!Array.isArray(data)) return [];
      return data.map(item => ({
        id: String((item && item.id) ?? ''),
        text: String((item && item.text) ?? ''),
        textTe: String((item && (item.text_te ?? item.textTe)) ?? ''),
        textHi: String((item && (item.text_hi ?? item.textHi)) ?? '')
      }));
    }

    function renderItemText(it) {
      const v = pickLang(it.text, it.textTe, it.textHi);
      return v != null
        ? Qbank.escapeHtml(v)
        : `<span class="q-not-available">— not available in ${state.language.toUpperCase()} —</span>`;
    }

    function renderOptionsBlock(q, opts, hintByKey) {
      if (!opts.length) {
        return '<p class="q-not-available">No options stored for this question.</p>';
      }
      // True/false: just render the two options as-is.
      // MCQ / scenario-based: A/B/C/D letters by sort order.
      const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
      const isTF = q.question_type === 'true-false';

      const rows = opts.map((o, idx) => {
        const letter = isTF ? (o.option_text || '').slice(0, 1).toUpperCase() || '·' : (letters[idx] || '·');
        const text = pickLang(o.option_text, o.option_text_te, o.option_text_hi);
        const correct = !!o.is_correct;
        const hint = hintByKey[o.option_key];
        let hintHtml = '';
        if (hint) {
          const hintText = pickLang(hint.hint_text, hint.hint_text_te, hint.hint_text_hi);
          const misc = pickLang(hint.misconception, hint.misconception_te, hint.misconception_hi);
          hintHtml = `
            <div class="q-option-hint">
              <span class="hint-label">Hint</span>
              ${hintText != null
                ? Qbank.escapeHtml(hintText)
                : '<span class="q-not-available">— hint not available in ' + state.language.toUpperCase() + ' —</span>'}
              ${misc ? `<div class="q-option-misconception">${Qbank.escapeHtml(misc)}</div>` : ''}
            </div>`;
        }
        return `
          <div class="q-option ${correct ? 'correct' : ''}">
            <div class="q-option-letter">${Qbank.escapeHtml(letter)}</div>
            <div class="q-option-body">
              <div class="q-option-text">${text != null
                ? Qbank.escapeHtml(text)
                : '<span class="q-not-available">— not available in ' + state.language.toUpperCase() + ' —</span>'}
                ${correct ? '<span class="q-option-correct-tag">✓ Correct</span>' : ''}
              </div>
              ${hintHtml}
            </div>
          </div>`;
      }).join('');

      return `<div class="q-options">${rows}</div>`;
    }

    function renderExplanationBlock(q) {
      const v = pickLang(q.explanation, q.explanation_te, q.explanation_hi);
      if (v == null) {
        return `<div class="q-explanation"><span class="q-not-available">— not available in ${state.language.toUpperCase()} —</span></div>`;
      }
      return `<div class="q-explanation">${Qbank.escapeHtml(v)}</div>`;
    }

    // ──────────────────────────────────────────────────────────────────────────
    // EVENT WIRING
    // ──────────────────────────────────────────────────────────────────────────
    function wireEvents() {
      document.getElementById('examFilter').addEventListener('change', async (e) => {
        state.exam = e.target.value;
        // exam change invalidates subject/chapter/topic and questions
        state.subject = '';
        state.chapter = '';
        state.topic = '';
        state.allQuestions = [];
        state.filteredQuestions = [];
        state.selectedId = null;
        state.detailsCache = {};
        populateSubjects();
        await populateChapters();
        writeUrlParams();
        renderList();
        renderDetail();
      });

      document.getElementById('subjectFilter').addEventListener('change', async (e) => {
        state.subject = e.target.value;
        state.chapter = '';
        state.topic = '';
        state.allQuestions = [];
        state.filteredQuestions = [];
        state.selectedId = null;
        state.detailsCache = {};
        await populateChapters();
        writeUrlParams();
        renderList();
        renderDetail();
      });

      document.getElementById('chapterFilter').addEventListener('change', async (e) => {
        state.chapter = e.target.value;
        state.topic = '';
        state.selectedId = null;
        state.detailsCache = {};
        await populateTopics();
        writeUrlParams();
        await loadChapterQuestions();
        renderDetail();
      });

      document.getElementById('topicFilter').addEventListener('change', (e) => {
        state.topic = e.target.value;
        state.selectedId = null;
        writeUrlParams();
        applyClientFilters();
        renderList();
        renderDetail();
      });

      document.getElementById('typeFilter').addEventListener('change', (e) => {
        state.type = e.target.value;
        state.selectedId = null;
        writeUrlParams();
        applyClientFilters();
        renderList();
        renderDetail();
      });

      document.getElementById('statusFilter').addEventListener('change', (e) => {
        state.status = e.target.value;
        state.selectedId = null;
        writeUrlParams();
        applyClientFilters();
        renderList();
        renderDetail();
      });

      document.querySelectorAll('#langToggle button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.language = btn.dataset.lang;
          document.querySelectorAll('#langToggle button').forEach(b =>
            b.classList.toggle('active', b === btn)
          );
          writeUrlParams();
          renderDetail();
        });
      });

      // Debounced search
      let searchTimer = null;
      document.getElementById('listSearch').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        const v = e.target.value;
        searchTimer = setTimeout(() => {
          state.search = v;
          state.selectedId = null;
          applyClientFilters();
          renderList();
          renderDetail();
        }, 200);
      });
    }

    function applyStateToUI() {
      document.getElementById('examFilter').value = state.exam;
      document.getElementById('typeFilter').value = state.type || '';
      document.getElementById('statusFilter').value = state.status || '';
      document.querySelectorAll('#langToggle button').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === state.language)
      );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // BOOTSTRAP
    // ──────────────────────────────────────────────────────────────────────────
    async function init() {
      const user = await Qbank.requireAuth();
      if (!user) return;

      Qbank.renderNavHeader();
      readUrlParams();
      applyStateToUI();

      // Pre-fetch all subjects (filter applies allowed-list per role)
      state.subjects = await Qbank.fetchSubjects();
      populateSubjects();

      if (state.subject) {
        document.getElementById('subjectFilter').value = state.subject;
        await populateChapters();
        if (state.chapter) {
          document.getElementById('chapterFilter').value = state.chapter;
          await populateTopics();
          if (state.topic) {
            document.getElementById('topicFilter').value = state.topic;
          }
          // Eagerly load questions if a chapter was already selected via URL
          await loadChapterQuestions();
        }
      }

      wireEvents();
      renderList();
      renderDetail();
    }

    init();
  </script>
</body>
</html>
